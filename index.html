<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tower: Clean Touch</title>
    <style>
        /* Убрали стили кнопок, оставили только чистый экран и меню */
        body { margin: 0; overflow: hidden; background: #0b0b1a; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; background: linear-gradient(to top, #0b0b1a, #1a1a3a); width: 100vw; height: 100vh; }
        
        #uiOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 20; color: white;
        }
        .ui-btn {
            padding: 18px 40px; margin: 10px; border-radius: 30px; font-size: 22px; font-weight: bold;
            border: none; color: white; cursor: pointer; text-transform: uppercase; width: 300px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 0 20px #00d2ff;
            transition: transform 0.1s;
        }
        .ui-btn:active { transform: scale(0.95); }
        h2 { color: #FFD700; text-shadow: 0 0 10px #FFD700; font-size: 36px; margin: 0 0 10px 0; text-align: center; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="uiOverlay">
        <h2 id="menuLevel">УРОВЕНЬ 1</h2>
        <h1 id="menuTitle" style="font-size: 32px; margin-bottom: 20px; text-align: center;">АВТО-ПРЫЖОК</h1>
        <p id="menuInfo" style="margin-bottom: 30px; text-align: center; font-size: 18px; color: #ccc;">
            Жми в левую часть экрана — летишь влево.<br>Жми в правую — летишь вправо!
        </p>
        <button class="ui-btn" id="startBtn" onclick="pressStart()">СТАРТ</button>
        <p id="totalCoinsUI" style="color: #FFD700; margin-top: 20px; font-size: 22px; font-weight: bold;">💰 0</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('uiOverlay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let totalCoins = parseInt(localStorage.getItem('neonCoins')) || 0;
        let currentLevel = 1;
        let gameState = 'START'; 

        class InputHandler {
            constructor() {
                this.keys = [];
                
                // Клавиатура для тестов на ПК
                window.addEventListener('keydown', e => { if (!this.keys.includes(e.key)) this.keys.push(e.key); });
                window.addEventListener('keyup', e => { this.keys = this.keys.filter(k => k !== e.key); });
                
                // Обработка касаний экрана (Тачскрин)
                const handleTouch = (e) => {
                    if (gameState !== 'PLAYING') return; // Если в меню, не реагируем на нажатия
                    e.preventDefault(); 
                    
                    this.keys = []; // Очищаем предыдущие направления
                    
                    // Проверяем, где находится палец (или пальцы)
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].clientX < canvas.width / 2) {
                            if (!this.keys.includes('ArrowLeft')) this.keys.push('ArrowLeft');
                        } else {
                            if (!this.keys.includes('ArrowRight')) this.keys.push('ArrowRight');
                        }
                    }
                };

                const handleTouchEnd = (e) => {
                    if (e.touches.length === 0) {
                        this.keys = []; // Отпустили все пальцы
                    } else {
                        handleTouch(e); // Если отпустили один палец, но второй остался
                    }
                };

                // Вешаем слушатели прямо на холст игры
                canvas.addEventListener('touchstart', handleTouch, {passive: false});
                canvas.addEventListener('touchmove', handleTouch, {passive: false});
                canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
                canvas.addEventListener('touchcancel', handleTouchEnd, {passive: false});

                // Обработка мышки (для тестов на ПК без клавиатуры)
                let isMouseDown = false;
                canvas.addEventListener('mousedown', (e) => {
                    if (gameState !== 'PLAYING') return;
                    isMouseDown = true;
                    updateMouseInput(e);
                });
                canvas.addEventListener('mousemove', (e) => {
                    if (isMouseDown) updateMouseInput(e);
                });
                window.addEventListener('mouseup', () => {
                    isMouseDown = false;
                    this.keys = [];
                });

                const updateMouseInput = (e) => {
                    this.keys = [];
                    if (e.clientX < canvas.width / 2) this.keys.push('ArrowLeft');
                    else this.keys.push('ArrowRight');
                };
            }
        }

        class Particle {
            constructor(x, y, color, isFire = false) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * (isFire ? 8 : 5) + 2;
                this.vx = (Math.random() - 0.5) * (isFire ? 4 : 10);
                this.vy = isFire ? (Math.random() * 5 + 2) : (Math.random() - 1) * 10;
                this.life = 1.0;
                this.decay = isFire ? 0.05 : 0.02;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        class Platform {
            constructor(x, y, width, type = 'normal') {
                this.x = x; this.y = y; this.width = width; this.height = 20;
                this.type = type; 
            }
            draw(ctx) {
                if (this.type === 'finish') {
                    ctx.fillStyle = '#FFD700'; ctx.shadowBlur = 20; ctx.shadowColor = '#FFD700';
                } else if (this.type === 'spring') {
                    ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.fillStyle = '#00ff00';
                } else {
                    ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.fillStyle = '#00ffcc';
                }
                
                if(this.type !== 'finish') ctx.fillRect(this.x, this.y, this.width, 4);
                else ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        class Item {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type; 
                this.width = 24; this.height = 24;
                this.baseY = y; this.angle = Math.random() * Math.PI * 2;
                this.markedForDeletion = false;
            }
            update() { this.angle += 0.05; this.y = this.baseY + Math.sin(this.angle) * 5; }
            draw(ctx) {
                ctx.beginPath();
                if (this.type === 'coin') {
                    ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 15;
                    ctx.arc(this.x + 12, this.y + 12, 10, 0, Math.PI * 2);
                } else if (this.type === 'jetpack') {
                    ctx.fillStyle = '#ff0055'; ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 20;
                    ctx.moveTo(this.x + 12, this.y);
                    ctx.lineTo(this.x + 24, this.y + 24);
                    ctx.lineTo(this.x, this.y + 24);
                }
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Player {
            constructor(game) {
                this.game = game;
                this.width = 30; this.height = 30;
                this.color = '#00d2ff';
                this.reset();
            }
            reset() {
                this.x = canvas.width / 2 - 15; this.y = canvas.height - 100; 
                this.vx = 0; this.vy = 0;
                this.jetpackTimer = 0;
                this.vy = -17; // Даем начальный импульс
            }
            update(input) {
                if (gameState !== 'PLAYING') return;

                if (input.keys.includes('ArrowRight')) this.vx = 8;
                else if (input.keys.includes('ArrowLeft')) this.vx = -8;
                else this.vx *= 0.8;

                if (this.jetpackTimer > 0) {
                    this.vy = -18; 
                    this.jetpackTimer--;
                    this.game.particles.push(new Particle(this.x + 15, this.y + 30, '#ff9900', true));
                    this.game.particles.push(new Particle(this.x + 15, this.y + 30, '#ff0055', true));
                } else {
                    this.vy += 0.8; 
                }

                this.y += this.vy;
                
                if (this.vy > 0) {
                    this.game.platforms.forEach(plat => {
                        if (plat.type === 'finish') return; 

                        if (this.x < plat.x + plat.width && this.x + this.width > plat.x &&
                            this.y < plat.y + plat.height && this.y + this.height > plat.y) {
                            
                            if (this.y + this.height - this.vy <= plat.y + 20) {
                                this.y = plat.y - this.height;
                                
                                if (plat.type === 'spring') {
                                    this.vy = -26; 
                                    this.createJumpDust('#00ff00');
                                } else {
                                    this.vy = -17; 
                                    this.createJumpDust('#ffffff');
                                }
                            }
                        }
                    });
                }

                this.x += this.vx;
                if (this.x > canvas.width) this.x = -this.width;
                if (this.x < -this.width) this.x = canvas.width;
            }

            createJumpDust(color = '#fff') {
                for(let i=0; i<5; i++) this.game.particles.push(new Particle(this.x+15, this.y+30, color));
            }

            draw(ctx) {
                ctx.fillStyle = this.jetpackTimer > 0 ? '#ff0055' : this.color; 
                ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(this.x, this.y, this.width, this.height); ctx.shadowBlur = 0;
            }
        }

        class Game {
            constructor(level) {
                this.player = new Player(this);
                this.input = new InputHandler();
                this.platforms = []; this.items = []; this.particles = [];
                this.cameraY = 0;
                this.levelHeight = 1500 + (level * 1000); 
                this.glitchY = canvas.height + 100;
                this.glitchSpeed = 1.5 + (level * 0.3); 
                this.platformY = canvas.height - 50;
                
                this.platforms.push(new Platform(0, this.platformY, canvas.width, 'normal'));
                this.buildLevel();
            }

            buildLevel() {
                let targetY = -this.levelHeight;
                while (this.platformY > targetY) {
                    this.platformY -= 90 + Math.random() * 40;
                    let width = 70 + Math.random() * 100;
                    let x = Math.random() * (canvas.width - width);
                    
                    let type = Math.random() > 0.85 ? 'spring' : 'normal';
                    this.platforms.push(new Platform(x, this.platformY, width, type));

                    let randItem = Math.random();
                    if (randItem > 0.96) {
                        this.items.push(new Item(x + width/2 - 12, this.platformY - 40, 'jetpack'));
                    } else if (randItem > 0.6) {
                        this.items.push(new Item(x + width/2 - 12, this.platformY - 35, 'coin'));
                    }
                }
                this.platforms.push(new Platform(0, targetY - 100, canvas.width, 'finish'));
            }

            update() {
                if (gameState !== 'PLAYING') return;

                this.player.update(this.input);
                this.items.forEach(i => i.update());
                this.particles.forEach(p => p.update());
                this.particles = this.particles.filter(p => p.life > 0);

                this.glitchY -= this.glitchSpeed;

                let targetCamera = this.player.y - canvas.height / 2;
                if (this.player.y < this.cameraY + canvas.height / 2) {
                    this.cameraY += (targetCamera - this.cameraY) * 0.1; 
                }

                // ПРОВЕРКА ФИНИША
                this.platforms.forEach(plat => {
                    if (plat.type === 'finish') {
                        if (this.player.x < plat.x + plat.width && this.player.x + this.player.width > plat.x &&
                            this.player.y < plat.y + plat.height && this.player.y + this.player.height > plat.y) {
                            winLevel();
                        }
                    }
                });

                this.items.forEach(item => {
                    if (!item.markedForDeletion && 
                        this.player.x < item.x + item.width && this.player.x + this.player.width > item.x &&
                        this.player.y < item.y + item.height && this.player.y + this.player.height > item.y) {
                        
                        item.markedForDeletion = true;
                        if (item.type === 'coin') {
                            totalCoins++;
                            localStorage.setItem('neonCoins', totalCoins);
                            for(let i=0; i<8; i++) this.particles.push(new Particle(item.x+12, item.y+12, '#FFD700'));
                        } else if (item.type === 'jetpack') {
                            this.player.jetpackTimer = 180; 
                            for(let i=0; i<20; i++) this.particles.push(new Particle(item.x+12, item.y+12, '#ff0055'));
                        }
                    }
                });
                this.items = this.items.filter(i => !i.markedForDeletion);
                
                if (this.player.y + this.player.height > this.glitchY || this.player.y > this.cameraY + canvas.height + 200) {
                    gameOver();
                }
            }

            draw(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.translate(0, -this.cameraY);

                this.platforms.forEach(p => p.draw(ctx));
                this.items.forEach(i => i.draw(ctx));
                this.particles.forEach(p => p.draw(ctx));
                this.player.draw(ctx);

                ctx.fillStyle = 'rgba(255, 0, 50, 0.7)';
                ctx.fillRect(0, this.glitchY, canvas.width, canvas.height * 2);
                ctx.fillStyle = '#ff0033';
                ctx.fillRect(0, this.glitchY, canvas.width, 15);

                ctx.restore();

                if (gameState === 'PLAYING') {
                    ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial';
                    ctx.fillText(`УРОВЕНЬ ${currentLevel}`, 20, 30);
                    ctx.fillStyle = '#FFD700'; ctx.textAlign = 'right';
                    ctx.fillText(`💰 ${totalCoins}`, canvas.width - 20, 30);
                    ctx.textAlign = 'left';
                    
                    let progress = Math.min(1, Math.abs(this.player.y - (canvas.height - 100)) / (this.levelHeight + canvas.height));
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(canvas.width/2 - 50, 15, 100, 8);
                    ctx.fillStyle = this.player.jetpackTimer > 0 ? '#ff0055' : '#00d2ff';
                    ctx.fillRect(canvas.width/2 - 50, 15, 100 * progress, 8);
                }
            }
        }

        let game = new Game(currentLevel);

        function animate() {
            game.update();
            game.draw(ctx);
            requestAnimationFrame(animate);
        }

        function pressStart() {
            if (gameState === 'GAMEOVER') {
                game = new Game(currentLevel);
            }
            gameState = 'PLAYING';
            uiOverlay.style.display = 'none';
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            uiOverlay.style.display = 'flex';
            document.getElementById('menuLevel').innerText = `УРОВЕНЬ ${currentLevel}`;
            document.getElementById('menuTitle').innerText = `СГОРЕЛ В ГЛИТЧЕ`;
            document.getElementById('menuInfo').innerText = `Быстрее перебирай пальцами!`;
            document.getElementById('startBtn').innerText = `ИГРАТЬ СНОВА`; 
            updateCoinUI();
        }

        function winLevel() {
            gameState = 'GAMEOVER';
            uiOverlay.style.display = 'flex';
            currentLevel++;
            document.getElementById('menuLevel').innerText = `ПОБЕДА!`;
            document.getElementById('menuTitle').innerText = `УРОВЕНЬ ПРОЙДЕН`;
            document.getElementById('menuInfo').innerText = `Следующий уровень будет сложнее...`;
            document.getElementById('startBtn').innerText = `СЛЕДУЮЩИЙ УРОВЕНЬ`; 
            updateCoinUI();
        }

        function updateCoinUI() {
            document.getElementById('totalCoinsUI').innerText = `💰 Монеты: ${totalCoins}`;
        }

        updateCoinUI();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
