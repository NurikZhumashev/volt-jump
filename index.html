<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAA Isometric Platformer - Core</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Three.js (r128) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* Базовые стили. UI будет добавлен в следующих модулях */
        :root {
            --tg-theme-bg-color: #0f0f13;
            --tg-theme-text-color: #ffffff;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--tg-theme-bg-color);
            overflow: hidden; touch-action: none;
            user-select: none; -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #game-canvas {
            display: block; width: 100%; height: 100%;
        }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #00ffcc; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <h2 id="loading-text">Инициализация Ядра...</h2>
</div>

<canvas id="game-canvas"></canvas>

<script>
/**
 * ============================================================================
 * МОДУЛЬ 1: CORE ARCHITECTURE (ЯДРО ИГРЫ)
 * ============================================================================
 */

// ==========================================
// 1. TELEGRAM CLOUD STORAGE & SDK MANAGER
// ==========================================
class TelegramManager {
    static init() {
        this.tg = window.Telegram?.WebApp || null;
        this.isReady = false;
        
        if (this.tg) {
            this.tg.expand();
            this.tg.ready();
            this.applyTheme();
        }
    }

    static applyTheme() {
        if (!this.tg?.themeParams) return;
        const root = document.documentElement;
        if (this.tg.themeParams.bg_color) {
            root.style.setProperty('--tg-theme-bg-color', this.tg.themeParams.bg_color);
        }
    }

    static vibrate(type = 'light') {
        if (this.tg?.HapticFeedback) {
            this.tg.HapticFeedback.impactOccurred(type);
        }
    }

    // Асинхронная обертка для CloudStorage
    static async saveData(key, value) {
        return new Promise((resolve) => {
            if (this.tg?.CloudStorage) {
                this.tg.CloudStorage.setItem(key, JSON.stringify(value), (err, success) => {
                    resolve(!err && success);
                });
            } else {
                localStorage.setItem(key, JSON.stringify(value));
                resolve(true);
            }
        });
    }

    static async loadData(key, defaultValue = null) {
        return new Promise((resolve) => {
            if (this.tg?.CloudStorage) {
                this.tg.CloudStorage.getItem(key, (err, value) => {
                    if (err || !value) resolve(defaultValue);
                    else resolve(JSON.parse(value));
                });
            } else {
                const val = localStorage.getItem(key);
                resolve(val ? JSON.parse(val) : defaultValue);
            }
        });
    }
}

// ==========================================
// 2. ФИЗИЧЕСКИЙ ДВИЖОК (CUSTOM PHYSICS ENGINE)
// ==========================================
/**
 * Axis-Aligned Bounding Box (AABB)
 */
class AABB {
    constructor(x, y, z, width, height, depth) {
        this.update(x, y, z, width, height, depth);
    }

    update(x, y, z, width, height, depth) {
        this.minX = x - width / 2; this.maxX = x + width / 2;
        this.minY = y - height / 2; this.maxY = y + height / 2;
        this.minZ = z - depth / 2; this.maxZ = z + depth / 2;
    }

    intersects(other) {
        return (this.minX <= other.maxX && this.maxX >= other.minX) &&
               (this.minY <= other.maxY && this.maxY >= other.minY) &&
               (this.minZ <= other.maxZ && this.maxZ >= other.minZ);
    }
}

/**
 * Физическое тело
 */
class PhysicsBody {
    constructor(entity, isStatic = false) {
        this.entity = entity; // Ссылка на игровой объект
        this.isStatic = isStatic;
        
        this.position = new THREE.Vector3();
        this.velocity = new THREE.Vector3();
        this.acceleration = new THREE.Vector3();
        
        this.size = new THREE.Vector3(1, 1, 1);
        this.aabb = new AABB(0,0,0, 1,1,1);
        
        // Физические свойства
        this.mass = isStatic ? 0 : 1;
        this.friction = 0.85; // Трение (инерция)
        this.restitution = 0.0; // Отскок
        this.gravityScale = 1.0;
        
        this.isGrounded = false;
    }

    setSize(w, h, d) {
        this.size.set(w, h, d);
        this.updateAABB();
    }

    setPosition(x, y, z) {
        this.position.set(x, y, z);
        this.updateAABB();
    }

    updateAABB() {
        this.aabb.update(this.position.x, this.position.y, this.position.z, this.size.x, this.size.y, this.size.z);
    }

    applyForce(force) {
        if (this.isStatic) return;
        // F = m * a  => a = F / m
        this.acceleration.add(force.clone().divideScalar(this.mass));
    }
}

/**
 * Мир Физики (Обработка коллизий по осям для стабильности)
 */
class PhysicsWorld {
    constructor() {
        this.bodies =[];
        this.gravity = new THREE.Vector3(0, -45, 0); // Сильная гравитация для платформера
        
        // Границы мира (Boundaries), чтобы не выпасть
        this.bounds = {
            minX: -50, maxX: 50,
            minY: -10, maxY: 100,
            minZ: -50, maxZ: 50
        };
    }

    addBody(body) {
        this.bodies.push(body);
    }

    step(dt) {
        // Ограничиваем dt во избежание пролета сквозь стены при лагах
        const safeDt = Math.min(dt, 0.03); 

        for (let i = 0; i < this.bodies.length; i++) {
            const body = this.bodies[i];
            if (body.isStatic) continue;

            // 1. Применяем гравитацию
            body.applyForce(this.gravity.clone().multiplyScalar(body.gravityScale));

            // 2. Интегрируем ускорение в скорость
            body.velocity.add(body.acceleration.clone().multiplyScalar(safeDt));
            
            // 3. Применяем трение (инерция по X и Z)
            body.velocity.x *= body.friction;
            body.velocity.z *= body.friction;

            // Сброс ускорения
            body.acceleration.set(0, 0, 0);

            // 4. Разрешение коллизий (Axis-by-Axis)
            body.isGrounded = false;

            // Ось Y
            body.position.y += body.velocity.y * safeDt;
            body.updateAABB();
            this.resolveCollisions(body, 'y');

            // Ось X
            body.position.x += body.velocity.x * safeDt;
            body.updateAABB();
            this.resolveCollisions(body, 'x');

            // Ось Z
            body.position.z += body.velocity.z * safeDt;
            body.updateAABB();
            this.resolveCollisions(body, 'z');

            // 5. Проверка границ мира (Boundaries)
            this.checkBoundaries(body);

            // 6. Синхронизация с 3D объектом
            if (body.entity && body.entity.mesh) {
                body.entity.mesh.position.copy(body.position);
            }
        }
    }

    resolveCollisions(body, axis) {
        for (let j = 0; j < this.bodies.length; j++) {
            const other = this.bodies[j];
            if (body === other) continue;

            if (body.aabb.intersects(other.aabb)) {
                // Если столкнулись, выталкиваем
                if (axis === 'y') {
                    if (body.velocity.y < 0) { // Падение
                        body.position.y = other.aabb.maxY + body.size.y / 2;
                        body.isGrounded = true;
                    } else if (body.velocity.y > 0) { // Удар головой
                        body.position.y = other.aabb.minY - body.size.y / 2;
                    }
                    body.velocity.y = 0;
                } 
                else if (axis === 'x') {
                    if (body.velocity.x > 0) body.position.x = other.aabb.minX - body.size.x / 2;
                    else if (body.velocity.x < 0) body.position.x = other.aabb.maxX + body.size.x / 2;
                    body.velocity.x = 0;
                }
                else if (axis === 'z') {
                    if (body.velocity.z > 0) body.position.z = other.aabb.minZ - body.size.z / 2;
                    else if (body.velocity.z < 0) body.position.z = other.aabb.maxZ + body.size.z / 2;
                    body.velocity.z = 0;
                }
                body.updateAABB();
            }
        }
    }

    checkBoundaries(body) {
        if (body.position.y < this.bounds.minY) {
            body.position.y = this.bounds.minY;
            body.velocity.y = 0;
            body.isGrounded = true;
            if (body.entity && typeof body.entity.onOutBounds === 'function') {
                body.entity.onOutBounds();
            }
        }
        if (body.position.x < this.bounds.minX) { body.position.x = this.bounds.minX; body.velocity.x = 0; }
        if (body.position.x > this.bounds.maxX) { body.position.x = this.bounds.maxX; body.velocity.x = 0; }
        if (body.position.z < this.bounds.minZ) { body.position.z = this.bounds.minZ; body.velocity.z = 0; }
        if (body.position.z > this.bounds.maxZ) { body.position.z = this.bounds.maxZ; body.velocity.z = 0; }
        body.updateAABB();
    }
}

// ==========================================
// 3. СИСТЕМА РЕНДЕРИНГА (GRAPHICS ENGINE)
// ==========================================
class RenderEngine {
    constructor() {
        this.canvas = document.getElementById('game-canvas');
        
        // AAA Настройки рендерера
        this.renderer = new THREE.WebGLRenderer({ 
            canvas: this.canvas, 
            antialias: true,
            powerPreference: "high-performance"
        });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        
        // Физически корректный свет и тени
        this.renderer.outputEncoding = THREE.sRGBEncoding;
        this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure = 1.0;
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        this.scene = new THREE.Scene();
        
        // Градиентный фон и туман
        const bgColor = new THREE.Color(0x1a1a2e);
        this.scene.background = bgColor;
        this.scene.fog = new THREE.FogExp2(bgColor, 0.025);

        // Изометрическая/2.5D Камера
        const aspect = window.innerWidth / window.innerHeight;
        // Используем Perspective, но с узким FOV и большим отдалением для эффекта изометрии
        this.camera = new THREE.PerspectiveCamera(40, aspect, 1, 1000);
        this.cameraOffset = new THREE.Vector3(15, 20, 25);
        this.camera.position.copy(this.cameraOffset);
        this.camera.lookAt(0, 0, 0);

        this.setupLighting();

        window.addEventListener('resize', this.onResize.bind(this), false);
    }

    setupLighting() {
        // Мягкий глобальный свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        this.scene.add(ambientLight);

        // Главный источник света (Солнце)
        this.dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        this.dirLight.position.set(20, 40, 20);
        this.dirLight.castShadow = true;
        
        // Настройка качества теней
        this.dirLight.shadow.mapSize.width = 2048;
        this.dirLight.shadow.mapSize.height = 2048;
        this.dirLight.shadow.camera.near = 0.5;
        this.dirLight.shadow.camera.far = 100;
        const d = 25;
        this.dirLight.shadow.camera.left = -d;
        this.dirLight.shadow.camera.right = d;
        this.dirLight.shadow.camera.top = d;
        this.dirLight.shadow.camera.bottom = -d;
        this.dirLight.shadow.bias = -0.0005;

        this.scene.add(this.dirLight);

        // Свет от игрока (PointLight) будет добавлен в классе Player
    }

    onResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
    }

    render() {
        this.renderer.render(this.scene, this.camera);
    }

    // Плавное следование камеры за целью
    followTarget(targetPosition, dt) {
        const desiredPosition = targetPosition.clone().add(this.cameraOffset);
        // Lerp для плавности
        this.camera.position.lerp(desiredPosition, 5 * dt);
        
        // Камера смотрит чуть впереди игрока
        const lookTarget = targetPosition.clone().add(new THREE.Vector3(0, 2, 0));
        
        // Временный кватернион для плавного поворота камеры (опционально)
        this.camera.lookAt(lookTarget);
        
        // Свет также следует за игроком, чтобы тени всегда были четкими
        this.dirLight.position.copy(targetPosition).add(new THREE.Vector3(20, 40, 20));
        this.dirLight.target.position.copy(targetPosition);
        this.dirLight.target.updateMatrixWorld();
    }
}

// ==========================================
// 4. ИГРОВЫЕ СУЩНОСТИ (ENTITIES)
// ==========================================

/**
 * Базовый класс для всех объектов в игре
 */
class Entity {
    constructor(scene, physicsWorld) {
        this.scene = scene;
        this.physicsWorld = physicsWorld;
        this.mesh = null;
        this.body = null;
    }

    update(dt) {}
}

/**
 * Класс Игрока (Player)
 */
class Player extends Entity {
    constructor(scene, physicsWorld) {
        super(scene, physicsWorld);
        
        this.buildMesh();
        this.setupPhysics();
        
        // Параметры геймплея
        this.speed = 400; // Сила ускорения
        this.jumpForce = 22;
        this.maxJumps = 2; // Двойной прыжок
        this.currentJumps = 0;
    }

    buildMesh() {
        // AAA-стиль: составной меш (Core + оболочка)
        this.mesh = new THREE.Group();

        // Внутреннее светящееся ядро
        const coreGeo = new THREE.IcosahedronGeometry(0.4, 2);
        const coreMat = new THREE.MeshStandardMaterial({ 
            color: 0x00ffcc, 
            emissive: 0x00ffcc, 
            emissiveIntensity: 0.8,
            roughness: 0.2,
            metalness: 1.0
        });
        this.coreMesh = new THREE.Mesh(coreGeo, coreMat);
        this.coreMesh.castShadow = true;
        this.mesh.add(this.coreMesh);

        // Внешняя стеклянная/металлическая оболочка
        const shellGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
        const shellMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.1,
            metalness: 0.8,
            transparent: true,
            opacity: 0.6,
            wireframe: true // Стильный киберпанк-лук
        });
        this.shellMesh = new THREE.Mesh(shellGeo, shellMat);
        this.shellMesh.castShadow = true;
        this.mesh.add(this.shellMesh);

        // Динамический свет от игрока
        this.pointLight = new THREE.PointLight(0x00ffcc, 1.5, 10);
        this.pointLight.position.set(0, 0.5, 0);
        this.mesh.add(this.pointLight);

        this.scene.add(this.mesh);
    }

    setupPhysics() {
        this.body = new PhysicsBody(this, false);
        this.body.setSize(0.9, 0.9, 0.9);
        this.body.setPosition(0, 5, 0);
        this.body.mass = 1.5;
        this.body.friction = 0.82; // Скольжение
        this.physicsWorld.addBody(this.body);
    }

    jump() {
        if (this.body.isGrounded) {
            this.currentJumps = 1;
            this.body.velocity.y = this.jumpForce;
            TelegramManager.vibrate('light');
        } else if (this.currentJumps < this.maxJumps) {
            this.currentJumps++;
            this.body.velocity.y = this.jumpForce * 0.8; // Второй прыжок чуть слабее
            TelegramManager.vibrate('medium');
            
            // В Модуле 2 здесь будет вызов системы частиц
        }
    }

    move(dirX, dirZ) {
        // Применяем силу для движения (инерция обрабатывается физикой)
        this.body.applyForce(new THREE.Vector3(dirX * this.speed, 0, dirZ * this.speed));
    }

    update(dt) {
        // Анимация меша (вращение ядра)
        this.coreMesh.rotation.x += 2 * dt;
        this.coreMesh.rotation.y += 3 * dt;
        
        // Сброс прыжков при касании земли
        if (this.body.isGrounded) {
            this.currentJumps = 0;
        }

        // В Модуле 2 добавим наклон (Tilt) оболочки в сторону движения
        const targetTiltZ = -this.body.velocity.x * 0.05;
        const targetTiltX = this.body.velocity.z * 0.05;
        this.shellMesh.rotation.z += (targetTiltZ - this.shellMesh.rotation.z) * 10 * dt;
        this.shellMesh.rotation.x += (targetTiltX - this.shellMesh.rotation.x) * 10 * dt;
    }

    onOutBounds() {
        // Респавн при падении
        TelegramManager.vibrate('heavy');
        this.body.setPosition(0, 10, 0);
        this.body.velocity.set(0,0,0);
    }
}

// ==========================================
// 5. ГЛАВНЫЙ ИГРОВОЙ ЦИКЛ (GAME CORE)
// ==========================================
class GameCore {
    constructor() {
        this.physics = new PhysicsWorld();
        this.renderEngine = new RenderEngine();
        
        this.clock = new THREE.Clock();
        this.isRunning = false;

        // Временный ввод для ПК (в Модуле 2 будет заменен на экранный UI)
        this.input = { up: false, down: false, left: false, right: false };
        
        this.init();
    }

    async init() {
        TelegramManager.init();
        
        // Имитация загрузки ассетов и данных из CloudStorage
        await new Promise(res => setTimeout(res, 1000));
        
        this.player = new Player(this.renderEngine.scene, this.physics);
        
        // Временная платформа для тестов
        this.createTestPlatform();

        this.setupInput();

        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);

        this.isRunning = true;
        this.loop();
    }

    createTestPlatform() {
        const geo = new THREE.BoxGeometry(20, 2, 20);
        const mat = new THREE.MeshStandardMaterial({ 
            color: 0x334455, roughness: 0.7, metalness: 0.1 
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(0, -1, 0);
        mesh.receiveShadow = true;
        this.renderEngine.scene.add(mesh);

        const body = new PhysicsBody({ mesh }, true);
        body.setSize(20, 2, 20);
        body.setPosition(0, -1, 0);
        this.physics.addBody(body);
    }

    setupInput() {
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') this.input.up = true;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') this.input.down = true;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.input.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') this.input.right = true;
            if (e.code === 'Space') this.player.jump();
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowUp' || e.code === 'KeyW') this.input.up = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') this.input.down = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.input.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') this.input.right = false;
        });
    }

    processInput() {
        let dirX = 0;
        let dirZ = 0;
        
        // Изометрическое управление (движение относительно камеры)
        if (this.input.up) { dirX -= 1; dirZ -= 1; }
        if (this.input.down) { dirX += 1; dirZ += 1; }
        if (this.input.left) { dirX -= 1; dirZ += 1; }
        if (this.input.right) { dirX += 1; dirZ -= 1; }

        // Нормализация вектора по диагонали
        if (dirX !== 0 || dirZ !== 0) {
            const len = Math.sqrt(dirX*dirX + dirZ*dirZ);
            dirX /= len; dirZ /= len;
            this.player.move(dirX, dirZ);
        }
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        
        if (!this.isRunning) return;

        const dt = this.clock.getDelta();

        this.processInput();
        
        // Шаг физики
        this.physics.step(dt);
        
        // Обновление сущностей
        this.player.update(dt);

        // Обновление камеры
        this.renderEngine.followTarget(this.player.body.position, dt);

        // Рендер кадра
        this.renderEngine.render();
    }
}

// Запуск приложения
window.onload = () => {
    const game = new GameCore();
};

</script>
</body>
</html>
