<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tower: Level Up</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0b1a; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; background: linear-gradient(to top, #0b0b1a, #1a1a3a); }
        
        .controls {
            position: fixed;
            bottom: 40px; 
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 10;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
            pointer-events: auto;
            touch-action: manipulation;
            backdrop-filter: blur(5px);
        }
        .btn:active { background: rgba(0, 210, 255, 0.5); border-color: #00d2ff; }
        #jumpBtn { width: 100px; border-radius: 25px; background: rgba(0, 210, 255, 0.15); border-color: #00d2ff;}

        /* Интерфейс меню и проигрыша */
        #uiOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 20;
            color: white;
        }
        .ui-btn {
            padding: 15px 40px;
            margin: 10px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            width: 260px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            box-shadow: 0 0 15px #00d2ff;
        }
        .ui-btn:active { transform: scale(0.95); }
        h2 { color: #FFD700; text-shadow: 0 0 10px #FFD700; margin-top: 0; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="controls" id="gameControls" style="display: none;">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">UP</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

    <div id="uiOverlay">
        <h2 id="menuLevel">УРОВЕНЬ 1</h2>
        <h1 id="menuTitle" style="font-size: 32px; margin-bottom: 20px;">NEON GLITCH</h1>
        <p id="menuInfo" style="margin-bottom: 30px; text-align: center;">Доберись до Золотой Платформы!<br>Остерегайся красного глитча снизу.</p>
        <button class="ui-btn" onclick="pressStart()">ПОЕХАЛИ!</button>
        <p id="totalCoinsUI" style="color: #FFD700; margin-top: 20px;">💰 Монеты: 0</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('uiOverlay');
        const gameControls = document.getElementById('gameControls');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let totalCoins = parseInt(localStorage.getItem('neonCoins')) || 0;
        let currentLevel = 1;
        let gameState = 'START'; // START, PLAYING, GAMEOVER

        class InputHandler {
            constructor() {
                this.keys = [];
                window.addEventListener('keydown', e => { if (!this.keys.includes(e.key)) this.keys.push(e.key); });
                window.addEventListener('keyup', e => { this.keys = this.keys.filter(k => k !== e.key); });
                this.bindTouch('leftBtn', 'ArrowLeft');
                this.bindTouch('rightBtn', 'ArrowRight');
                this.bindTouch('jumpBtn', ' ');
            }
            bindTouch(id, key) {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!this.keys.includes(key)) this.keys.push(key); });
                btn.addEventListener('touchend', (e) => { this.keys = this.keys.filter(k => k !== key); });
            }
        }

        class Platform {
            constructor(x, y, width, isFinish = false) {
                this.x = x; this.y = y; this.width = width; this.height = 25;
                this.isFinish = isFinish;
            }
            draw(ctx) {
                if (this.isFinish) {
                    ctx.fillStyle = '#FFD700'; // Золотой финиш
                    ctx.shadowBlur = 20; ctx.shadowColor = '#FFD700';
                } else {
                    ctx.fillStyle = '#222';
                }
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.fillStyle = this.isFinish ? '#FFF' : '#00ffcc';
                ctx.fillRect(this.x, this.y, this.width, 4);
                ctx.shadowBlur = 0;
            }
        }

        class Coin {
            constructor(x, y) {
                this.x = x; this.y = y; this.baseY = y;
                this.angle = Math.random() * Math.PI * 2;
                this.markedForDeletion = false;
            }
            update() { this.angle += 0.05; this.y = this.baseY + Math.sin(this.angle) * 5; }
            draw(ctx) {
                ctx.fillStyle = '#FFD700'; ctx.shadowBlur = 15; ctx.shadowColor = '#FFD700';
                ctx.beginPath(); ctx.arc(this.x + 10, this.y + 10, 8, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Player {
            constructor(game) {
                this.game = game;
                this.width = 30; this.height = 30;
                this.color = '#00d2ff';
                this.weight = 0.8; 
                this.reset();
            }
            reset() {
                this.x = canvas.width / 2 - 15; this.y = canvas.height - 100; 
                this.vx = 0; this.vy = 0; this.onGround = false;
            }
            update(input) {
                if (gameState !== 'PLAYING') return;
                if (input.keys.includes(' ') && this.onGround) { this.vy = -16; this.onGround = false; }
                if (input.keys.includes('ArrowRight')) this.vx = 7;
                else if (input.keys.includes('ArrowLeft')) this.vx = -7;
                else this.vx *= 0.8;

                this.vy += this.weight; this.y += this.vy;
                this.onGround = false;
                
                this.game.platforms.forEach(plat => {
                    if (this.x < plat.x + plat.width && this.x + this.width > plat.x &&
                        this.y < plat.y + plat.height && this.y + this.height > plat.y) {
                        if (this.vy > 0 && this.y + this.height - this.vy <= plat.y + 15) {
                            this.onGround = true; this.vy = 0; this.y = plat.y - this.height;
                            if (plat.isFinish) { winLevel(); }
                        }
                    }
                });

                this.x += this.vx;
                if (this.x > canvas.width) this.x = -this.width;
                if (this.x < -this.width) this.x = canvas.width;
            }
            draw(ctx) {
                ctx.fillStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height); ctx.shadowBlur = 0;
            }
        }

        class Game {
            constructor(level) {
                this.player = new Player(this);
                this.input = new InputHandler();
                this.platforms = []; this.coins = [];
                this.cameraY = 0;
                this.levelHeight = 1500 + (level * 800); // Высота уровня растет
                this.glitchY = canvas.height + 100;
                this.glitchSpeed = 1.2 + (level * 0.2); // Лава ускоряется с уровнем
                this.platformY = canvas.height - 50;
                
                // Стартовая платформа
                this.platforms.push(new Platform(0, this.platformY, canvas.width));
                this.buildLevel();
            }

            buildLevel() {
                // Генерируем платформы до цели
                let targetY = -this.levelHeight;
                while (this.platformY > targetY) {
                    this.platformY -= 90 + Math.random() * 40;
                    let width = 70 + Math.random() * 100;
                    let x = Math.random() * (canvas.width - width);
                    this.platforms.push(new Platform(x, this.platformY, width));

                    if (Math.random() > 0.6) {
                        this.coins.push(new Coin(x + width/2 - 10, this.platformY - 35));
                    }
                }
                // Последняя золотая платформа
                this.platforms.push(new Platform(0, targetY - 100, canvas.width, true));
            }

            update() {
                if (gameState !== 'PLAYING') return;

                this.player.update(this.input);
                this.coins.forEach(c => c.update());

                // Лава ползет вверх
                this.glitchY -= this.glitchSpeed;

                // Камера следует за игроком
                if (this.player.y < this.cameraY + canvas.height / 2) {
                    this.cameraY = this.player.y - canvas.height / 2;
                }

                // Сбор монет
                this.coins.forEach(coin => {
                    if (!coin.markedForDeletion && 
                        this.player.x < coin.x + 20 && this.player.x + this.player.width > coin.x &&
                        this.player.y < coin.y + 20 && this.player.y + this.player.height > coin.y) {
                        coin.markedForDeletion = true;
                        totalCoins++;
                        localStorage.setItem('neonCoins', totalCoins);
                    }
                });
                this.coins = this.coins.filter(c => !c.markedForDeletion);
                
                // СМЕРТЬ
                if (this.player.y + this.player.height > this.glitchY || this.player.y > this.cameraY + canvas.height + 200) {
                    gameOver();
                }
            }

            draw(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.translate(0, -this.cameraY);

                this.platforms.forEach(p => p.draw(ctx));
                this.coins.forEach(c => c.draw(ctx));
                this.player.draw(ctx);

                // Лава
                ctx.fillStyle = 'rgba(255, 0, 50, 0.6)';
                ctx.fillRect(0, this.glitchY, canvas.width, canvas.height * 2);
                ctx.fillStyle = '#ff0033';
                ctx.fillRect(0, this.glitchY, canvas.width, 10);

                ctx.restore();

                // UI во время игры
                if (gameState === 'PLAYING') {
                    ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial';
                    ctx.fillText(`УРОВЕНЬ ${currentLevel}`, 20, 40);
                    ctx.fillStyle = '#FFD700'; ctx.textAlign = 'right';
                    ctx.fillText(`💰 ${totalCoins}`, canvas.width - 20, 40);
                    ctx.textAlign = 'left';
                    
                    // Индикатор прогресса (сколько осталось до верха)
                    let progress = Math.min(1, Math.abs(this.player.y - (canvas.height - 100)) / (this.levelHeight + canvas.height));
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(canvas.width/2 - 50, 25, 100, 10);
                    ctx.fillStyle = '#00d2ff';
                    ctx.fillRect(canvas.width/2 - 50, 25, 100 * progress, 10);
                }
            }
        }

        let game = new Game(currentLevel);

        function animate() {
            game.update();
            game.draw(ctx);
            requestAnimationFrame(animate);
        }

        function pressStart() {
            gameState = 'PLAYING';
            uiOverlay.style.display = 'none';
            gameControls.style.display = 'flex';
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            gameControls.style.display = 'none';
            uiOverlay.style.display = 'flex';
            document.getElementById('menuLevel').innerText = `УРОВЕНЬ ${currentLevel}`;
            document.getElementById('menuTitle').innerText = `ИГРА ОКОНЧЕНА`;
            document.getElementById('menuInfo').innerText = `Тебя поглотил глитч!`;
            updateCoinUI();
        }

        function winLevel() {
            gameState = 'GAMEOVER';
            gameControls.style.display = 'none';
            uiOverlay.style.display = 'flex';
            currentLevel++;
            document.getElementById('menuLevel').innerText = `ПОБЕДА!`;
            document.getElementById('menuTitle').innerText = `УРОВЕНЬ ПРОЙДЕН`;
            document.getElementById('menuInfo').innerText = `Готов к уровню ${currentLevel}?`;
            updateCoinUI();
            game = new Game(currentLevel); // Готовим следующий уровень
        }

        function updateCoinUI() {
            document.getElementById('totalCoinsUI').innerText = `💰 Монеты: ${totalCoins}`;
        }

        updateCoinUI();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
