<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jumper TMA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; user-select: none; }
        canvas { display: block; background: #0b0b1a; } /* Сделал фон чуть темнее (ночное небо) */
        
        .controls {
            position: fixed;
            bottom: 80px; /* Чуть опустил кнопки для удобства */
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            pointer-events: auto;
            touch-action: manipulation;
        }
        .btn:active { background: #00d2ff; border-color: #00d2ff; }
        #jumpBtn { width: 90px; border-radius: 20px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">UP</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Базовая высота для платформ
        const BASE_Y = canvas.height - 250; 

        // --- ВВОД ---
        class InputHandler {
            constructor() {
                this.keys = [];
                window.addEventListener('keydown', e => {
                    if (!this.keys.includes(e.key)) this.keys.push(e.key);
                });
                window.addEventListener('keyup', e => {
                    this.keys = this.keys.filter(k => k !== e.key);
                });

                this.bindTouch('leftBtn', 'ArrowLeft');
                this.bindTouch('rightBtn', 'ArrowRight');
                this.bindTouch('jumpBtn', ' ');
            }
            bindTouch(id, key) {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!this.keys.includes(key)) this.keys.push(key); });
                btn.addEventListener('touchend', (e) => { this.keys = this.keys.filter(k => k !== key); });
            }
        }

        // --- ЧАСТИЦЫ ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 6 + 2;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 1) * 12;
                this.gravity = 0.6;
                this.life = 1.0;
            }
            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        // --- ПЛАТФОРМА ---
        class Platform {
            constructor(x, y, width) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = 40; // Толщина платформы
            }
            draw(ctx) {
                ctx.fillStyle = '#222';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Верхняя неоновая кромка
                ctx.fillStyle = '#00ffcc';
                ctx.fillRect(this.x, this.y, this.width, 4);
            }
        }

        // --- ИГРОК ---
        class Player {
            constructor(game) {
                this.game = game;
                this.width = 30;  // УМЕНЬШИЛИ ДО 30
                this.height = 30; // УМЕНЬШИЛИ ДО 30
                this.color = '#00d2ff';
                this.weight = 0.9;
                this.reset();
            }
            reset() {
                this.x = 100;
                this.y = BASE_Y - 100; // Падаем сверху на первую платформу
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.visible = true;
            }
            update(input) {
                if (!this.visible) return;

                // Управление
                if (input.keys.includes(' ') && this.onGround) {
                    this.vy = -16; // Чуть слабее прыжок, так как мы меньше
                    this.onGround = false;
                }
                if (input.keys.includes('ArrowRight')) this.vx = 6;
                else if (input.keys.includes('ArrowLeft')) this.vx = -6;
                else this.vx *= 0.8;

                // Применяем гравитацию
                this.vy += this.weight;
                
                // Двигаем по Y
                this.y += this.vy;
                
                // Проверка платформ
                this.onGround = false;
                this.game.platforms.forEach(plat => {
                    if (this.x < plat.x + plat.width && this.x + this.width > plat.x &&
                        this.y < plat.y + plat.height && this.y + this.height > plat.y) {
                        
                        // Если падаем сверху на платформу
                        if (this.vy > 0 && this.y + this.height - this.vy <= plat.y + 10) {
                            this.onGround = true;
                            this.vy = 0;
                            this.y = plat.y - this.height;
                        }
                    }
                });

                // Двигаем по X
                this.x += this.vx;
                if (this.x < 0) this.x = 0;

                // ПРОВАЛ В ПРОПАСТЬ (Смерть)
                if (this.y > canvas.height + 100) {
                    this.game.die();
                }
            }
            draw(ctx) {
                if (!this.visible) return;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        // --- ШИПЫ ---
        class Obstacle {
            constructor(x, y) {
                this.width = 30;
                this.height = 30; // Уменьшили шипы
                this.x = x;
                this.y = y - this.height; // Стоят на платформе
            }
            draw(ctx) {
                ctx.fillStyle = '#ff0055';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.fill();
            }
        }

        // --- ДВЕРЬ ---
        class Door {
            constructor(x, y) {
                this.width = 40;  // УМЕНЬШИЛИ ДВЕРЬ
                this.height = 60; // УМЕНЬШИЛИ ДВЕРЬ
                this.x = x;
                this.y = y - this.height;
            }
            draw(ctx) {
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'white';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 8, this.y + 30, 8, 8); // Ручка
                ctx.shadowBlur = 0;
            }
        }

        // --- ДВИЖОК ---
        class Game {
            constructor() {
                this.player = new Player(this);
                this.input = new InputHandler();
                this.level = 1;
                this.particles = [];
                this.cameraX = 0;
                this.platforms = [];
                this.obstacles = [];
                this.loadLevel();
            }

            loadLevel() {
                this.platforms = [];
                this.obstacles = [];
                this.particles = [];
                
                let currentX = 0;
                
                // 1. Стартовая длинная платформа (чтобы безопасно появиться)
                this.platforms.push(new Platform(currentX, BASE_Y, 500));
                currentX += 500;

                // 2. Генерация трассы (чем больше уровень, тем больше прыжков)
                const jumpsCount = 5 + (this.level * 3);
                
                for (let i = 0; i < jumpsCount; i++) {
                    // Пропасть
                    let gap = 80 + Math.random() * 80; // Расстояние от 80 до 160 пикселей
                    currentX += gap;
                    
                    // Платформа
                    let platWidth = 150 + Math.random() * 200;
                    // Платформы могут быть чуть выше или ниже
                    let platY = BASE_Y - 40 + Math.random() * 80; 
                    
                    this.platforms.push(new Platform(currentX, platY, platWidth));

                    // Случайно ставим шипы на платформу (но не на самые короткие)
                    if (Math.random() > 0.4 && platWidth > 200) {
                        let spikeX = currentX + platWidth / 2 - 15;
                        this.obstacles.push(new Obstacle(spikeX, platY));
                    }
                    
                    currentX += platWidth;
                }

                // 3. Финальная платформа с дверью
                currentX += 100;
                this.platforms.push(new Platform(currentX, BASE_Y, 300));
                this.door = new Door(currentX + 150, BASE_Y);

                this.player.reset();
            }

            die() {
                if (!this.player.visible) return;
                
                // Спавним частицы там, где умер игрок
                for (let i = 0; i < 30; i++) {
                    this.particles.push(new Particle(this.player.x + 15, this.player.y + 15, this.player.color));
                }
                
                this.player.visible = false;
                
                // Ждем секунду и перерождаемся
                setTimeout(() => {
                    this.player.reset();
                }, 1000);
            }

            update() {
                this.player.update(this.input);

                this.particles.forEach(p => p.update());
                this.particles = this.particles.filter(p => p.life > 0);

                if (this.player.visible) {
                    // Смерть от шипов
                    this.obstacles.forEach(obs => {
                        if (this.checkCollision(this.player, obs)) {
                            this.die();
                        }
                    });

                    // Победа
                    if (this.checkCollision(this.player, this.door)) {
                        this.level++;
                        this.loadLevel();
                    }
                }

                // Камера следит за игроком
                this.cameraX = this.player.x - canvas.width / 3;
                if (this.cameraX < 0) this.cameraX = 0;
            }

            draw(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.translate(-this.cameraX, 0);

                // Отрисовка мира
                this.platforms.forEach(plat => plat.draw(ctx));
                this.door.draw(ctx);
                this.obstacles.forEach(obs => obs.draw(ctx));
                this.particles.forEach(p => p.draw(ctx));
                this.player.draw(ctx);

                ctx.restore();

                // Отрисовка UI
                ctx.fillStyle = 'white';
                ctx.font = '24px Arial';
                ctx.fillText(`Уровень: ${this.level}`, 20, 40);
            }

            checkCollision(p, o) {
                return (p.x + 4 < o.x + o.width &&
                        p.x + p.width - 4 > o.x &&
                        p.y + 4 < o.y + o.height &&
                        p.y + p.height - 4 > o.y);
            }
        }

        const game = new Game();
        function animate() {
            game.update();
            game.draw(ctx);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
