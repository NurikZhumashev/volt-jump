<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Grapple: Puzzle Platformer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0b1a; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(11,11,26,0.85) 0%, rgba(0,0,0,0.98) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 20; color: white; transition: opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0; visibility: hidden;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; transform: scale(1); }
            50% { text-shadow: 0 0 20px #00d2ff, 0 0 40px #00d2ff; transform: scale(1.05); }
            100% { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; transform: scale(1); }
        }

        h1 { font-size: 42px; margin-bottom: 5px; text-align: center; color: #fff; animation: neonPulse 2s infinite; font-weight: 900; letter-spacing: 3px; margin-top:0;}
        h2 { color: #FFD700; text-shadow: 0 0 15px #FFD700; font-size: 30px; margin: 0 0 15px 0; text-align: center; letter-spacing: 2px; }

        .ui-btn {
            padding: 16px 40px; margin: 8px; border-radius: 40px; font-size: 16px; font-weight: bold;
            border: 2px solid rgba(255,255,255,0.1); color: white; cursor: pointer; text-transform: uppercase; width: 280px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
            transition: all 0.2s ease;
        }
        .btn-shop { background: linear-gradient(45deg, #f5af19, #f12711); box-shadow: 0 5px 20px rgba(241, 39, 17, 0.3); }
        .btn-back { background: transparent; border: 2px solid #555; box-shadow: none; margin-top: 15px; }
        .ui-btn:active { transform: scale(0.95); }
        .ui-btn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        #levelGrid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            width: 90%; max-width: 380px; max-height: 50vh; overflow-y: auto;
            padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lvl-btn {
            aspect-ratio: 1; border-radius: 10px; border: none; font-size: 16px; font-weight: bold;
            color: white; background: #222; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .lvl-btn.completed { background: #111; color: #4caf50; border: 1px solid #4caf50; }
        .lvl-btn.current { background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 0 10px #00d2ff; animation: neonPulse 1.5s infinite; }
        .lvl-btn.locked { background: #1a1a2e; color: #555; cursor: not-allowed; }
        .lvl-btn:active:not(:disabled) { transform: scale(0.9); }

        #shopList { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 12px; width: 95%; max-width: 500px; max-height: 65vh; overflow-y: auto; padding: 5px; 
        }
        .shop-card {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center; position: relative;
        }
        .shop-card h3 { margin: 10px 0 5px 0; font-size: 18px; }
        .shop-card p { font-size: 12px; color: #aaa; margin: 0 0 10px 0; line-height: 1.2; flex-grow: 1; }
        .shop-btn { padding: 8px; width: 100%; border-radius: 8px; font-size: 13px; border: none; cursor: pointer; font-weight: bold; color: white; background: #4caf50; transition: 0.2s; }
        .shop-btn:disabled { background: #444; color: #777; }
        .shop-btn.equip { background: #00d2ff; }
        .lvl-badge { position: absolute; top: -5px; right: -5px; background: #ff0055; color: white; font-size: 10px; padding: 4px 6px; border-radius: 8px; font-weight: bold; border: 1px solid #fff;}

        .top-hud { position: fixed; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .hud-text { font-size: 22px; font-weight: bold; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .coin-hud { color: #FFD700; text-shadow: 0 0 10px #FFD700; }
        .lives-hud { color: #ff0055; text-shadow: 0 0 10px #ff0055; margin-top: 5px; font-size: 18px;}
        
        .pause-btn {
            background: rgba(0, 0, 0, 0.6); border: 2px solid rgba(255,255,255,0.2);
            color: white; font-size: 20px; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; display: flex;
            justify-content: center; align-items: center; transition: 0.2s;
            pointer-events: auto; backdrop-filter: blur(5px);
        }
        .pause-btn:active { transform: scale(0.85); }
    </style>
</head>
<body onclick="sfx.init()">

    <canvas id="gameCanvas"></canvas>

    <div class="top-hud" id="gameHud" style="display:none;">
        <div>
            <div class="hud-text" id="hudLeft">УРОВЕНЬ 1</div>
            <div class="lives-hud" id="hudLives"></div>
        </div>
        <div style="display: flex; align-items: flex-start; gap: 15px;">
            <div class="hud-text coin-hud" id="hudCoins" style="line-height: 40px;">💰 0</div>
            <button class="pause-btn" onclick="togglePause()">⏸</button>
        </div>
    </div>

    <div id="pauseMenu" class="overlay" style="z-index: 25;">
        <h2 style="color: white; text-shadow: 0 0 15px #fff;">ПАУЗА</h2>
        <button class="ui-btn" onclick="togglePause()">ПРОДОЛЖИТЬ</button>
        <button class="ui-btn btn-back" onclick="quitGame()">В МЕНЮ</button>
    </div>

    <div id="mainMenu" class="overlay active">
        <h1 style="font-size: 48px; color: #00d2ff; text-shadow: 0 0 20px #00d2ff; animation: none;">NEON</h1>
        <h1 style="margin-top: -15px;">GRAPPLE</h1>
        <p style="color: #ccc; margin-bottom: 5px; font-size: 14px; text-align: center;">ВЕРХ ЭКРАНА - Крюк<br>НИЗ ЦЕНТР - Прыжок</p>
        <button class="ui-btn" onclick="showState('LEVELS')">ИГРАТЬ</button>
        <button class="ui-btn btn-shop" onclick="showState('SHOP')">АРСЕНАЛ</button>
        <p class="coin-hud" style="font-size: 26px; margin-top: 15px;" id="menuCoins">💰 0</p>
    </div>

    <div id="levelMenu" class="overlay">
        <h2>ГОЛОВОЛОМКИ</h2>
        <div id="levelGrid"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="shopMenu" class="overlay">
        <h2 style="margin-bottom: 5px;">АРСЕНАЛ</h2>
        <p class="coin-hud" style="font-size: 22px; margin-top: 0; margin-bottom: 15px;" id="shopCoins">💰 0</p>
        <div id="shopList"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="endMenu" class="overlay">
        <h2 id="endTitle">УРОВЕНЬ ПРОЙДЕН</h2>
        <p id="endDesc" style="color: #ccc; font-size: 18px; margin-bottom: 30px;">Молодец!</p>
        <button class="ui-btn" id="endBtn1" onclick="nextAction()">ДАЛЕЕ</button>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">В МЕНЮ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth || document.documentElement.clientWidth || 400;
            canvas.height = window.innerHeight || document.documentElement.clientHeight || 800;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- СОХРАНЕНИЯ ---
        const SAVE = {
            coins: parseInt(localStorage.getItem('neonCoins')) || 0,
            maxLevel: parseInt(localStorage.getItem('neonGrappleMaxLevel')) || 1,
            hookLevel: parseInt(localStorage.getItem('neonHookLvl')) || 1,
            lives: parseInt(localStorage.getItem('neonShields')) || 0,
            skin: localStorage.getItem('neonSkin') || '#00d2ff',
            ownedSkins: JSON.parse(localStorage.getItem('neonSkins')) || ['#00d2ff'],
            trail: localStorage.getItem('neonTrail') || 'none',
            ownedTrails: JSON.parse(localStorage.getItem('neonTrails')) || ['none']
        };

        function saveGame() {
            localStorage.setItem('neonCoins', SAVE.coins);
            localStorage.setItem('neonGrappleMaxLevel', SAVE.maxLevel);
            localStorage.setItem('neonHookLvl', SAVE.hookLevel);
            localStorage.setItem('neonShields', SAVE.lives);
            localStorage.setItem('neonSkin', SAVE.skin);
            localStorage.setItem('neonSkins', JSON.stringify(SAVE.ownedSkins));
            localStorage.setItem('neonTrail', SAVE.trail);
            localStorage.setItem('neonTrails', JSON.stringify(SAVE.ownedTrails));
            updateUI();
        }

        const overlays = { MAIN: document.getElementById('mainMenu'), LEVELS: document.getElementById('levelMenu'), SHOP: document.getElementById('shopMenu'), END: document.getElementById('endMenu'), PAUSE: document.getElementById('pauseMenu') };
        const gameHud = document.getElementById('gameHud');
        let gameState = 'START'; 
        let currentLevelIdx = 1;

        function showState(state) {
            sfx.init();
            Object.values(overlays).forEach(el => el.classList.remove('active'));
            gameHud.style.display = 'none';
            if(overlays[state]) overlays[state].classList.add('active');
            updateUI();
        }

        function togglePause() {
            if (gameState === 'PLAYING') {
                gameState = 'PAUSED'; document.getElementById('pauseMenu').classList.add('active');
                if (sfx.ctx && sfx.ctx.state === 'running') sfx.ctx.suspend(); 
            } else if (gameState === 'PAUSED') {
                gameState = 'PLAYING'; document.getElementById('pauseMenu').classList.remove('active');
                if (sfx.ctx && sfx.ctx.state === 'suspended') sfx.ctx.resume(); 
            }
        }

        function quitGame() {
            gameState = 'END'; document.getElementById('pauseMenu').classList.remove('active');
            if (sfx.ctx && sfx.ctx.state === 'suspended') sfx.ctx.resume(); 
            sfx.stopBGM(); saveGame(); showState('MAIN');
        }

        function updateUI() {
            document.getElementById('menuCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('shopCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('hudCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('hudLives').innerText = SAVE.lives > 0 ? `🛡️ ${SAVE.lives}` : '';
            renderShop(); renderLevels();
        }

        function renderLevels() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 5; i++) { // У нас 5 уровней пока
                let btn = document.createElement('button'); btn.className = 'lvl-btn'; 
                if (i < SAVE.maxLevel) { btn.classList.add('completed'); btn.innerText = i; } 
                else if (i === SAVE.maxLevel) { btn.classList.add('current'); btn.innerText = i; } 
                else { btn.classList.add('locked'); btn.innerText = '🔒'; btn.disabled = true; }
                btn.onclick = () => startGame(i);
                grid.appendChild(btn);
            }
        }

        function renderShop() {
            const list = document.getElementById('shopList');
            list.innerHTML = '';
            const items = [
                { id: 'upg_hook', name: 'ДЛИНА КРЮКА 🪝', desc: 'Увеличивает дальность захвата.', price: SAVE.hookLevel * 150, type: 'upg_hook', lvl: SAVE.hookLevel, maxed: SAVE.hookLevel >= 5 },
                { id: 'shield', name: 'ЭНЕРГО-ЩИТ 🛡️', desc: 'Поглощает 1 смертельный урон.', price: 100, type: 'consumable', lvl: SAVE.lives },
                { id: '#39ff14', name: 'ТОКСИК 🟢', desc: 'Скин', price: 300, type: 'skin' },
                { id: '#FFD700', name: 'ЗОЛОТО 🟡', desc: 'Скин', price: 1000, type: 'skin' },
                { id: 'none', name: 'ОБЫЧНЫЙ ❌', desc: 'Убрать шлейф.', price: 0, type: 'trail' },
                { id: 'fire', name: 'ПЛАМЯ 🔥', desc: 'Огненный шлейф.', price: 800, type: 'trail' },
                { id: 'rainbow', name: 'РАДУГА 🌈', desc: 'Неоновый перелив.', price: 1500, type: 'trail' }
            ];

            items.forEach(item => {
                let actionText = `КУПИТЬ (${item.price} 💰)`;
                let btnClass = 'shop-btn'; let disabled = SAVE.coins < item.price; let badge = '';

                if (item.type === 'upg_hook') {
                    badge = `<div class="lvl-badge">LVL ${item.lvl}</div>`;
                    if (item.maxed) { actionText = 'МАКСИМУМ'; disabled = true; }
                }
                if (item.type === 'consumable') badge = `<div class="lvl-badge">У ВАС: ${item.lvl}</div>`;
                
                if (item.type === 'skin') {
                    if (SAVE.ownedSkins.includes(item.id)) {
                        disabled = false;
                        if (SAVE.skin === item.id) { actionText = 'НАДЕТО'; disabled = true; btnClass += ' equip'; }
                        else { actionText = 'НАДЕТЬ'; btnClass += ' equip'; }
                    }
                }
                
                if (item.type === 'trail') {
                    if (SAVE.ownedTrails.includes(item.id)) {
                        disabled = false;
                        if (SAVE.trail === item.id) { actionText = 'НАДЕТО'; disabled = true; btnClass += ' equip'; }
                        else { actionText = 'НАДЕТЬ'; btnClass += ' equip'; }
                    }
                }

                let titleColor = item.type === 'skin' ? item.id : (item.type === 'trail' && item.id !== 'none' ? '#00d2ff' : '#ff0055');

                list.innerHTML += `
                    <div class="shop-card">
                        ${badge}
                        <h3 style="color:${titleColor}">${item.name}</h3>
                        <p>${item.desc}</p>
                        <button class="${btnClass}" ${disabled ? 'disabled' : ''} onclick="handleBuy('${item.id}', '${item.type}', ${item.price})">${actionText}</button>
                    </div>
                `;
            });
        }

        function handleBuy(id, type, price) {
            if (type === 'skin' && SAVE.ownedSkins.includes(id)) { SAVE.skin = id; sfx.jump(); saveGame(); return; }
            if (type === 'trail' && SAVE.ownedTrails.includes(id)) { SAVE.trail = id; sfx.jump(); saveGame(); return; }
            
            if (SAVE.coins >= price) {
                SAVE.coins -= price;
                if (type === 'upg_hook') SAVE.hookLevel++;
                if (type === 'consumable') SAVE.lives++;
                if (type === 'skin') { SAVE.ownedSkins.push(id); SAVE.skin = id; }
                if (type === 'trail') { SAVE.ownedTrails.push(id); SAVE.trail = id; }
                sfx.purchase(); saveGame();
            }
        }

        // --- АУДИО ---
        class SoundEngine {
            constructor() { this.ctx = null; this.bgmStarted = false; this.bgmInterval = null; }
            init() {
                if (!this.ctx) { try { const AudioCtx = window.AudioContext || window.webkitAudioContext; if (AudioCtx) this.ctx = new AudioCtx(); } catch(e) {} }
                if (this.ctx && this.ctx.state === 'suspended' && gameState !== 'PAUSED') this.ctx.resume();
                if (!this.bgmStarted) this.startBGM();
            }
            playTone(freq, type, duration, vol=0.2) {
                if(!this.ctx || this.ctx.state !== 'running') return;
                try {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            }
            jump() { this.playTone(350, 'sine', 0.15, 0.2); } 
            grapple() { this.playTone(800, 'sine', 0.1, 0.1); setTimeout(() => this.playTone(1200, 'sine', 0.1, 0.1), 50); }
            button() { this.playTone(500, 'square', 0.2, 0.2); }
            coin() { this.playTone(2000, 'sine', 0.1, 0.1); setTimeout(() => this.playTone(3000, 'square', 0.1, 0.05), 50); }
            purchase() { this.playTone(1000, 'square', 0.3, 0.1); }
            death() {
                if(!this.ctx) return; 
                try {
                    const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 1.0);
                    gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 1.0);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 1.0);
                } catch(e) {}
            }
            startBGM() {
                if (!this.ctx || this.bgmStarted) return;
                this.bgmStarted = true;
                const playNote = (time, freq, vol, type, duration) => {
                    try {
                        const osc = this.ctx.createOscillator(); const g = this.ctx.createGain();
                        osc.type = type; osc.frequency.value = freq; g.gain.setValueAtTime(vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + duration);
                        osc.connect(g); g.connect(this.ctx.destination); osc.start(time); osc.stop(time + duration);
                    } catch(e) {}
                };
                let step = 0;
                this.bgmInterval = setInterval(() => {
                    if(this.ctx.state !== 'running' || gameState === 'PAUSED') return; 
                    const now = this.ctx.currentTime;
                    // Атмосферный бас платформера
                    const bassNotes = [130, 0, 146, 0, 164, 0, 146, 0];
                    if (bassNotes[step]) playNote(now, bassNotes[step], 0.05, 'triangle', 0.2);
                    step = (step + 1) % 8;
                }, 200); 
            }
            stopBGM() { clearInterval(this.bgmInterval); this.bgmStarted = false; }
        }
        const sfx = new SoundEngine();

        // --- УМНОЕ УПРАВЛЕНИЕ ---
        class InputHandler {
            constructor() {
                this.keys = [];
                window.addEventListener('keydown', e => { if (!this.keys.includes(e.key)) this.keys.push(e.key); });
                window.addEventListener('keyup', e => { this.keys = this.keys.filter(k => k !== e.key); });
                
                const handleTouch = (e) => {
                    if (gameState !== 'PLAYING') return; e.preventDefault(); this.keys = []; 
                    for (let i = 0; i < e.touches.length; i++) {
                        let x = e.touches[i].clientX;
                        let y = e.touches[i].clientY;
                        let w = canvas.width;
                        let h = canvas.height;
                        
                        if (y < h * 0.5) {
                            this.keys.push('Hook'); // Верхняя половина - КРЮК
                        } else {
                            if (x < w * 0.33) this.keys.push('ArrowLeft'); // Слева снизу
                            else if (x > w * 0.66) this.keys.push('ArrowRight'); // Справа снизу
                            else this.keys.push('ArrowUp'); // Центр снизу - ПРЫЖОК
                        }
                    }
                };
                const handleTouchEnd = (e) => { if (e.touches.length === 0) this.keys = []; else handleTouch(e); };
                canvas.addEventListener('touchstart', handleTouch, {passive: false});
                canvas.addEventListener('touchmove', handleTouch, {passive: false});
                canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
            }
        }

        class Particle {
            constructor(x, y, color, isFire = false, speedMult = 1, text = null) {
                this.x = x; this.y = y; this.color = color; this.text = text;
                this.size = Math.random() * (isFire ? 10 : 6) + 2;
                this.vx = (Math.random() - 0.5) * (isFire ? 5 : 12) * speedMult;
                this.vy = (Math.random() - 0.5) * 12 * speedMult; 
                this.life = 1.0; this.decay = isFire ? 0.05 : 0.03;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw(ctx) { 
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; 
                ctx.shadowBlur = 10; ctx.shadowColor = this.color; 
                if (this.text) { ctx.font = 'bold 16px monospace'; ctx.fillText(this.text, this.x, this.y); } 
                else { ctx.fillRect(this.x, this.y, this.size, this.size); }
                ctx.shadowBlur = 0; ctx.globalAlpha = 1.0; 
            }
        }

        // --- ДИЗАЙН УРОВНЕЙ (40x40 пикселей тайл) ---
        // . пусто, # стена, ^ шипы, O крюк, B кнопка, L лазер, D дверь, C монета, @ спавн
        const LEVEL_MAPS = [
            // 1: Обучение движению и прыжку
            [
                "..........................",
                "..........................",
                "..........................",
                "..........................",
                ".......................D..",
                ".................C...#####",
                ".............C..###..#",
                "........C...###......#",
                "@......###...........#",
                "######...............#",
                "######################"
            ],
            // 2: Обучение Шипам и Кнопкам
            [
                "..........................",
                "..........................",
                "..........................",
                "...................L...D..",
                "...................L.#####",
                "......C.........C..L.#",
                ".....###.......###.L.#",
                ".........C...C.....L.#",
                "@..B....###.###....L.#",
                "####..#^^^^^^^^^#..L.#",
                "#######^^^^^^^^^######"
            ],
            // 3: Обучение КРЮКУ (Узлы 'O')
            [
                "..........................",
                "..........................",
                "..........O...............",
                ".......................D..",
                ".....................#####",
                ".....................#",
                ".....................#",
                ".....................#",
                "@................C...#",
                "###...#^^^^^^^#..##..#",
                "#######^^^^^^^########"
            ],
            // 4: Паркур и тайминги
            [
                "..........................",
                ".......O..................",
                "...................L...D..",
                "...............O...L.#####",
                "...................L.#",
                "...................L.#",
                ".........C.........L.#",
                "........###........L.#",
                "@..B...........C...L.#",
                "####.........#####.L.#",
                "####^^^^^^^^^#########"
            ],
            // 5: Хардкор Комбо
            [
                "...................................",
                "............O......................",
                "........................L.......D..",
                "....................O...L.....#####",
                ".....O..................L.....#",
                "..............C.........L.....#",
                ".............###........L.....#",
                ".......C................L.....#",
                "@.B...###..........C....L.....#",
                "###..............#####..L.....#",
                "###^^^^^^^^^^^^^^^^^^^^^^^^^^^#"
            ]
        ];

        const TILE = 40;

        class Game {
            constructor(levelIdx) {
                this.levelIdx = levelIdx;
                this.input = new InputHandler(); 
                this.particles = [];
                
                this.walls = []; this.spikes = []; this.nodes = []; this.coins = [];
                this.buttons = []; this.lasers = []; this.door = null;
                
                this.cameraX = 0; this.cameraY = 0;
                this.player = new Player(this);

                this.loadLevel(LEVEL_MAPS[levelIdx - 1]);
            }

            loadLevel(mapArray) {
                for (let r = 0; r < mapArray.length; r++) {
                    for (let c = 0; c < mapArray[r].length; c++) {
                        let char = mapArray[r][c];
                        let x = c * TILE; let y = r * TILE;
                        
                        if (char === '#') this.walls.push({x, y, w: TILE, h: TILE});
                        if (char === '^') this.spikes.push({x, y: y+20, w: TILE, h: 20}); // Шипы занимают нижнюю половину
                        if (char === 'O') this.nodes.push({x: x + TILE/2, y: y + TILE/2}); // Центр узла
                        if (char === 'B') this.buttons.push({x: x+5, y: y+30, w: 30, h: 10, pressed: false});
                        if (char === 'L') this.lasers.push({x: x+15, y, w: 10, h: TILE, active: true});
                        if (char === 'C') this.coins.push({x: x + TILE/2, y: y + TILE/2, collected: false});
                        if (char === 'D') this.door = {x: x, y: y-40, w: 60, h: 80}; // Дверь большая
                        if (char === '@') { this.player.x = x; this.player.y = y; }
                    }
                }
            }

            update() {
                if (gameState !== 'PLAYING') return;

                this.player.update(this.input);
                this.particles.forEach(p => p.update()); 
                this.particles = this.particles.filter(p => p.life > 0);
                
                // Умная камера (следит за игроком)
                let targetCX = this.player.x - canvas.width / 3;
                let targetCY = this.player.y - canvas.height / 2;
                this.cameraX += (targetCX - this.cameraX) * 0.1;
                this.cameraY += (targetCY - this.cameraY) * 0.1;

                // КНОПКИ И ЛАЗЕРЫ
                let anyButtonPressed = false;
                this.buttons.forEach(b => {
                    // Игрок наступает на кнопку
                    if (this.player.x < b.x + b.w && this.player.x + 30 > b.x && this.player.y + 30 >= b.y && this.player.y < b.y + b.h) {
                        if (!b.pressed) sfx.button();
                        b.pressed = true; anyButtonPressed = true;
                    } else {
                        b.pressed = false;
                    }
                });

                // Лазеры отключаются, если нажата любая кнопка
                this.lasers.forEach(l => l.active = !anyButtonPressed);

                // СМЕРТЬ ОТ ШИПОВ ИЛИ ЛАЗЕРОВ
                let dead = false;
                this.spikes.forEach(s => {
                    if (this.player.x < s.x + s.w - 5 && this.player.x + 30 > s.x + 5 && this.player.y + 30 > s.y + 5) dead = true;
                });
                this.lasers.forEach(l => {
                    if (l.active && this.player.x < l.x + l.w && this.player.x + 30 > l.x && this.player.y + 30 > l.y && this.player.y < l.y + l.h) dead = true;
                });
                if (this.player.y > 3000) dead = true; // Упал в бездну

                if (dead) {
                    if (SAVE.lives > 0) {
                        SAVE.lives--; saveGame(); sfx.powerup();
                        for(let i=0; i<30; i++) this.particles.push(new Particle(this.player.x+15, this.player.y+15, '#00d2ff', false, 2));
                        this.player.vy = -20; // Щит подкидывает вверх
                    } else {
                        for(let i=0; i<40; i++) this.particles.push(new Particle(this.player.x+15, this.player.y+15, '#ff0033', false, 1.5));
                        triggerGameOver("ВЫ ПОГИБЛИ");
                    }
                }

                // МОНЕТЫ
                this.coins.forEach(c => {
                    if (!c.collected && Math.abs((this.player.x+15) - c.x) < 25 && Math.abs((this.player.y+15) - c.y) < 25) {
                        c.collected = true; SAVE.coins++; sfx.coin(); saveGame();
                        for(let i=0; i<10; i++) this.particles.push(new Particle(c.x, c.y, '#FFD700'));
                        document.getElementById('hudCoins').innerText = `💰 ${SAVE.coins}`;
                    }
                });

                // ФИНИШ
                if (this.door && this.player.x < this.door.x + this.door.w && this.player.x + 30 > this.door.x && this.player.y < this.door.y + this.door.h && this.player.y + 30 > this.door.y) {
                    triggerWin();
                }
            }

            draw(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save(); ctx.translate(-this.cameraX, -this.cameraY);

                // Стены
                ctx.fillStyle = '#222'; ctx.shadowBlur = 10; ctx.shadowColor = '#00d2ff';
                this.walls.forEach(w => { ctx.fillRect(w.x, w.y, w.w, w.h); ctx.fillStyle = '#00d2ff'; ctx.fillRect(w.x, w.y, w.w, 2); ctx.fillStyle = '#222';});
                ctx.shadowBlur = 0;

                // Шипы
                ctx.fillStyle = '#ff0033';
                this.spikes.forEach(s => {
                    ctx.beginPath(); ctx.moveTo(s.x, s.y+s.h); ctx.lineTo(s.x+s.w/2, s.y); ctx.lineTo(s.x+s.w, s.y+s.h); ctx.fill();
                });

                // Кнопки
                this.buttons.forEach(b => {
                    ctx.fillStyle = b.pressed ? '#4caf50' : '#ff0033';
                    ctx.fillRect(b.x, b.pressed ? b.y+5 : b.y, b.w, b.pressed ? b.h-5 : b.h);
                });

                // Лазеры
                this.lasers.forEach(l => {
                    if (l.active) {
                        ctx.fillStyle = '#ff0033'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff0033';
                        ctx.fillRect(l.x, l.y, l.w, l.h); ctx.shadowBlur = 0;
                    }
                });

                // Узлы Крюка
                this.nodes.forEach(n => {
                    ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(n.x, n.y, 8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(n.x, n.y, 3, 0, Math.PI*2); ctx.fill();
                });

                // Монеты
                this.coins.forEach(c => {
                    if(!c.collected) {
                        ctx.fillStyle = '#FFD700'; ctx.shadowBlur = 15; ctx.shadowColor = '#FFD700';
                        ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                    }
                });

                // Дверь
                if (this.door) {
                    ctx.fillStyle = '#00ff00'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ff00';
                    ctx.fillRect(this.door.x, this.door.y, this.door.w, this.door.h);
                    ctx.fillStyle = '#000'; ctx.fillRect(this.door.x+10, this.door.y+10, this.door.w-20, this.door.h-10);
                    ctx.shadowBlur = 0;
                }

                // Игрок и веревка
                if (gameState === 'PLAYING' || gameState === 'END') this.player.draw(ctx);
                
                this.particles.forEach(p => p.draw(ctx)); 
                ctx.restore();
            }
        }

        class Player {
            constructor(game) { this.game = game; this.width = 30; this.height = 30; this.color = SAVE.skin; 
                this.x = 0; this.y = 0; this.vx = 0; this.vy = 0; 
                this.onGround = false; this.grappleNode = null; this.frameCount = 0;
            }
            
            update(input) {
                this.frameCount++;
                
                // ДВИЖЕНИЕ И ПРЫЖКИ
                if (input.keys.includes('ArrowRight') || input.keys.includes('Right')) { this.vx += 1.5; }
                else if (input.keys.includes('ArrowLeft') || input.keys.includes('Left')) { this.vx -= 1.5; }
                else { this.vx *= 0.8; } // Трение
                
                if (this.vx > 7) this.vx = 7; if (this.vx < -7) this.vx = -7;

                if ((input.keys.includes('ArrowUp') || input.keys.includes('Jump')) && this.onGround) {
                    this.vy = -16; this.onGround = false; sfx.jump();
                    for(let i=0; i<5; i++) this.game.particles.push(new Particle(this.x+15, this.y+30, '#fff', false, 0.5));
                }

                // --- ЛОГИКА КРЮКА ---
                let maxDist = 200 + (SAVE.hookLevel * 50); // Прокачка длины крюка
                let wantGrapple = input.keys.includes('Hook') || input.keys.includes(' ');

                if (wantGrapple && !this.grappleNode) {
                    // Ищем ближайший узел
                    let bestNode = null; let bestDist = maxDist;
                    this.game.nodes.forEach(n => {
                        let d = Math.sqrt(Math.pow(n.x - (this.x+15), 2) + Math.pow(n.y - (this.y+15), 2));
                        if (d < bestDist) { bestDist = d; bestNode = n; }
                    });
                    if (bestNode) { this.grappleNode = bestNode; sfx.grapple(); }
                } else if (!wantGrapple) {
                    this.grappleNode = null;
                }

                if (this.grappleNode) {
                    // ФИЗИКА МАЯТНИКА (Пружина к узлу)
                    let dx = this.grappleNode.x - (this.x + 15);
                    let dy = this.grappleNode.y - (this.y + 15);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let force = (dist - 50) * 0.02; // Тянет к узлу, если далеко
                    if (force > 0) {
                        this.vx += (dx/dist) * force;
                        this.vy += (dy/dist) * force;
                    }
                    this.game.particles.push(new Particle(this.x+15, this.y+15, '#FFD700', false, 0.2)); // Искры от мотора
                } else {
                    this.vy += 0.8; // Гравитация
                }

                if (this.vy > 20) this.vy = 20;

                // --- ШЛЕЙФЫ ---
                if (SAVE.trail !== 'none' && (Math.abs(this.vx)>2 || Math.abs(this.vy)>2)) {
                    if (SAVE.trail === 'rainbow' && this.frameCount % 2 === 0) this.game.particles.push(new Particle(this.x + 10 + Math.random()*10, this.y + 15, `hsl(${this.frameCount * 5 % 360}, 100%, 50%)`, false, 0.2));
                    else if (SAVE.trail === 'matrix' && this.frameCount % 3 === 0) this.game.particles.push(new Particle(this.x + Math.random()*20, this.y + 15, '#00ff00', false, 0.2, Math.random()>0.5?'0':'1'));
                    else if (SAVE.trail === 'fire' && this.frameCount % 2 === 0) this.game.particles.push(new Particle(this.x + 10 + Math.random()*10, this.y + 15, Math.random() > 0.5 ? '#ff0000' : '#ff9900', true, 0.2));
                }

                // --- КОЛЛИЗИИ (AABB) ---
                this.x += this.vx;
                this.game.walls.forEach(w => {
                    if (this.x < w.x + w.w && this.x + this.width > w.x && this.y < w.y + w.h && this.y + this.height > w.y) {
                        if (this.vx > 0) this.x = w.x - this.width;
                        else if (this.vx < 0) this.x = w.x + w.w;
                        this.vx = 0;
                    }
                });

                this.y += this.vy;
                this.onGround = false;
                this.game.walls.forEach(w => {
                    if (this.x < w.x + w.w && this.x + this.width > w.x && this.y < w.y + w.h && this.y + this.height > w.y) {
                        if (this.vy > 0) { this.y = w.y - this.height; this.onGround = true; }
                        else if (this.vy < 0) { this.y = w.y + w.h; }
                        this.vy = 0;
                    }
                });
            }

            draw(ctx) { 
                // Рисуем луч крюка
                if (this.grappleNode) {
                    ctx.beginPath(); ctx.moveTo(this.x+15, this.y+15); ctx.lineTo(this.grappleNode.x, this.grappleNode.y);
                    ctx.strokeStyle = '#00d2ff'; ctx.lineWidth = 3; ctx.shadowBlur = 10; ctx.shadowColor = '#00d2ff';
                    ctx.stroke(); ctx.shadowBlur = 0;
                }
                
                ctx.fillStyle = this.color; 
                ctx.shadowBlur = 15; ctx.shadowColor = this.color; 
                ctx.fillRect(this.x, this.y, this.width, this.height); 
                ctx.shadowBlur = 0; 
            }
        }

        let game = null;

        function animate() { if (game) { game.update(); game.draw(ctx); } requestAnimationFrame(animate); }
        
        function startGame(levelIdx) {
            currentLevelIdx = levelIdx;
            game = new Game(levelIdx); gameState = 'PLAYING'; 
            document.getElementById('hudLeft').innerText = `СЕКТОР ${levelIdx}`;
            updateUI(); showState('NONE'); gameHud.style.display = 'flex';
        }

        function triggerGameOver(reason) { 
            gameState = 'END'; sfx.death(); saveGame(); 
            setTimeout(() => { 
                document.getElementById('endTitle').innerText = "ВЫ ПОГИБЛИ"; document.getElementById('endTitle').style.color = "#ff0055";
                document.getElementById('endDesc').innerText = reason; document.getElementById('endBtn1').innerText = "ПОВТОРИТЬ";
                document.getElementById('endBtn1').onclick = () => startGame(currentLevelIdx);
                showState('END');
            }, 800); 
        }

        function triggerWin() { 
            gameState = 'END'; sfx.coin(); 
            if (currentLevelIdx === SAVE.maxLevel && SAVE.maxLevel < 5) SAVE.maxLevel++;
            saveGame();
            setTimeout(() => { 
                document.getElementById('endTitle').innerText = "СЕКТОР ЗАЧИЩЕН"; document.getElementById('endTitle').style.color = "#00ff00";
                document.getElementById('endDesc').innerText = "Дверь открыта!"; 
                
                let btn = document.getElementById('endBtn1');
                if (currentLevelIdx < 5) { btn.innerText = "СЛЕДУЮЩИЙ"; btn.onclick = () => startGame(currentLevelIdx + 1); } 
                else { btn.innerText = "ФИНАЛ ПРОЙДЕН!"; btn.onclick = () => showState('MAIN'); }
                
                showState('END');
            }, 500); 
        }
        
        showState('MAIN'); animate();
    </script>
</body>
</html>
