<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tower TMA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0b1a; font-family: sans-serif; user-select: none; }
        canvas { display: block; background: linear-gradient(to top, #0b0b1a, #1a1a3a); } /* Градиентный фон неба */
        
        .controls {
            position: fixed;
            bottom: 60px; 
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            pointer-events: auto;
            touch-action: manipulation;
        }
        .btn:active { background: #00d2ff; border-color: #00d2ff; }
        #jumpBtn { width: 90px; border-radius: 20px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">UP</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- ВВОД ---
        class InputHandler {
            constructor() {
                this.keys = [];
                window.addEventListener('keydown', e => {
                    if (!this.keys.includes(e.key)) this.keys.push(e.key);
                });
                window.addEventListener('keyup', e => {
                    this.keys = this.keys.filter(k => k !== e.key);
                });

                this.bindTouch('leftBtn', 'ArrowLeft');
                this.bindTouch('rightBtn', 'ArrowRight');
                this.bindTouch('jumpBtn', ' ');
            }
            bindTouch(id, key) {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!this.keys.includes(key)) this.keys.push(key); });
                btn.addEventListener('touchend', (e) => { this.keys = this.keys.filter(k => k !== key); });
            }
        }

        // --- ЧАСТИЦЫ ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 6 + 2;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 1) * 12;
                this.gravity = 0.6;
                this.life = 1.0;
            }
            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        // --- ПЛАТФОРМА ---
        class Platform {
            constructor(x, y, width, isMoving) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = 30; // Сделали платформы чуть тоньше
                
                this.isMoving = isMoving;
                this.vx = isMoving ? (Math.random() > 0.5 ? 2 : -2) : 0; // Направление движения
                this.startX = x;
                this.moveRange = 100; // Насколько далеко уезжает
            }
            update() {
                if (this.isMoving) {
                    this.x += this.vx;
                    if (this.x > this.startX + this.moveRange || this.x < this.startX - this.moveRange) {
                        this.vx *= -1; // Меняем направление
                    }
                }
            }
            draw(ctx) {
                ctx.fillStyle = '#222';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                // Если движется — цвет желтоватый, если стоит — бирюзовый
                ctx.fillStyle = this.isMoving ? '#ffcc00' : '#00ffcc';
                ctx.fillRect(this.x, this.y, this.width, 4);
            }
        }

        // --- ИГРОК ---
        class Player {
            constructor(game) {
                this.game = game;
                this.width = 30;
                this.height = 30;
                this.color = '#00d2ff';
                this.weight = 0.8; // Немного снизили гравитацию для удобства прыжков вверх
                this.reset();
            }
            reset() {
                this.x = 100;
                this.y = 0; // Начальная точка будет переопределена в loadLevel
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.visible = true;
                this.currentPlatform = null; // Запоминаем, на какой платформе стоим
            }
            update(input) {
                if (!this.visible) return;

                // Управление
                if (input.keys.includes(' ') && this.onGround) {
                    this.vy = -16;
                    this.onGround = false;
                    this.currentPlatform = null;
                }
                
                if (input.keys.includes('ArrowRight')) this.vx = 6;
                else if (input.keys.includes('ArrowLeft')) this.vx = -6;
                else this.vx *= 0.8;

                // Применяем платформенный импульс (если стоим на движущейся)
                let platformSpeed = this.currentPlatform ? this.currentPlatform.vx : 0;

                this.vy += this.weight;
                this.y += this.vy;
                
                // Проверка платформ
                this.onGround = false;
                this.currentPlatform = null;
                
                this.game.platforms.forEach(plat => {
                    if (this.x < plat.x + plat.width && this.x + this.width > plat.x &&
                        this.y < plat.y + plat.height && this.y + this.height > plat.y) {
                        
                        if (this.vy > 0 && this.y + this.height - this.vy <= plat.y + 12) {
                            this.onGround = true;
                            this.vy = 0;
                            this.y = plat.y - this.height;
                            this.currentPlatform = plat; // Прицепились к платформе
                        }
                    }
                });

                // Двигаем по X с учетом скорости платформы
                this.x += this.vx + platformSpeed;
                if (this.x < 0) this.x = 0;

                // Смерть от падения (если упал ниже текущего вида камеры)
                if (this.y > this.game.cameraY + canvas.height + 100) {
                    this.game.die();
                }
            }
            draw(ctx) {
                if (!this.visible) return;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        // --- ДВЕРЬ ---
        class Door {
            constructor(x, y) {
                this.width = 40;
                this.height = 60;
                this.x = x;
                this.y = y - this.height;
            }
            draw(ctx) {
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'white';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 8, this.y + 30, 8, 8);
                ctx.shadowBlur = 0;
            }
        }

        // --- ДВИЖОК ---
        class Game {
            constructor() {
                this.player = new Player(this);
                this.input = new InputHandler();
                this.level = 1;
                this.particles = [];
                this.cameraX = 0;
                this.cameraY = 0;
                this.platforms = [];
                this.loadLevel();
            }

            loadLevel() {
                this.platforms = [];
                this.particles = [];
                
                let currentX = 0;
                let currentY = canvas.height - 100; // Начинаем снизу
                
                // Стартовая безопасная платформа
                this.platforms.push(new Platform(currentX, currentY, 400, false));

                // Генерация башни (идем вверх и вправо)
                const jumpsCount = 8 + (this.level * 3);
                
                for (let i = 0; i < jumpsCount; i++) {
                    // Поднимаемся вверх на 60-110 пикселей
                    currentY -= 60 + Math.random() * 50;
                    
                    // Шагаем вправо (иногда чуть влево, чтобы было интересно)
                    currentX += 30 + Math.random() * 120;
                    
                    let platWidth = 100 + Math.random() * 100;
                    
                    // Чем выше уровень, тем больше шанс движущейся платформы
                    let isMoving = Math.random() > (0.8 - this.level * 0.05); 
                    
                    this.platforms.push(new Platform(currentX, currentY, platWidth, isMoving));
                }

                // Финальная платформа и дверь
                currentX += 50;
                currentY -= 80;
                this.platforms.push(new Platform(currentX, currentY, 200, false));
                this.door = new Door(currentX + 80, currentY);

                // Ставим игрока на первую платформу
                this.player.reset();
                this.player.y = canvas.height - 200;
                this.player.x = 100;
            }

            die() {
                if (!this.player.visible) return;
                
                for (let i = 0; i < 30; i++) {
                    this.particles.push(new Particle(this.player.x + 15, this.player.y + 15, this.player.color));
                }
                
                this.player.visible = false;
                
                setTimeout(() => {
                    this.loadLevel(); // Перезапускаем уровень полностью при падении
                }, 1000);
            }

            update() {
                // Обновляем платформы
                this.platforms.forEach(plat => plat.update());
                
                this.player.update(this.input);

                this.particles.forEach(p => p.update());
                this.particles = this.particles.filter(p => p.life > 0);

                if (this.player.visible) {
                    if (this.checkCollision(this.player, this.door)) {
                        this.level++;
                        this.loadLevel();
                    }
                }

                // КАМЕРА: теперь плавно следит и по оси Y (игрок всегда в нижней трети экрана)
                this.cameraX = this.player.x - canvas.width / 3;
                this.cameraY = this.player.y - canvas.height / 1.5;
                
                if (this.cameraX < 0) this.cameraX = 0;
            }

            draw(ctx) {
                // Очищаем экран
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                // Двигаем весь мир под камеру по X и по Y
                ctx.translate(-this.cameraX, -this.cameraY);

                this.platforms.forEach(plat => plat.draw(ctx));
                this.door.draw(ctx);
                this.particles.forEach(p => p.draw(ctx));
                this.player.draw(ctx);

                ctx.restore();

                // UI
                ctx.fillStyle = 'white';
                ctx.font = '24px Arial';
                ctx.fillText(`Уровень: ${this.level}`, 20, 40);
            }

            checkCollision(p, o) {
                return (p.x + 4 < o.x + o.width &&
                        p.x + p.width - 4 > o.x &&
                        p.y + 4 < o.y + o.height &&
                        p.y + p.height - 4 > o.y);
            }
        }

        const game = new Game();
        function animate() {
            game.update();
            game.draw(ctx);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
