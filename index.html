<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tower: Perfect Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0b1a; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(11,11,26,0.85) 0%, rgba(0,0,0,0.98) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 20; color: white; transition: opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0; visibility: hidden;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; transform: scale(1); }
            50% { text-shadow: 0 0 20px #00d2ff, 0 0 40px #00d2ff; transform: scale(1.05); }
            100% { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; transform: scale(1); }
        }

        h1 { font-size: 46px; margin-bottom: 10px; text-align: center; color: #fff; animation: neonPulse 2s infinite; font-weight: 900; letter-spacing: 3px; margin-top:0;}
        h2 { color: #FFD700; text-shadow: 0 0 15px #FFD700; font-size: 32px; margin: 0 0 20px 0; text-align: center; letter-spacing: 2px; }

        .ui-btn {
            padding: 16px 40px; margin: 10px; border-radius: 40px; font-size: 18px; font-weight: bold;
            border: 2px solid rgba(255,255,255,0.1); color: white; cursor: pointer; text-transform: uppercase; width: 280px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
            transition: all 0.2s ease;
        }
        .btn-shop { background: linear-gradient(45deg, #f5af19, #f12711); box-shadow: 0 5px 20px rgba(241, 39, 17, 0.3); }
        .btn-endless { background: linear-gradient(45deg, #8A2387, #E94057, #F27121); box-shadow: 0 5px 20px rgba(233, 64, 87, 0.3); }
        .btn-back { background: transparent; border: 2px solid #555; box-shadow: none; margin-top: 20px; }
        
        .ui-btn:active { transform: scale(0.95); }
        .ui-btn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        #levelGrid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
            width: 90%; max-width: 400px; max-height: 50vh; overflow-y: auto;
            padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lvl-btn {
            aspect-ratio: 1; border-radius: 12px; border: none; font-size: 18px; font-weight: bold;
            color: white; background: #333; cursor: pointer; transition: 0.2s;
        }
        .lvl-btn.unlocked { background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 0 10px #00d2ff; }
        .lvl-btn.hard { background: linear-gradient(45deg, #f12711, #f5af19); box-shadow: 0 0 15px #f12711; color: #fff; }
        .lvl-btn:active { transform: scale(0.9); }

        #shopList { display: flex; flex-direction: column; width: 90%; max-width: 350px; max-height: 60vh; overflow-y: auto; gap: 15px; padding: 10px; }
        .shop-card {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }
        .shop-card h3 { margin: 0 0 5px 0; font-size: 22px; }
        .shop-card p { font-size: 14px; color: #aaa; margin: 0 0 10px 0; line-height: 1.3; }
        .shop-btn { padding: 10px 20px; width: 100%; border-radius: 10px; font-size: 16px; border: none; cursor: pointer; font-weight: bold; color: white; background: #4caf50; transition: 0.2s; }
        .shop-btn:disabled { background: #555; color: #888; }
        .shop-btn.equip { background: #00d2ff; }
        
        .lvl-badge { position: absolute; top: 10px; right: 10px; background: #ff0055; color: white; font-size: 12px; padding: 3px 8px; border-radius: 10px; font-weight: bold; }

        .top-hud { position: fixed; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .hud-text { font-size: 22px; font-weight: bold; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .coin-hud { color: #FFD700; text-shadow: 0 0 10px #FFD700; }
        .lives-hud { color: #ff0055; text-shadow: 0 0 10px #ff0055; margin-top: 5px; font-size: 18px;}
    </style>
</head>
<body onclick="sfx.init()">

    <canvas id="gameCanvas"></canvas>

    <div class="top-hud" id="gameHud" style="display:none;">
        <div>
            <div class="hud-text" id="hudLeft">УРОВЕНЬ 1</div>
            <div class="lives-hud" id="hudLives"></div>
        </div>
        <div class="hud-text coin-hud" id="hudCoins">💰 0</div>
    </div>

    <div id="mainMenu" class="overlay active">
        <h1>NEON RUN</h1>
        <p style="color: #ccc; margin-bottom: 20px;">Нажми на экран для звука 🔊</p>
        <button class="ui-btn" onclick="showState('LEVELS')">КАМПАНИЯ</button>
        <button class="ui-btn btn-endless" onclick="startGame('endless')">БЕСКОНЕЧНЫЙ</button>
        <button class="ui-btn btn-shop" onclick="showState('SHOP')">МАГАЗИН</button>
        <p class="coin-hud" style="font-size: 26px; margin-top: 20px;" id="menuCoins">💰 0</p>
        <p class="hud-text" style="font-size: 16px; color: #888;" id="menuScore">Рекорд: 0 м</p>
    </div>

    <div id="levelMenu" class="overlay">
        <h2>КАМПАНИЯ</h2>
        <div id="levelGrid"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="shopMenu" class="overlay">
        <h2 style="margin-bottom: 10px;">АРСЕНАЛ</h2>
        <p class="coin-hud" style="font-size: 22px; margin-top: 0;" id="shopCoins">💰 0</p>
        <div id="shopList"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="endMenu" class="overlay">
        <h2 id="endTitle">УРОВЕНЬ ПРОЙДЕН</h2>
        <p id="endDesc" style="color: #ccc; font-size: 18px; margin-bottom: 30px;">Молодец!</p>
        <button class="ui-btn" id="endBtn1" onclick="nextAction()">ДАЛЕЕ</button>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">В МЕНЮ</button>
    </div>

    <script>
        // --- 1. АБСОЛЮТНО ЧИСТАЯ СИСТЕМА СОХРАНЕНИЙ ---
        const SAVE = {
            coins: parseInt(localStorage.getItem('neonCoins')) || 0,
            maxLevel: parseInt(localStorage.getItem('neonMaxLevel')) || 1,
            highScore: parseInt(localStorage.getItem('neonScore')) || 0,
            jetpackLevel: parseInt(localStorage.getItem('neonJetpackLvl')) || 1,
            lives: parseInt(localStorage.getItem('neonLives')) || 0,
            skin: localStorage.getItem('neonSkin') || '#00d2ff',
            ownedSkins: JSON.parse(localStorage.getItem('neonSkins')) || ['#00d2ff']
        };

        function saveGame() {
            localStorage.setItem('neonCoins', SAVE.coins);
            localStorage.setItem('neonMaxLevel', SAVE.maxLevel);
            localStorage.setItem('neonScore', SAVE.highScore);
            localStorage.setItem('neonJetpackLvl', SAVE.jetpackLevel);
            localStorage.setItem('neonLives', SAVE.lives);
            localStorage.setItem('neonSkin', SAVE.skin);
            localStorage.setItem('neonSkins', JSON.stringify(SAVE.ownedSkins));
            updateUI();
        }

        // --- УПРАВЛЕНИЕ UI ---
        const overlays = {
            MAIN: document.getElementById('mainMenu'),
            LEVELS: document.getElementById('levelMenu'),
            SHOP: document.getElementById('shopMenu'),
            END: document.getElementById('endMenu')
        };
        const gameHud = document.getElementById('gameHud');

        function showState(state) {
            sfx.init();
            Object.values(overlays).forEach(el => el.classList.remove('active'));
            gameHud.style.display = 'none';
            if(overlays[state]) overlays[state].classList.add('active');
            updateUI();
        }

        function updateUI() {
            document.getElementById('menuCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('shopCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('menuScore').innerText = `Рекорд: ${SAVE.highScore} м`;
            document.getElementById('hudCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('hudLives').innerText = SAVE.lives > 0 ? `❤️ ${SAVE.lives}` : '';
            renderShop();
            renderLevels();
        }

        function renderLevels() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                let btn = document.createElement('button');
                btn.className = 'lvl-btn'; btn.innerText = i;
                if (i <= SAVE.maxLevel) {
                    if (i % 5 === 0) btn.classList.add('hard');
                    else btn.classList.add('unlocked');
                    btn.onclick = () => startGame('campaign', i);
                } else {
                    btn.disabled = true;
                }
                grid.appendChild(btn);
            }
        }

        // МАГАЗИН: Джетпак теперь прокачивается!
        function renderShop() {
            const list = document.getElementById('shopList');
            list.innerHTML = '';
            
            // Расчет цены джетпака (каждый уровень на 100 дороже)
            let jpPrice = SAVE.jetpackLevel * 100;
            let jpMaxed = SAVE.jetpackLevel >= 10; // Пусть 10 будет макс уровнем

            const items = [
                { id: 'jetpack', name: 'JETPACK 🚀', desc: 'Увеличивает длительность полета ракеты на уровне.', price: jpPrice, type: 'upgrade', maxed: jpMaxed },
                { id: 'life', name: 'СЕРДЦЕ ❤️', desc: 'Автоматически спасает от смерти (откидывает вверх).', price: 50, type: 'consumable' },
                { id: '#39ff14', name: 'Скин: ТОКСИК 🟢', desc: 'Радиоактивно зеленый куб.', price: 300, type: 'skin' },
                { id: '#FFD700', name: 'Скин: ЗОЛОТО 🟡', desc: 'Элитный золотой куб.', price: 1000, type: 'skin' }
            ];

            items.forEach(item => {
                let actionText = `КУПИТЬ (${item.price} 💰)`;
                let btnClass = 'shop-btn';
                let disabled = SAVE.coins < item.price;
                let badge = '';

                if (item.type === 'upgrade') {
                    badge = `<div class="lvl-badge">LVL ${SAVE.jetpackLevel}</div>`;
                    if (item.maxed) { actionText = 'МАКСИМУМ'; disabled = true; }
                }
                if (item.type === 'consumable') { 
                    badge = `<div class="lvl-badge">У ВАС: ${SAVE.lives}</div>`;
                }
                if (item.type === 'skin') {
                    if (SAVE.ownedSkins.includes(item.id)) {
                        disabled = false;
                        if (SAVE.skin === item.id) { actionText = 'НАДЕТО'; disabled = true; btnClass += ' equip'; }
                        else { actionText = 'НАДЕТЬ'; btnClass += ' equip'; }
                    }
                }

                list.innerHTML += `
                    <div class="shop-card">
                        ${badge}
                        <h3 style="color:${item.type==='skin'?item.id:'#ff0055'}">${item.name}</h3>
                        <p>${item.desc}</p>
                        <button class="${btnClass}" ${disabled ? 'disabled' : ''} onclick="handleBuy('${item.id}', '${item.type}', ${item.price})">${actionText}</button>
                    </div>
                `;
            });
        }

        function handleBuy(id, type, price) {
            if (type === 'skin' && SAVE.ownedSkins.includes(id)) {
                SAVE.skin = id; sfx.jump(); saveGame(); return;
            }
            if (SAVE.coins >= price) {
                SAVE.coins -= price;
                if (type === 'upgrade') SAVE.jetpackLevel++;
                if (type === 'consumable') SAVE.lives++;
                if (type === 'skin') { SAVE.ownedSkins.push(id); SAVE.skin = id; }
                sfx.purchase(); saveGame();
            }
        }

        // --- АУДИО (ТЕРРАРИЯ-СТАЙЛ) ---
        class SoundEngine {
            constructor() { this.ctx = null; this.bgmStarted = false; this.bgmInterval = null; }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                if (!this.bgmStarted) this.startBGM();
            }
            playTone(freq, type, duration, vol=0.2) {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            }
            jump() {
                if(!this.ctx) return;
                const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(250, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.15); 
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.15);
            }
            coin() {
                if(!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc1 = this.ctx.createOscillator(); const gain1 = this.ctx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(2000, now); gain1.gain.setValueAtTime(0.15, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                const osc2 = this.ctx.createOscillator(); const gain2 = this.ctx.createGain();
                osc2.type = 'square'; osc2.frequency.setValueAtTime(3000, now); gain2.gain.setValueAtTime(0.03, now); gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc1.connect(gain1); gain1.connect(this.ctx.destination); osc2.connect(gain2); gain2.connect(this.ctx.destination);
                osc1.start(now); osc1.stop(now + 0.5); osc2.start(now); osc2.stop(now + 0.2);
            }
            purchase() {
                if(!this.ctx) return; const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(1000, now); osc.frequency.setValueAtTime(1500, now + 0.1); 
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.3);
            }
            powerup() {
                if(!this.ctx) return; const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(800, now + 0.4);
                gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.4);
            }
            thrust() {
                if(!this.ctx) return;
                if(Math.random() > 0.7) {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50 + Math.random()*50, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.1);
                }
            }
            death() {
                if(!this.ctx) return; const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(250, now + 0.2);
                osc.frequency.setValueAtTime(250, now + 0.2); osc.frequency.exponentialRampToValueAtTime(200, now + 0.4);
                osc.frequency.setValueAtTime(200, now + 0.4); osc.frequency.exponentialRampToValueAtTime(100, now + 1.0);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 1.0);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 1.0);
            }
            startBGM() {
                if (!this.ctx || this.bgmStarted) return;
                this.bgmStarted = true;
                const playNote = (time, freq, vol, type, duration) => {
                    const osc = this.ctx.createOscillator(); const g = this.ctx.createGain();
                    osc.type = type; osc.frequency.value = freq;
                    g.gain.setValueAtTime(vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + duration);
                    osc.connect(g); g.connect(this.ctx.destination); osc.start(time); osc.stop(time + duration);
                };
                let step = 0;
                this.bgmInterval = setInterval(() => {
                    if(this.ctx.state !== 'running') return;
                    const now = this.ctx.currentTime;
                    const bassNotes = [130, 0, 130, 0, 196, 0, 146, 0, 130, 0, 130, 0, 196, 146, 0, 0];
                    if (bassNotes[step]) playNote(now, bassNotes[step], 0.05, 'square', 0.15);
                    const leadNotes = [523, 0, 659, 0, 783, 0, 659, 0, 1046, 0, 783, 0, 659, 0, 523, 0];
                    if (leadNotes[step]) playNote(now, leadNotes[step], 0.03, 'sine', 0.2);
                    step = (step + 1) % 16;
                }, 180); 
            }
        }
        const sfx = new SoundEngine();

        // --- ДВИЖОК ИГРЫ ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        class InputHandler {
            constructor() {
                this.keys = [];
                window.addEventListener('keydown', e => { if (!this.keys.includes(e.key)) this.keys.push(e.key); });
                window.addEventListener('keyup', e => { this.keys = this.keys.filter(k => k !== e.key); });
                const handleTouch = (e) => {
                    if (gameState !== 'PLAYING') return; e.preventDefault(); this.keys = []; 
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].clientX < canvas.width / 2) this.keys.push('ArrowLeft'); else this.keys.push('ArrowRight');
                    }
                };
                const handleTouchEnd = (e) => { if (e.touches.length === 0) this.keys = []; else handleTouch(e); };
                canvas.addEventListener('touchstart', handleTouch, {passive: false});
                canvas.addEventListener('touchmove', handleTouch, {passive: false});
                canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
            }
        }

        class Particle {
            constructor(x, y, color, isFire = false, speedMult = 1) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * (isFire ? 10 : 6) + 2;
                this.vx = (Math.random() - 0.5) * (isFire ? 5 : 12) * speedMult;
                this.vy = isFire ? (Math.random() * 6 + 2) : (Math.random() - 0.8) * 12 * speedMult;
                this.life = 1.0; this.decay = isFire ? 0.05 : 0.03;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw(ctx) { 
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; 
                ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); 
                ctx.shadowBlur = 0; ctx.globalAlpha = 1.0; 
            }
        }

        class Platform {
            constructor(x, y, width, type = 'normal') {
                this.x = x; this.y = y; this.width = width; this.height = 20;
                this.type = type; this.moveSpeed = 1.5 + Math.random() * 2; this.direction = Math.random() > 0.5 ? 1 : -1;
                this.flashTimer = 0; 
            }
            update() {
                if (this.flashTimer > 0) this.flashTimer--;
                if (this.type === 'moving') {
                    this.x += this.moveSpeed * this.direction;
                    if (this.x <= 0 || this.x + this.width >= canvas.width) this.direction *= -1;
                }
            }
            draw(ctx) {
                if (this.type === 'finish') { ctx.fillStyle = '#FFD700'; ctx.shadowBlur = 20; ctx.shadowColor = '#FFD700'; }
                else if (this.flashTimer > 0) { ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 15; ctx.shadowColor = '#fff'; } 
                else if (this.type === 'moving') { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#ff00ff'; }
                else if (this.type === 'spring') { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#00ff00'; }
                else { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#00d2ff'; }
                
                if(this.type !== 'finish' && this.flashTimer === 0) ctx.fillRect(this.x, this.y, this.width, 4); 
                else ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        class Item {
            constructor(x, y, type) { this.x = x; this.y = y; this.type = type; this.width = 24; this.height = 24; this.baseY = y; this.angle = Math.random() * Math.PI * 2; this.markedForDeletion = false; }
            update() { this.angle += 0.05; this.y = this.baseY + Math.sin(this.angle) * 5; }
            draw(ctx) {
                ctx.beginPath();
                if (this.type === 'coin') { ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20; ctx.arc(this.x + 12, this.y + 12, 10, 0, Math.PI * 2); }
                else if (this.type === 'jetpack') { ctx.fillStyle = '#ff0055'; ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 25; ctx.moveTo(this.x+12, this.y-4); ctx.lineTo(this.x+26, this.y+24); ctx.lineTo(this.x-2, this.y+24); }
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Hunter {
            constructor(game) { this.game = game; this.width = 38; this.height = 38; this.color = '#ff0033'; this.reset(); }
            reset() { this.x = canvas.width/2 - 19; this.y = canvas.height-88; this.active = false; this.startTime = 0; }
            startTimer() { this.startTime = Date.now(); }
            update() {
                if (gameState !== 'PLAYING') return;
                if (!this.active) { if (Date.now() - this.startTime > 2000) this.active = true; return; }
                let dx = (this.game.player.x + 15) - (this.x + 19);
                let dy = (this.game.player.y + 15) - (this.y + 19);
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                let baseSpeed = this.game.isHard ? 2.5 : 1.6;
                let speed = baseSpeed + (this.game.level * 0.1); 
                if (dist > 300) speed += (dist - 300) * 0.005; 
                let maxSpeed = this.game.isHard ? 12 : 8;
                if (speed > maxSpeed) speed = maxSpeed;
                
                if (dist > 0) { this.x += (dx/dist)*speed; this.y += (dy/dist)*speed; }
                
                let bottom = this.game.cameraY + canvas.height - 48;
                if (this.y > bottom) this.y -= (this.y - bottom) * 0.08;
                if (Math.random() > 0.4) this.game.particles.push(new Particle(this.x + Math.random()*38, this.y + 19, this.color));
            }
            draw(ctx) {
                ctx.fillStyle = this.color; ctx.shadowBlur = 25; ctx.shadowColor = this.color; ctx.fillRect(this.x, this.y, 38, 38);
                let lx = (this.game.player.x - this.x) > 0 ? 3 : -3; let ly = (this.game.player.y - this.y) > 0 ? 3 : -3;
                ctx.fillStyle = '#fff'; ctx.fillRect(this.x+6+lx, this.y+10+ly, 8, 8); ctx.fillRect(this.x+24+lx, this.y+10+ly, 8, 8);
                ctx.fillStyle = '#000'; ctx.fillRect(this.x+8+lx, this.y+12+ly, 4, 4); ctx.fillRect(this.x+26+lx, this.y+12+ly, 4, 4);
                ctx.shadowBlur = 0;
            }
        }

        class Player {
            constructor(game) { this.game = game; this.width = 30; this.height = 30; this.color = SAVE.skin; this.reset(); }
            reset() { this.x = canvas.width/2 - 15; this.y = canvas.height-80; this.vx = 0; this.vy = 0; this.jetpackTimer = 0; this.color = SAVE.skin;}
            update(input) {
                if (gameState !== 'PLAYING') return;
                if (input.keys.includes('ArrowRight')) this.vx = 8; else if (input.keys.includes('ArrowLeft')) this.vx = -8; else this.vx *= 0.8;
                
                if (this.jetpackTimer > 0) { 
                    this.vy = -18; this.jetpackTimer--; sfx.thrust(); 
                    this.game.particles.push(new Particle(this.x+15, this.y+30, '#ff9900', true)); 
                    this.game.particles.push(new Particle(this.x+15, this.y+30, '#ff0055', true)); 
                } else { this.vy += 0.8; }
                
                this.y += this.vy;
                if (this.vy > 0) {
                    this.game.platforms.forEach(p => {
                        if (p.type === 'finish') return;
                        if (this.x < p.x + p.width && this.x + 30 > p.x && this.y < p.y + 20 && this.y + 30 > p.y) {
                            if (this.y + 30 - this.vy <= p.y + 20) { 
                                this.y = p.y - 30; p.flashTimer = 5; sfx.jump(); 
                                if (p.type === 'spring') { this.vy = -26; this.createJumpDust('#00ff00', 1.5); } 
                                else { this.vy = -17; this.createJumpDust('#ffffff', 1); } 
                            }
                        }
                    });
                }
                this.x += this.vx; if (this.x > canvas.width) this.x = -30; if (this.x < -30) this.x = canvas.width;
            }
            createJumpDust(color, speedMult) { for(let i=0; i<12; i++) this.game.particles.push(new Particle(this.x+15, this.y+30, color, false, speedMult)); }
            draw(ctx) { 
                ctx.fillStyle = this.jetpackTimer > 0 ? '#fff' : this.color; 
                ctx.shadowBlur = 20; ctx.shadowColor = this.jetpackTimer > 0 ? '#ff0055' : this.color; 
                ctx.fillRect(this.x, this.y, 30, 30); ctx.shadowBlur = 0; 
            }
        }

        class Game {
            constructor(mode, level) {
                this.mode = mode; 
                this.level = level || 1;
                this.isHard = (this.mode === 'campaign' && this.level % 5 === 0);
                
                this.input = new InputHandler(); this.platforms = []; this.items = []; this.particles = [];
                this.cameraY = 0; this.highestY = canvas.height - 50;
                
                // РЕКОРД: Запоминаем точную высоту для честного счета
                this.maxReachedY = this.player ? this.player.y : canvas.height - 50;
                
                this.targetY = this.mode === 'campaign' ? -(1500 + (this.level * 500)) : -Infinity;
                this.finishSpawned = false;

                this.platforms.push(new Platform(0, this.highestY, canvas.width, 'normal'));
                this.player = new Player(this); this.hunter = new Hunter(this);
            }

            generateChunk() {
                while (this.highestY > this.cameraY - canvas.height * 2) {
                    if (this.mode === 'campaign' && this.highestY <= this.targetY) {
                        if (!this.finishSpawned) { this.platforms.push(new Platform(0, this.targetY - 100, canvas.width, 'finish')); this.finishSpawned = true; }
                        break;
                    }
                    let gap = 90 + Math.random() * (this.isHard ? 60 : 40);
                    this.highestY -= gap;
                    let w = 70 + Math.random() * (this.isHard ? 60 : 100); 
                    let x = Math.random() * (canvas.width - w);
                    
                    let type = 'normal'; let r = Math.random();
                    if (this.isHard) { if (r > 0.95) type = 'spring'; else if (r > 0.4) type = 'moving'; } 
                    else { if (r > 0.85) type = 'spring'; else if (r > 0.65) type = 'moving'; }
                    
                    this.platforms.push(new Platform(x, this.highestY, w, type));
                    
                    let ri = Math.random();
                    if (ri > 0.98) this.items.push(new Item(x + w/2 - 12, this.highestY - 40, 'jetpack'));
                    else if (ri > 0.6) this.items.push(new Item(x + w/2 - 12, this.highestY - 35, 'coin'));
                }
            }

            useExtraLife() {
                SAVE.lives--; saveGame(); sfx.powerup();
                for(let i=0; i<50; i++) this.particles.push(new Particle(this.player.x+15, this.player.y+15, '#ffffff', false, 2));
                this.player.vy = -35; 
                this.player.y -= 100;
                this.hunter.y = this.cameraY + canvas.height + 200; 
                this.hunter.active = false; this.hunter.startTimer(); 
            }

            update() {
                if (gameState !== 'PLAYING') return;

                // ЧЕСТНЫЙ РЕКОРД (по координате игрока, а не камеры)
                if (this.player.y < this.maxReachedY) this.maxReachedY = this.player.y;

                this.generateChunk(); 
                let cleanupY = this.cameraY + canvas.height + 300;
                this.platforms = this.platforms.filter(p => p.y < cleanupY);
                this.items = this.items.filter(i => i.y < cleanupY);

                this.platforms.forEach(p => p.update()); this.player.update(this.input); this.hunter.update(); 
                this.items.forEach(i => i.update()); this.particles.forEach(p => p.update()); this.particles = this.particles.filter(p => p.life > 0);
                
                this.cameraY += (this.player.y - canvas.height/2 - this.cameraY) * 0.1; 

                if (this.mode === 'endless') {
                    let score = Math.floor(Math.max(0, ((canvas.height - 50) - this.maxReachedY) / 10));
                    document.getElementById('hudLeft').innerText = `${score} м`;
                    if (score > SAVE.highScore) SAVE.highScore = score; // Сохраним при смерти
                }
                
                if (this.hunter.active && this.player.x < this.hunter.x+33 && this.player.x+25 > this.hunter.x && this.player.y < this.hunter.y+33 && this.player.y+25 > this.hunter.y) {
                    if (SAVE.lives > 0) { this.useExtraLife(); } 
                    else {
                        for(let i=0; i<40; i++) this.particles.push(new Particle(this.player.x+15, this.player.y+15, '#ff0033', false, 1.5));
                        triggerGameOver("ОХОТНИК ПОГЛОТИЛ ТЕБЯ");
                    }
                }

                if (this.player.y > this.cameraY + canvas.height + 100) {
                    if (SAVE.lives > 0) { this.useExtraLife(); } 
                    else { triggerGameOver("УПАЛ В БЕЗДНУ"); }
                }

                if (this.mode === 'campaign') {
                    this.platforms.forEach(p => { if (p.type === 'finish' && this.player.x < p.x + p.width && this.player.x + 30 > p.x && this.player.y < p.y + 20 && this.player.y + 30 > p.y) triggerWin(); });
                }

                // ИДЕАЛЬНЫЙ СБОР ПРЕДМЕТОВ (Хитбоксы расширены)
                this.items.forEach(item => {
                    if (!item.markedForDeletion && 
                        this.player.x < item.x + 30 && this.player.x + 30 > item.x - 10 && 
                        this.player.y < item.y + 30 && this.player.y + 30 > item.y - 10) {
                        
                        item.markedForDeletion = true;
                        if (item.type === 'coin') { 
                            let reward = this.isHard ? 3 : 1; 
                            SAVE.coins += reward; sfx.coin(); 
                            saveGame(); // Моментальное сохранение!
                            for(let i=0; i<15; i++) this.particles.push(new Particle(item.x+12, item.y+12, '#FFD700')); 
                        } else if (item.type === 'jetpack') { 
                            // Прокачиваемый джетпак! Уровень 1 дает 120 кадров, дальше +30 за левел
                            this.player.jetpackTimer = 90 + (SAVE.jetpackLevel * 30); 
                            sfx.powerup(); 
                            for(let i=0; i<25; i++) this.particles.push(new Particle(item.x+12, item.y+12, '#ff0055', false, 1.5)); 
                        }
                    }
                });
            }
            draw(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (this.isHard) { ctx.fillStyle = 'rgba(50, 0, 10, 0.3)'; ctx.fillRect(0,0,canvas.width, canvas.height); }

                ctx.save(); ctx.translate(0, -this.cameraY);
                this.platforms.forEach(p => p.draw(ctx)); this.items.forEach(i => i.draw(ctx)); 
                this.hunter.draw(ctx); if (gameState === 'PLAYING' || gameState === 'END') this.player.draw(ctx);
                this.particles.forEach(p => p.draw(ctx));
                ctx.restore();
                
                if (gameState === 'PLAYING' && this.player.jetpackTimer > 0) {
                    let maxTimer = 90 + (SAVE.jetpackLevel * 30);
                    let prog = this.player.jetpackTimer / maxTimer;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(canvas.width/2 - 50, 50, 100, 6);
                    ctx.fillStyle = '#ff0055'; ctx.fillRect(canvas.width/2 - 50, 50, 100 * prog, 6);
                }
            }
        }

        let game = null;
        let lastPlayedMode = 'campaign';
        let lastPlayedLevel = 1;

        function animate() { 
            if (game) { game.update(); game.draw(ctx); }
            requestAnimationFrame(animate); 
        }
        
        function startGame(mode, level = 1) {
            lastPlayedMode = mode; lastPlayedLevel = level;
            game = new Game(mode, level);
            gameState = 'PLAYING'; 
            
            document.getElementById('hudLeft').innerText = mode === 'campaign' ? `УРОВЕНЬ ${level}` : `0 м`;
            document.getElementById('hudLeft').style.color = game.isHard ? '#ff0055' : 'white';
            updateUI();
            
            showState('NONE'); 
            gameHud.style.display = 'flex';

            if (game.player.vy === 0) game.player.vy = -17; 
            game.hunter.startTimer();
        }

        function triggerGameOver(reason) { 
            gameState = 'END'; sfx.death(); saveGame(); // Сохраняем рекорд при смерти
            setTimeout(() => { 
                document.getElementById('endTitle').innerText = "ВЫ ПОГИБЛИ"; 
                document.getElementById('endTitle').style.color = "#ff0055";
                document.getElementById('endDesc').innerText = reason; 
                document.getElementById('endBtn1').innerText = "ПОВТОРИТЬ";
                document.getElementById('endBtn1').onclick = () => startGame(lastPlayedMode, lastPlayedLevel);
                showState('END');
            }, 800); 
        }

        function triggerWin() { 
            gameState = 'END'; sfx.coin(); 
            if (lastPlayedLevel === SAVE.maxLevel && SAVE.maxLevel < 100) SAVE.maxLevel++;
            saveGame();
            setTimeout(() => { 
                document.getElementById('endTitle').innerText = "УРОВЕНЬ ПРОЙДЕН"; 
                document.getElementById('endTitle').style.color = "#00ff00";
                document.getElementById('endDesc').innerText = game.isHard ? "ХАРДКОР ЗАВЕРШЕН!" : "Отличная работа!"; 
                document.getElementById('endBtn1').innerText = "СЛЕДУЮЩИЙ";
                document.getElementById('endBtn1').onclick = () => startGame('campaign', lastPlayedLevel + 1);
                showState('END');
            }, 500); 
        }
        
        showState('MAIN'); 
        animate();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
