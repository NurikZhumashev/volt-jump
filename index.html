<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner TMA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; user-select: none; }
        canvas { display: block; background: #000; }
        
        /* Кнопки теперь выше (bottom: 100px) */
        .controls {
            position: fixed;
            bottom: 100px; 
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            pointer-events: auto;
            touch-action: manipulation;
        }
        .btn:active { background: #00d2ff; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn" style="width: 100px; border-radius: 20px;">JUMP</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- НАСТРОЙКИ УРОВНЯ ---
        const GROUND_Y = canvas.height - 150; // Подняли землю выше

        class InputHandler {
            constructor() {
                this.keys = [];
                window.addEventListener('keydown', e => {
                    if (!this.keys.includes(e.key)) this.keys.push(e.key);
                });
                window.addEventListener('keyup', e => {
                    this.keys = this.keys.filter(k => k !== e.key);
                });

                this.bindTouch('leftBtn', 'ArrowLeft');
                this.bindTouch('rightBtn', 'ArrowRight');
                this.bindTouch('jumpBtn', ' ');
            }
            bindTouch(id, key) {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!this.keys.includes(key)) this.keys.push(key); });
                btn.addEventListener('touchend', (e) => { this.keys = this.keys.filter(k => k !== key); });
            }
        }

        class Player {
            constructor(game) {
                this.game = game;
                this.width = 40;
                this.height = 40;
                this.x = 50;
                this.y = GROUND_Y - this.height;
                this.vx = 0;
                this.vy = 0;
                this.weight = 1;
                this.onGround = false;
            }
            update(input) {
                // Прыжок
                if (input.keys.includes(' ') && this.onGround) {
                    this.vy = -20;
                    this.onGround = false;
                }
                // Горизонталь
                if (input.keys.includes('ArrowRight')) this.vx = 6;
                else if (input.keys.includes('ArrowLeft')) this.vx = -6;
                else this.vx *= 0.8;

                this.x += this.vx;
                this.y += this.vy;

                // Гравитация и земля
                if (this.y + this.height < GROUND_Y) {
                    this.vy += this.weight;
                    this.onGround = false;
                } else {
                    this.y = GROUND_Y - this.height;
                    this.vy = 0;
                    this.onGround = true;
                }
                
                // Границы
                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;
            }
            draw(ctx) {
                ctx.fillStyle = '#00d2ff';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        class Obstacle {
            constructor(game) {
                this.game = game;
                this.width = 30 + Math.random() * 30;
                this.height = 40;
                this.x = canvas.width;
                this.y = GROUND_Y - this.height;
                this.speed = 5 + (this.game.score / 5); // Скорость растет со счетом
                this.markedForDeletion = false;
            }
            update() {
                this.x -= this.speed;
                if (this.x + this.width < 0) {
                    this.markedForDeletion = true;
                    this.game.score++;
                }
            }
            draw(ctx) {
                ctx.fillStyle = '#ff3366';
                ctx.beginPath(); // Рисуем треугольник
                ctx.moveTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.fill();
            }
        }

        class Game {
            constructor() {
                this.player = new Player(this);
                this.input = new InputHandler();
                this.obstacles = [];
                this.score = 0;
                this.timer = 0;
                this.gameOver = false;
            }
            update() {
                if (this.gameOver) return;
                this.player.update(this.input);

                // Спавн врагов
                this.timer++;
                if (this.timer > 100) {
                    this.obstacles.push(new Obstacle(this));
                    this.timer = 0;
                }

                this.obstacles.forEach(obs => {
                    obs.update();
                    // Проверка коллизии
                    if (this.checkCollision(this.player, obs)) {
                        this.gameOver = true;
                    }
                });
                this.obstacles = this.obstacles.filter(obs => !obs.markedForDeletion);
            }
            draw(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Рисуем землю
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(0, GROUND_Y);
                ctx.lineTo(canvas.width, GROUND_Y);
                ctx.stroke();

                this.player.draw(ctx);
                this.obstacles.forEach(obs => obs.draw(ctx));

                ctx.fillStyle = 'white';
                ctx.font = '24px Arial';
                ctx.fillText(`Score: ${this.score}`, 20, 50);

                if (this.gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.8)';
                    ctx.fillRect(0,0,canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
                    ctx.font = '16px Arial';
                    ctx.fillText('Refresh page to restart', canvas.width/2, canvas.height/2 + 40);
                }
            }
            checkCollision(p, o) {
                return (p.x < o.x + o.width &&
                        p.x + p.width > o.x &&
                        p.y < o.y + o.height &&
                        p.y + p.height > o.y);
            }
        }

        const game = new Game();
        function animate() {
            game.update();
            game.draw(ctx);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
