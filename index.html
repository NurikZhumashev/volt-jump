<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Downfall: The Pivot</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0b1a; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(11,11,26,0.85) 0%, rgba(0,0,0,0.98) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 20; color: white; transition: opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0; visibility: hidden;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; transform: scale(1); }
            50% { text-shadow: 0 0 20px #00d2ff, 0 0 40px #00d2ff; transform: scale(1.05); }
            100% { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; transform: scale(1); }
        }
        @keyframes laserPulse {
            0% { text-shadow: 0 0 10px #ff0033, 0 0 20px #ff0033; color: #ff5555;}
            50% { text-shadow: 0 0 20px #ff0033, 0 0 40px #ff0033; color: #fff;}
            100% { text-shadow: 0 0 10px #ff0033, 0 0 20px #ff0033; color: #ff5555;}
        }

        h1 { font-size: 42px; margin-bottom: 5px; text-align: center; color: #fff; animation: neonPulse 2s infinite; font-weight: 900; letter-spacing: 3px; margin-top:0;}
        h2 { color: #FFD700; text-shadow: 0 0 15px #FFD700; font-size: 30px; margin: 0 0 15px 0; text-align: center; letter-spacing: 2px; }

        .ui-btn {
            padding: 16px 40px; margin: 8px; border-radius: 40px; font-size: 16px; font-weight: bold;
            border: 2px solid rgba(255,255,255,0.1); color: white; cursor: pointer; text-transform: uppercase; width: 280px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
            transition: all 0.2s ease;
        }
        .btn-shop { background: linear-gradient(45deg, #f5af19, #f12711); box-shadow: 0 5px 20px rgba(241, 39, 17, 0.3); }
        .btn-endless { background: linear-gradient(45deg, #8A2387, #E94057, #F27121); box-shadow: 0 5px 20px rgba(233, 64, 87, 0.3); }
        .btn-back { background: transparent; border: 2px solid #555; box-shadow: none; margin-top: 15px; }
        
        .ui-btn:active { transform: scale(0.95); }
        .ui-btn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        #levelGrid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            width: 90%; max-width: 380px; max-height: 50vh; overflow-y: auto;
            padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lvl-btn {
            aspect-ratio: 1; border-radius: 10px; border: none; font-size: 16px; font-weight: bold;
            color: white; background: #222; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .lvl-btn.completed { background: #111; color: #4caf50; border: 1px solid #4caf50; cursor: not-allowed; }
        .lvl-btn.current { background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 0 10px #00d2ff; animation: neonPulse 1.5s infinite; }
        .lvl-btn.hard { background: linear-gradient(45deg, #f12711, #f5af19); box-shadow: 0 0 15px #f12711; animation: neonPulse 1s infinite;}
        .lvl-btn.locked { background: #1a1a2e; color: #555; cursor: not-allowed; }
        .lvl-btn:active:not(:disabled) { transform: scale(0.9); }

        #shopList { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 12px; width: 95%; max-width: 500px; max-height: 65vh; overflow-y: auto; padding: 5px; 
        }
        .shop-card {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center; position: relative;
        }
        .shop-card h3 { margin: 10px 0 5px 0; font-size: 18px; }
        .shop-card p { font-size: 12px; color: #aaa; margin: 0 0 10px 0; line-height: 1.2; flex-grow: 1; }
        .shop-btn { padding: 8px; width: 100%; border-radius: 8px; font-size: 13px; border: none; cursor: pointer; font-weight: bold; color: white; background: #4caf50; transition: 0.2s; }
        .shop-btn:disabled { background: #444; color: #777; }
        .shop-btn.equip { background: #00d2ff; }
        .lvl-badge { position: absolute; top: -5px; right: -5px; background: #ff0055; color: white; font-size: 10px; padding: 4px 6px; border-radius: 8px; font-weight: bold; border: 1px solid #fff;}

        .top-hud { position: fixed; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .hud-text { font-size: 22px; font-weight: bold; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .coin-hud { color: #FFD700; text-shadow: 0 0 10px #FFD700; }
        .lives-hud { color: #ff0055; text-shadow: 0 0 10px #ff0055; margin-top: 5px; font-size: 18px;}
        
        .pause-btn {
            background: rgba(0, 0, 0, 0.6); border: 2px solid rgba(255,255,255,0.2);
            color: white; font-size: 20px; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; display: flex;
            justify-content: center; align-items: center; transition: 0.2s;
            pointer-events: auto; backdrop-filter: blur(5px);
        }
        .pause-btn:active { transform: scale(0.85); }
    </style>
</head>
<body onclick="sfx.init()">

    <canvas id="gameCanvas"></canvas>

    <div class="top-hud" id="gameHud" style="display:none;">
        <div>
            <div class="hud-text" id="hudLeft">ГЛУБИНА: 0 м</div>
            <div class="lives-hud" id="hudLives"></div>
        </div>
        <div style="display: flex; align-items: flex-start; gap: 15px;">
            <div class="hud-text coin-hud" id="hudCoins" style="line-height: 40px;">💰 0</div>
            <button class="pause-btn" onclick="togglePause()">⏸</button>
        </div>
    </div>

    <div id="pauseMenu" class="overlay" style="z-index: 25;">
        <h2 style="color: white; text-shadow: 0 0 15px #fff;">ПАУЗА</h2>
        <button class="ui-btn" onclick="togglePause()">ПРОДОЛЖИТЬ</button>
        <button class="ui-btn btn-back" onclick="quitGame()">В МЕНЮ</button>
    </div>

    <div id="reviveMenu" class="overlay" style="z-index: 30;">
        <h2 style="color: #ff0055; text-shadow: 0 0 15px #ff0055; animation: laserPulse 1s infinite;">СЖЖЕН ЛАЗЕРОМ</h2>
        <p style="font-size: 18px; color: #ccc; margin-bottom: 25px;">Использовать сердце? У вас: <span id="reviveLivesCount" style="color: #ff0055; font-weight: bold;">0</span> ❤️</p>
        <button class="ui-btn" style="background: linear-gradient(45deg, #ff0055, #ff5e62);" onclick="confirmRevive()">ДА (❤️-1)</button>
        <button class="ui-btn btn-back" onclick="declineRevive()">СДАТЬСЯ</button>
    </div>

    <div id="mainMenu" class="overlay active">
        <h1 style="font-size: 48px; color: #ff0055; text-shadow: 0 0 20px #ff0055; animation: none;">NEON</h1>
        <h1 style="margin-top: -15px;">DOWNFALL</h1>
        <p style="color: #00d2ff; margin-bottom: 15px; font-weight: bold;">КАК ИГРАТЬ: Жми в ЦЕНТР экрана, чтобы ПРОБИТЬ платформу!</p>
        <button class="ui-btn" onclick="showState('LEVELS')">ШАХТЫ (КАМПАНИЯ)</button>
        <button class="ui-btn btn-endless" onclick="startGame('endless')">БЕЗДНА (БЕСКОНЕЧНЫЙ)</button>
        <button class="ui-btn btn-shop" onclick="showState('SHOP')">АРСЕНАЛ</button>
        <p class="coin-hud" style="font-size: 26px; margin-top: 15px;" id="menuCoins">💰 0</p>
        <p class="hud-text" style="font-size: 14px; color: #888;" id="menuScore">Макс. Глубина: 0 м</p>
    </div>

    <div id="levelMenu" class="overlay">
        <h2>СЕКТОРА ШАХТЫ</h2>
        <div id="levelGrid"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="shopMenu" class="overlay">
        <h2 style="margin-bottom: 5px;">АРСЕНАЛ</h2>
        <p class="coin-hud" style="font-size: 22px; margin-top: 0; margin-bottom: 15px;" id="shopCoins">💰 0</p>
        <div id="shopList"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="endMenu" class="overlay">
        <h2 id="endTitle">СЕКТОР ЗАЧИЩЕН</h2>
        <p id="endDesc" style="color: #ccc; font-size: 18px; margin-bottom: 30px;">Глубина достигнута!</p>
        <button class="ui-btn" id="endBtn1" onclick="nextAction()">ДАЛЕЕ</button>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">В МЕНЮ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth || document.documentElement.clientWidth || 400;
            canvas.height = window.innerHeight || document.documentElement.clientHeight || 800;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const SAVE = {
            coins: parseInt(localStorage.getItem('neonCoins')) || 0,
            maxLevel: parseInt(localStorage.getItem('neonMaxLevel')) || 1,
            highScore: parseInt(localStorage.getItem('neonScore')) || 0,
            jetpackLevel: parseInt(localStorage.getItem('neonJetpackLvl')) || 1,
            magnetCoinLvl: parseInt(localStorage.getItem('neonMagCoin')) || 0,
            magnetJpLvl: parseInt(localStorage.getItem('neonMagJp')) || 0,
            lives: parseInt(localStorage.getItem('neonLives')) || 0,
            skin: localStorage.getItem('neonSkin') || '#00d2ff',
            ownedSkins: JSON.parse(localStorage.getItem('neonSkins')) || ['#00d2ff'],
            trail: localStorage.getItem('neonTrail') || 'none',
            ownedTrails: JSON.parse(localStorage.getItem('neonTrails')) || ['none']
        };

        function saveGame() {
            localStorage.setItem('neonCoins', SAVE.coins);
            localStorage.setItem('neonMaxLevel', SAVE.maxLevel);
            localStorage.setItem('neonScore', SAVE.highScore);
            localStorage.setItem('neonJetpackLvl', SAVE.jetpackLevel);
            localStorage.setItem('neonMagCoin', SAVE.magnetCoinLvl);
            localStorage.setItem('neonMagJp', SAVE.magnetJpLvl);
            localStorage.setItem('neonLives', SAVE.lives);
            localStorage.setItem('neonSkin', SAVE.skin);
            localStorage.setItem('neonSkins', JSON.stringify(SAVE.ownedSkins));
            localStorage.setItem('neonTrail', SAVE.trail);
            localStorage.setItem('neonTrails', JSON.stringify(SAVE.ownedTrails));
            updateUI();
        }

        const overlays = { MAIN: document.getElementById('mainMenu'), LEVELS: document.getElementById('levelMenu'), SHOP: document.getElementById('shopMenu'), END: document.getElementById('endMenu'), PAUSE: document.getElementById('pauseMenu'), REVIVE: document.getElementById('reviveMenu') };
        const gameHud = document.getElementById('gameHud');
        let gameState = 'START'; 
        let pendingDeathReason = "";

        function showState(state) {
            sfx.init();
            Object.values(overlays).forEach(el => el.classList.remove('active'));
            gameHud.style.display = 'none';
            if(overlays[state]) overlays[state].classList.add('active');
            updateUI();
        }

        function togglePause() {
            if (gameState === 'PLAYING') {
                gameState = 'PAUSED'; document.getElementById('pauseMenu').classList.add('active');
                if (sfx.ctx && sfx.ctx.state === 'running') sfx.ctx.suspend(); 
            } else if (gameState === 'PAUSED') {
                gameState = 'PLAYING'; document.getElementById('pauseMenu').classList.remove('active');
                if (sfx.ctx && sfx.ctx.state === 'suspended') sfx.ctx.resume(); 
            }
        }

        function quitGame() {
            gameState = 'END'; document.getElementById('pauseMenu').classList.remove('active');
            if (sfx.ctx && sfx.ctx.state === 'suspended') sfx.ctx.resume(); 
            sfx.stopBGM(); saveGame(); showState('MAIN');
        }

        function confirmRevive() {
            document.getElementById('reviveMenu').classList.remove('active');
            gameState = 'PLAYING'; game.useExtraLife();
        }

        function declineRevive() {
            document.getElementById('reviveMenu').classList.remove('active');
            triggerGameOver(pendingDeathReason);
        }

        function updateUI() {
            document.getElementById('menuCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('shopCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('menuScore').innerText = `Макс. Глубина: ${SAVE.highScore} м`;
            document.getElementById('hudCoins').innerText = `💰 ${SAVE.coins}`;
            document.getElementById('hudLives').innerText = SAVE.lives > 0 ? `❤️ ${SAVE.lives}` : '';
            renderShop(); renderLevels();
        }

        function renderLevels() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                let btn = document.createElement('button'); btn.className = 'lvl-btn'; 
                if (i < SAVE.maxLevel) { btn.classList.add('completed'); btn.innerText = '✔️'; btn.disabled = true; } 
                else if (i === SAVE.maxLevel) {
                    btn.innerText = i;
                    if (i % 5 === 0) btn.classList.add('hard'); else btn.classList.add('current');
                    btn.onclick = () => startGame('campaign', i);
                } else { btn.classList.add('locked'); btn.innerText = '🔒'; btn.disabled = true; }
                grid.appendChild(btn);
            }
        }

        function renderShop() {
            const list = document.getElementById('shopList');
            list.innerHTML = '';
            const items = [
                { id: 'upg_jp', name: 'МЕТЕОР ☄️', desc: '+Время супер-удара', price: SAVE.jetpackLevel * 100, type: 'upg_jp', lvl: SAVE.jetpackLevel, maxed: SAVE.jetpackLevel >= 10 },
                { id: 'mag_coin', name: 'МАГНИТ ЗОЛОТА 🧲', desc: '+Радиус', price: SAVE.magnetCoinLvl * 100 + 100, type: 'mag_coin', lvl: SAVE.magnetCoinLvl, maxed: SAVE.magnetCoinLvl >= 5 },
                { id: 'mag_jp', name: 'МАГНИТ МЕТЕОРОВ 🧲', desc: '+Радиус', price: SAVE.magnetJpLvl * 150 + 150, type: 'mag_jp', lvl: SAVE.magnetJpLvl, maxed: SAVE.magnetJpLvl >= 5 },
                { id: 'life', name: 'СЕРДЦЕ ❤️', desc: 'Авто-спасение от лазера', price: 50, type: 'consumable', lvl: SAVE.lives },
                { id: '#39ff14', name: 'ТОКСИК 🟢', desc: 'Скин', price: 300, type: 'skin' },
                { id: '#FFD700', name: 'ЗОЛОТО 🟡', desc: 'Скин', price: 1000, type: 'skin' },
                { id: 'none', name: 'ОБЫЧНЫЙ ❌', desc: 'Убрать шлейф.', price: 0, type: 'trail' },
                { id: 'fire', name: 'ПЛАМЯ 🔥', desc: 'Огненный шлейф.', price: 800, type: 'trail' },
                { id: 'rainbow', name: 'РАДУГА 🌈', desc: 'Неоновый перелив.', price: 1500, type: 'trail' },
                { id: 'matrix', name: 'МАТРИЦА 🟩', desc: 'Цифровой след.', price: 2500, type: 'trail' }
            ];

            items.forEach(item => {
                let actionText = `КУПИТЬ (${item.price} 💰)`;
                let btnClass = 'shop-btn'; let disabled = SAVE.coins < item.price; let badge = '';

                if (item.type.startsWith('upg') || item.type.startsWith('mag')) {
                    badge = `<div class="lvl-badge">LVL ${item.lvl}</div>`;
                    if (item.maxed) { actionText = 'МАКСИМУМ'; disabled = true; }
                }
                if (item.type === 'consumable') badge = `<div class="lvl-badge">У ВАС: ${item.lvl}</div>`;
                
                if (item.type === 'skin') {
                    if (SAVE.ownedSkins.includes(item.id)) {
                        disabled = false;
                        if (SAVE.skin === item.id) { actionText = 'НАДЕТО'; disabled = true; btnClass += ' equip'; }
                        else { actionText = 'НАДЕТЬ'; btnClass += ' equip'; }
                    }
                }
                
                if (item.type === 'trail') {
                    if (SAVE.ownedTrails.includes(item.id)) {
                        disabled = false;
                        if (SAVE.trail === item.id) { actionText = 'НАДЕТО'; disabled = true; btnClass += ' equip'; }
                        else { actionText = 'НАДЕТЬ'; btnClass += ' equip'; }
                    }
                }

                let titleColor = item.type === 'skin' ? item.id : (item.type === 'trail' && item.id !== 'none' ? '#00d2ff' : '#ff0055');

                list.innerHTML += `
                    <div class="shop-card">
                        ${badge}
                        <h3 style="color:${titleColor}">${item.name}</h3>
                        <p>${item.desc}</p>
                        <button class="${btnClass}" ${disabled ? 'disabled' : ''} onclick="handleBuy('${item.id}', '${item.type}', ${item.price})">${actionText}</button>
                    </div>
                `;
            });
        }

        function handleBuy(id, type, price) {
            if (type === 'skin' && SAVE.ownedSkins.includes(id)) { SAVE.skin = id; sfx.jump(); saveGame(); return; }
            if (type === 'trail' && SAVE.ownedTrails.includes(id)) { SAVE.trail = id; sfx.jump(); saveGame(); return; }
            
            if (SAVE.coins >= price) {
                SAVE.coins -= price;
                if (type === 'upg_jp') SAVE.jetpackLevel++;
                if (type === 'mag_coin') SAVE.magnetCoinLvl++;
                if (type === 'mag_jp') SAVE.magnetJpLvl++;
                if (type === 'consumable') SAVE.lives++;
                if (type === 'skin') { SAVE.ownedSkins.push(id); SAVE.skin = id; }
                if (type === 'trail') { SAVE.ownedTrails.push(id); SAVE.trail = id; }
                sfx.purchase(); saveGame();
            }
        }

        // --- НОВЫЙ АУДИО ДВИЖОК ---
        class SoundEngine {
            constructor() { this.ctx = null; this.bgmStarted = false; this.bgmInterval = null; }
            init() {
                if (!this.ctx) { try { const AudioCtx = window.AudioContext || window.webkitAudioContext; if (AudioCtx) this.ctx = new AudioCtx(); } catch(e) {} }
                if (this.ctx && this.ctx.state === 'suspended' && gameState !== 'PAUSED') this.ctx.resume();
                if (!this.bgmStarted) this.startBGM();
            }
            playTone(freq, type, duration, vol=0.2) {
                if(!this.ctx || this.ctx.state !== 'running') return;
                try {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            }
            jump() { this.playTone(250, 'sine', 0.15, 0.2); } // Легкий отскок
            smash() { 
                if(!this.ctx || this.ctx.state !== 'running') return; 
                try {
                    const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.2); 
                    gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.2);
                } catch(e) {}
            }
            coin() {
                if(!this.ctx || this.ctx.state !== 'running') return; 
                try {
                    const now = this.ctx.currentTime;
                    const osc1 = this.ctx.createOscillator(); const gain1 = this.ctx.createGain();
                    osc1.type = 'sine'; osc1.frequency.setValueAtTime(2000, now); gain1.gain.setValueAtTime(0.15, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    const osc2 = this.ctx.createOscillator(); const gain2 = this.ctx.createGain();
                    osc2.type = 'square'; osc2.frequency.setValueAtTime(3000, now); gain2.gain.setValueAtTime(0.03, now); gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc1.connect(gain1); gain1.connect(this.ctx.destination); osc2.connect(gain2); gain2.connect(this.ctx.destination);
                    osc1.start(now); osc1.stop(now + 0.5); osc2.start(now); osc2.stop(now + 0.2);
                } catch(e) {}
            }
            purchase() { this.playTone(1000, 'square', 0.3, 0.1); }
            powerup() {
                if(!this.ctx || this.ctx.state !== 'running') return; 
                try {
                    const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(800, now + 0.4);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.4);
                } catch(e) {}
            }
            thrust() {
                if(!this.ctx || this.ctx.state !== 'running') return;
                try {
                    if(Math.random() > 0.6) {
                        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50 + Math.random()*50, this.ctx.currentTime);
                        gain.gain.setValueAtTime(0.08, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.1);
                    }
                } catch(e) {}
            }
            death() {
                if(!this.ctx) return; 
                try {
                    const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 1.0);
                    gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 1.0);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 1.0);
                } catch(e) {}
            }
            startBGM() {
                if (!this.ctx || this.bgmStarted) return;
                this.bgmStarted = true;
                const playNote = (time, freq, vol, type, duration) => {
                    try {
                        const osc = this.ctx.createOscillator(); const g = this.ctx.createGain();
                        osc.type = type; osc.frequency.value = freq; g.gain.setValueAtTime(vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + duration);
                        osc.connect(g); g.connect(this.ctx.destination); osc.start(time); osc.stop(time + duration);
                    } catch(e) {}
                };
                let step = 0;
                this.bgmInterval = setInterval(() => {
                    if(this.ctx.state !== 'running' || gameState === 'PAUSED' || gameState === 'REVIVE_PROMPT') return; 
                    const now = this.ctx.currentTime;
                    // Мрачный бас падения
                    const bassNotes = [82, 0, 82, 0, 98, 0, 82, 0, 73, 0, 73, 0, 98, 82, 0, 0];
                    if (bassNotes[step]) playNote(now, bassNotes[step], 0.05, 'square', 0.2);
                    step = (step + 1) % 16;
                }, 160); // Темп быстрее!
            }
            stopBGM() { clearInterval(this.bgmInterval); this.bgmStarted = false; }
        }
        const sfx = new SoundEngine();

        // --- НОВОЕ УПРАВЛЕНИЕ (3 ЗОНЫ) ---
        class InputHandler {
            constructor() {
                this.keys = [];
                window.addEventListener('keydown', e => { if (!this.keys.includes(e.key)) this.keys.push(e.key); });
                window.addEventListener('keyup', e => { this.keys = this.keys.filter(k => k !== e.key); });
                
                const handleTouch = (e) => {
                    if (gameState !== 'PLAYING') return; e.preventDefault(); this.keys = []; 
                    for (let i = 0; i < e.touches.length; i++) {
                        let x = e.touches[i].clientX;
                        let w = canvas.width;
                        // Левая треть - влево, Правая треть - вправо, Центр - УДАР ВНИЗ!
                        if (x < w * 0.33) this.keys.push('ArrowLeft');
                        else if (x > w * 0.66) this.keys.push('ArrowRight');
                        else this.keys.push('ArrowDown');
                    }
                };
                const handleTouchEnd = (e) => { if (e.touches.length === 0) this.keys = []; else handleTouch(e); };
                canvas.addEventListener('touchstart', handleTouch, {passive: false});
                canvas.addEventListener('touchmove', handleTouch, {passive: false});
                canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
            }
        }

        class Particle {
            constructor(x, y, color, isFire = false, speedMult = 1, text = null) {
                this.x = x; this.y = y; this.color = color; this.text = text;
                this.size = Math.random() * (isFire ? 10 : 6) + 2;
                this.vx = (Math.random() - 0.5) * (isFire ? 5 : 12) * speedMult;
                this.vy = (Math.random() - 0.5) * 12 * speedMult; // Разлет во все стороны!
                this.life = 1.0; this.decay = isFire ? 0.05 : 0.03;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw(ctx) { 
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; 
                ctx.shadowBlur = 10; ctx.shadowColor = this.color; 
                if (this.text) { ctx.font = 'bold 16px monospace'; ctx.fillText(this.text, this.x, this.y); } 
                else { ctx.fillRect(this.x, this.y, this.size, this.size); }
                ctx.shadowBlur = 0; ctx.globalAlpha = 1.0; 
            }
        }

        class FloatingText {
            constructor(x, y, text) { this.x = x; this.y = y; this.text = text; this.life = 1.0; this.vy = -1.5; }
            update() { this.y += this.vy; this.life -= 0.02; }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = '#ff0055'; ctx.font = 'bold 24px Arial';
                ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.fillText(this.text, this.x - 30, this.y);
                ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;
            }
        }

        class Platform {
            constructor(x, y, width, type = 'normal', tier = 0) {
                this.x = x; this.y = y; this.width = width; this.height = 20;
                this.type = type; 
                this.moveSpeed = (0.8 + tier * 0.4) + Math.random() * 1.2; 
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.broken = false;
            }
            update() {
                if (this.type === 'moving') {
                    this.x += this.moveSpeed * this.direction;
                    if (this.x <= 0 || this.x + this.width >= canvas.width) this.direction *= -1;
                }
            }
            draw(ctx) {
                if(this.broken) return;
                if (this.type === 'finish') { ctx.fillStyle = '#FFD700'; ctx.shadowBlur = 20; ctx.shadowColor = '#FFD700'; }
                else if (this.type === 'moving') { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#ff00ff'; }
                else if (this.type === 'spring') { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#00ff00'; }
                else { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#00d2ff'; }
                ctx.fillRect(this.x, this.y, this.width, 4); 
                ctx.shadowBlur = 0;
            }
        }

        class Item {
            constructor(x, y, type) { this.x = x; this.y = y; this.type = type; this.width = 24; this.height = 24; this.baseY = y; this.angle = Math.random() * Math.PI * 2; this.markedForDeletion = false; }
            update() { this.angle += 0.05; this.y = this.baseY + Math.sin(this.angle) * 5; }
            draw(ctx) {
                if(this.markedForDeletion) return;
                ctx.beginPath();
                if (this.type === 'coin') { ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20; ctx.arc(this.x + 12, this.y + 12, 10, 0, Math.PI * 2); }
                else if (this.type === 'jetpack') { ctx.fillStyle = '#ff0055'; ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 25; ctx.moveTo(this.x+12, this.y-4); ctx.lineTo(this.x+26, this.y+24); ctx.lineTo(this.x-2, this.y+24); }
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        // --- НОВЫЙ ОХОТНИК: НАДВИГАЮЩИЙСЯ ЛАЗЕРНЫЙ ПОТОЛОК ---
        class Hunter {
            constructor(game) { this.game = game; this.y = -500; this.active = false; this.waitTimer = 0; }
            reset() { this.y = this.game.cameraY - 500; this.active = false; this.waitTimer = 120; }
            startTimer() { this.waitTimer = 120; } 
            update() {
                if (gameState !== 'PLAYING') return;
                if (!this.active) { 
                    if (this.waitTimer > 0) this.waitTimer--;
                    else this.active = true; 
                    return; 
                }
                
                // Лазер постоянно ползет вниз
                let baseSpeed = this.game.isHard ? 2.5 : 1.5; 
                let speed = baseSpeed + (this.game.level * 0.1); 
                
                // Если игрок улетел слишком далеко вниз, лазер ускоряется, чтобы догнать
                if (this.game.player.y - this.y > 700) {
                    speed += (this.game.player.y - this.y - 700) * 0.01;
                }
                this.y += speed;
            }
            draw(ctx) {
                // Рисуем заливку сверху экрана до линии лазера
                ctx.fillStyle = 'rgba(255, 0, 50, 0.4)';
                let topEdge = this.game.cameraY;
                if (this.y > topEdge) {
                    ctx.fillRect(0, topEdge, canvas.width, this.y - topEdge);
                }
                
                // Сам лазерный луч
                ctx.fillStyle = '#ff0033'; ctx.shadowBlur = 20; ctx.shadowColor = '#ff0033'; 
                ctx.fillRect(0, this.y - 10, canvas.width, 15);
                
                // Искры от лазера
                if (Math.random() > 0.5) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(Math.random() * canvas.width, this.y - 5, 10 + Math.random()*20, 2);
                }
                ctx.shadowBlur = 0;
            }
        }

        class Player {
            constructor(game) { this.game = game; this.width = 30; this.height = 30; this.color = SAVE.skin; this.reset(); }
            reset() { this.x = canvas.width/2 - 15; this.y = 100; this.vx = 0; this.vy = 0; this.jetpackTimer = 0; this.color = SAVE.skin; this.angle = 0; this.frameCount = 0; this.isSmashing = false;}
            update(input) {
                if (gameState !== 'PLAYING') return;
                this.frameCount++;

                // Движение влево/вправо
                if (input.keys.includes('ArrowRight')) this.vx = 8; else if (input.keys.includes('ArrowLeft')) this.vx = -8; else this.vx *= 0.8;
                
                // УДАР ВНИЗ (SMASH)
                if (input.keys.includes('ArrowDown') && this.vy >= 0 && !this.isSmashing) {
                    this.isSmashing = true;
                    this.vy = 25; // Резкое ускорение вниз
                    sfx.smash();
                }

                let dir = this.vx > 0 ? 1 : (this.vx < 0 ? -1 : 1);
                this.angle += (this.jetpackTimer > 0 || this.isSmashing ? 0.4 : 0.1) * dir;

                // Шлейфы
                if (SAVE.trail !== 'none' || this.isSmashing) {
                    if (this.isSmashing) {
                        this.game.particles.push(new Particle(this.x + 15, this.y, '#ff5500', true, 0.5));
                    } else if (SAVE.trail === 'rainbow' && this.frameCount % 2 === 0) {
                        this.game.particles.push(new Particle(this.x + 10 + Math.random()*10, this.y + 5, `hsl(${this.frameCount * 5 % 360}, 100%, 50%)`, false, 0.3));
                    } else if (SAVE.trail === 'matrix' && this.frameCount % 3 === 0) {
                        let char = Math.random() > 0.5 ? '0' : '1';
                        this.game.particles.push(new Particle(this.x + Math.random()*20, this.y, '#00ff00', false, 0.2, char));
                    } else if (SAVE.trail === 'fire' && this.frameCount % 2 === 0) {
                        this.game.particles.push(new Particle(this.x + 10 + Math.random()*10, this.y, Math.random() > 0.5 ? '#ff0000' : '#ff9900', true, 0.4));
                    }
                }

                // Гравитация тянет ВНИЗ (в плюс)
                if (this.jetpackTimer > 0) { 
                    this.isSmashing = true; this.vy = 30; this.jetpackTimer--; sfx.thrust(); 
                    this.game.particles.push(new Particle(this.x+15, this.y, '#ff9900', true)); 
                } else if (!this.isSmashing) { 
                    this.vy += 0.8; // Гравитация
                }
                
                if (this.vy < 0) this.isSmashing = false; // Отменили смэш после отскока
                if (this.vy > 35) this.vy = 35; // Терминальная скорость
                
                this.y += this.vy;
                
                // КОЛЛИЗИЯ С ПЛАТФОРМАМИ (Только при падении)
                if (this.vy > 0) {
                    this.game.platforms.forEach(p => {
                        if (p.type === 'finish') {
                            // Финиш ловим всегда
                            if (this.x < p.x + p.width && this.x + 30 > p.x && this.y + 30 >= p.y && this.y < p.y + 20) {
                                triggerWin();
                            }
                            return;
                        }

                        if (p.broken) return;
                        
                        if (this.x < p.x + p.width && this.x + 30 > p.x && this.y + 30 >= p.y && this.y + 30 - this.vy <= p.y + 20) {
                            if (this.isSmashing) {
                                // ПРОБИВАЕМ ПЛАТФОРМУ НАХРЕН!
                                p.broken = true;
                                sfx.death(); // Звук разрушения
                                for(let i=0; i<20; i++) this.game.particles.push(new Particle(p.x + Math.random()*p.width, p.y, p.type === 'spring' ? '#00ff00' : '#00d2ff', false, 1.5));
                            } else {
                                // ОТСКОК ОТ ПЛАТФОРМЫ
                                this.y = p.y - 30; 
                                sfx.jump(); 
                                if (p.type === 'spring') { 
                                    this.vy = -26; // Пружина кидает жестко вверх к лазеру!
                                    this.createJumpDust('#00ff00', 1.5); 
                                } else { 
                                    this.vy = -12; // Легкий авто-отскок от обычной платформы
                                    this.createJumpDust('#ffffff', 1); 
                                } 
                                
                                if (this.game.isHard) {
                                    p.broken = true;
                                    for(let i=0; i<15; i++) this.game.particles.push(new Particle(p.x + Math.random()*p.width, p.y, '#555'));
                                }
                            }
                        }
                    });
                }
                this.x += this.vx; if (this.x > canvas.width) this.x = -30; if (this.x < -30) this.x = canvas.width;
            }
            createJumpDust(color, speedMult) { for(let i=0; i<12; i++) this.game.particles.push(new Particle(this.x+15, this.y+30, color, false, speedMult)); }
            draw(ctx) { 
                ctx.save();
                ctx.translate(this.x + 15, this.y + 15);
                ctx.rotate(this.angle);

                ctx.fillStyle = this.jetpackTimer > 0 || this.isSmashing ? '#fff' : this.color; 
                ctx.shadowBlur = 20; ctx.shadowColor = this.jetpackTimer > 0 ? '#ff0055' : (this.isSmashing ? '#ff9900' : this.color); 
                
                ctx.fillRect(-15, -15, 30, 30); 
                
                ctx.shadowBlur = 0; 
                ctx.restore();
            }
        }

        class Game {
            constructor(mode, level) {
                this.mode = mode; 
                this.level = level || 1;
                this.isHard = (this.mode === 'campaign' && this.level % 5 === 0);
                
                this.input = new InputHandler(); this.platforms = []; this.items = []; this.particles = []; this.floatingTexts = [];
                
                this.cameraY = 0; 
                this.lowestY = canvas.height + 50; // Генерируем ВНИЗ
                this.maxReachedY = 0; 
                
                this.tier = 0; 
                this.currentScore = 0;

                this.targetY = this.mode === 'campaign' ? (1500 + (this.level * 500)) : Infinity;
                this.finishSpawned = false;

                this.platforms.push(new Platform(0, this.lowestY, canvas.width, 'normal', this.tier));
                this.player = new Player(this); this.hunter = new Hunter(this);
            }

            // ГЕНЕРАЦИЯ ЧАНКОВ ВНИЗ
            generateChunk() {
                while (this.lowestY < this.cameraY + canvas.height * 2) {
                    if (this.mode === 'campaign' && this.lowestY >= this.targetY) {
                        if (!this.finishSpawned) { this.platforms.push(new Platform(0, this.targetY + 100, canvas.width, 'finish', 0)); this.finishSpawned = true; }
                        break;
                    }
                    let gap = 120 + (this.tier * 10) + Math.random() * (this.isHard ? 60 : 40 + (this.tier * 5));
                    this.lowestY += gap; // Увеличиваем Y
                    
                    let w = 85 + Math.random() * (this.isHard ? 50 : 80); 
                    let x = Math.random() * (canvas.width - w);
                    
                    let type = 'normal'; let r = Math.random();
                    if (this.isHard) { if (r > 0.95) type = 'spring'; else if (r > 0.4) type = 'moving'; } 
                    else { if (r > 0.85) type = 'spring'; else if (r > Math.max(0.2, 0.65 - (this.tier * 0.15))) type = 'moving'; }
                    
                    this.platforms.push(new Platform(x, this.lowestY, w, type, this.tier));
                    
                    let ri = Math.random();
                    if (ri > 0.993 && !this.isHard) this.items.push(new Item(x + w/2 - 12, this.lowestY - 40, 'jetpack'));
                    else if (ri > 0.6) this.items.push(new Item(x + w/2 - 12, this.lowestY - 35, 'coin'));
                }
            }

            useExtraLife() {
                SAVE.lives--; saveGame(); sfx.powerup();
                for(let i=0; i<50; i++) this.particles.push(new Particle(this.player.x+15, this.player.y+15, '#ffffff', false, 2));
                // Даем кратковременный супер-метеор вниз, отодвигаем лазер вверх
                this.player.jetpackTimer = 40; 
                this.hunter.y = this.cameraY - 600; 
                this.hunter.active = false; this.hunter.startTimer(); 
                this.floatingTexts.push(new FloatingText(this.player.x, this.player.y, "❤️ СПАСЕН!"));
            }

            update() {
                if (gameState !== 'PLAYING') return;

                if (this.player.y > this.maxReachedY) this.maxReachedY = this.player.y; // Учет рекорда ВНИЗ

                if (this.mode === 'endless') {
                    this.currentScore = Math.floor(this.maxReachedY / 10);
                    this.tier = Math.floor(this.currentScore / 3000); 
                    document.getElementById('hudLeft').innerText = `ГЛУБИНА: ${this.currentScore} м`;
                    if (this.currentScore > SAVE.highScore) SAVE.highScore = this.currentScore; 
                }

                this.generateChunk(); 
                let cleanupY = this.cameraY - 500; // Удаляем то, что осталось сильно СВЕРХУ
                this.platforms = this.platforms.filter(p => p.y > cleanupY && !p.broken); 
                this.items = this.items.filter(i => i.y > cleanupY && !i.markedForDeletion); 

                this.platforms.forEach(p => p.update()); this.player.update(this.input); this.hunter.update(); 
                this.items.forEach(i => i.update()); this.particles.forEach(p => p.update()); this.particles = this.particles.filter(p => p.life > 0);
                this.floatingTexts.forEach(ft => ft.update()); this.floatingTexts = this.floatingTexts.filter(ft => ft.life > 0);
                
                // Камера плавно спускается за игроком
                let targetCamera = this.player.y - canvas.height * 0.3; // Игрок в верхней трети экрана
                if (targetCamera > this.cameraY) {
                    this.cameraY += (targetCamera - this.cameraY) * 0.15; 
                }
                
                // ЕДИНСТВЕННАЯ СМЕРТЬ: КАСАНИЕ ЛАЗЕРНОГО ПОТОЛКА
                if (this.player.y < this.hunter.y) {
                    if (SAVE.lives > 0) { this.useExtraLife(); } 
                    else {
                        for(let i=0; i<40; i++) this.particles.push(new Particle(this.player.x+15, this.player.y+15, '#ff0033', false, 1.5));
                        this.handleDeath("СЖЖЕН ЛАЗЕРОМ");
                    }
                }

                let magCoinRadius = SAVE.magnetCoinLvl * 45; 
                let magJpRadius = SAVE.magnetJpLvl * 45;

                this.items.forEach(item => {
                    if (item.markedForDeletion) return;
                    
                    let dx = (this.player.x + 15) - (item.x + 12);
                    let dy = (this.player.y + 15) - (item.y + 12);
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    let radius = item.type === 'coin' ? magCoinRadius : (item.type === 'jetpack' ? magJpRadius : 0);
                    if (radius > 0 && dist < radius) {
                        item.x += (dx / dist) * 12;
                        item.y += (dy / dist) * 12;
                    }

                    if (this.player.x < item.x + 24 && this.player.x + 30 > item.x && this.player.y < item.y + 24 && this.player.y + 30 > item.y) {
                        item.markedForDeletion = true;
                        
                        if (item.type === 'coin') { 
                            // Бонус за Смэш-сбор! Если разбил платформу и собрал монету
                            let reward = (this.isHard ? 3 : 1) * (this.player.isSmashing ? 2 : 1); 
                            SAVE.coins += reward; sfx.coin(); saveGame(); 
                            if (this.player.isSmashing) this.floatingTexts.push(new FloatingText(item.x, item.y, "SMASH x2!"));
                            for(let i=0; i<15; i++) this.particles.push(new Particle(item.x+12, item.y+12, '#FFD700')); 
                            document.getElementById('hudCoins').innerText = `💰 ${SAVE.coins}`;
                        } else if (item.type === 'jetpack') { 
                            this.player.jetpackTimer = 90 + (SAVE.jetpackLevel * 30); 
                            sfx.powerup(); 
                            for(let i=0; i<25; i++) this.particles.push(new Particle(item.x+12, item.y+12, '#ff0055', false, 1.5)); 
                        }
                    }
                });
            }
            handleDeath(reason) {
                if (SAVE.lives > 0 && gameState === 'PLAYING') {
                    gameState = 'REVIVE_PROMPT'; pendingDeathReason = reason;
                    document.getElementById('reviveLivesCount').innerText = SAVE.lives; document.getElementById('reviveMenu').classList.add('active');
                } else if (gameState === 'PLAYING') { triggerGameOver(reason); }
            }
            draw(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (this.isHard) { 
                    ctx.fillStyle = 'rgba(50, 0, 10, 0.3)'; ctx.fillRect(0,0,canvas.width, canvas.height); 
                } else if (this.mode === 'endless' && this.tier > 0) {
                    let bgAlpha = Math.min(0.8, this.tier * 0.15);
                    ctx.fillStyle = `rgba(60, 0, 15, ${bgAlpha})`; 
                    ctx.fillRect(0,0,canvas.width, canvas.height);
                }

                ctx.save(); ctx.translate(0, -this.cameraY);
                this.platforms.forEach(p => p.draw(ctx)); this.items.forEach(i => i.draw(ctx)); 
                if (gameState === 'PLAYING' || gameState === 'END' || gameState === 'REVIVE_PROMPT') this.player.draw(ctx);
                this.hunter.draw(ctx); // Лазер рисуем поверх всего
                this.particles.forEach(p => p.draw(ctx)); this.floatingTexts.forEach(ft => ft.draw(ctx));
                ctx.restore();
                
                if ((gameState === 'PLAYING' || gameState === 'REVIVE_PROMPT') && this.player.jetpackTimer > 0) {
                    let maxTimer = 90 + (SAVE.jetpackLevel * 30);
                    let prog = this.player.jetpackTimer / maxTimer;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(canvas.width/2 - 50, 50, 100, 6);
                    ctx.fillStyle = '#ff0055'; ctx.fillRect(canvas.width/2 - 50, 50, 100 * prog, 6);
                }
            }
        }

        let game = null; let lastPlayedMode = 'campaign'; let lastPlayedLevel = 1;

        function animate() { if (game) { game.update(); game.draw(ctx); } requestAnimationFrame(animate); }
        
        function startGame(mode, level = 1) {
            lastPlayedMode = mode; lastPlayedLevel = level;
            game = new Game(mode, level); gameState = 'PLAYING'; 
            document.getElementById('hudLeft').innerText = mode === 'campaign' ? `СЕКТОР ${level}` : `ГЛУБИНА: 0 м`;
            document.getElementById('hudLeft').style.color = game.isHard ? '#ff0055' : 'white';
            updateUI(); showState('NONE'); gameHud.style.display = 'flex';
            game.hunter.reset(); game.hunter.startTimer();
        }

        function triggerGameOver(reason) { 
            gameState = 'END'; sfx.death(); saveGame(); 
            setTimeout(() => { 
                document.getElementById('endTitle').innerText = "КРИТИЧЕСКИЙ УРОН"; document.getElementById('endTitle').style.color = "#ff0055";
                document.getElementById('endDesc').innerText = reason; document.getElementById('endBtn1').innerText = "ПОВТОРИТЬ";
                document.getElementById('endBtn1').onclick = () => startGame(lastPlayedMode, lastPlayedLevel);
                showState('END');
            }, 800); 
        }

        function triggerWin() { 
            gameState = 'END'; sfx.coin(); 
            if (lastPlayedLevel === SAVE.maxLevel && SAVE.maxLevel < 100) SAVE.maxLevel++;
            saveGame();
            setTimeout(() => { 
                document.getElementById('endTitle').innerText = "СЕКТОР ЗАЧИЩЕН"; document.getElementById('endTitle').style.color = "#00ff00";
                document.getElementById('endDesc').innerText = game.isHard ? "ХАРДКОР ЗАВЕРШЕН!" : "Отличная работа!"; 
                document.getElementById('endBtn1').innerText = "СЛЕДУЮЩИЙ";
                document.getElementById('endBtn1').onclick = () => startGame('campaign', lastPlayedLevel + 1);
                showState('END');
            }, 500); 
        }
        
        showState('MAIN'); animate();
    </script>
</body>
</html>
