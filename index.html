<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Run - Phaser 3 Port</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #0b0b1a; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<script>
// --- МЕНЕДЖЕР СОХРАНЕНИЙ (Готов к Telegram Mini Apps) ---
const DataManager = {
    data: {
        coins: 0, maxLevel: 1, highScore: 0, jetpackLevel: 1, 
        magnetCoinLvl: 0, magnetJpLvl: 0, lives: 0, 
        skin: '#00d2ff', ownedSkins:['#00d2ff'], 
        trail: 'none', ownedTrails: ['none']
    },
    load() {
        // Заглушка для TG CloudStorage. Сейчас используем localStorage.
        const saved = localStorage.getItem('neonSave_v2');
        if (saved) Object.assign(this.data, JSON.parse(saved));
    },
    save() {
        localStorage.setItem('neonSave_v2', JSON.stringify(this.data));
    }
};

// --- ЗВУКОВОЙ ДВИЖОК (Адаптирован из оригинала) ---
class SoundEngine {
    constructor() { this.ctx = null; this.bgmStarted = false; this.bgmInterval = null; }
    init() {
        if (!this.ctx) {
            try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } 
            catch(e) { console.log('Audio disabled', e); }
        }
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
        if (!this.bgmStarted) this.startBGM();
    }
    playTone(freq, type, duration, vol=0.2) {
        if(!this.ctx || this.ctx.state !== 'running') return;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration);
    }
    jump() { this.playTone(250, 'sine', 0.15, 0.2); }
    coin() {
        if(!this.ctx) return;
        const now = this.ctx.currentTime;
        this.playTone(2000, 'sine', 0.5, 0.15);
        this.playTone(3000, 'square', 0.2, 0.03);
    }
    purchase() { this.playTone(1000, 'square', 0.3, 0.1); }
    powerup() { this.playTone(300, 'sawtooth', 0.4, 0.15); }
    thrust() { if(Math.random() > 0.7) this.playTone(50 + Math.random()*50, 'sawtooth', 0.1, 0.05); }
    death() { this.playTone(300, 'sawtooth', 1.0, 0.2); }
    startBGM() {
        if (!this.ctx || this.bgmStarted) return;
        this.bgmStarted = true;
        let step = 0;
        this.bgmInterval = setInterval(() => {
            if(this.ctx.state !== 'running' || window.gamePaused) return; 
            const now = this.ctx.currentTime;
            const bass =[130, 0, 130, 0, 196, 0, 146, 0, 130, 0, 130, 0, 196, 146, 0, 0];
            const lead =[523, 0, 659, 0, 783, 0, 659, 0, 1046, 0, 783, 0, 659, 0, 523, 0];
            if (bass[step]) this.playTone(bass[step], 'square', 0.15, 0.05);
            if (lead[step]) this.playTone(lead[step], 'sine', 0.2, 0.03);
            step = (step + 1) % 16;
        }, 180); 
    }
}
const sfx = new SoundEngine();

// Глобальные переменные стейта
let gameMode = 'campaign'; 
let currentLevel = 1;

// --- УТИЛИТА СОЗДАНИЯ UI КНОПОК ---
function createButton(scene, x, y, text, color, onClick) {
    const btn = scene.add.container(x, y);
    const bg = scene.add.rectangle(0, 0, 240, 50, color).setStrokeStyle(2, 0xffffff, 0.5).setInteractive();
    const txt = scene.add.text(0, 0, text, { font: 'bold 20px Arial', color: '#fff' }).setOrigin(0.5);
    btn.add([bg, txt]);
    
    bg.on('pointerdown', () => { bg.setScale(0.95); sfx.init(); });
    bg.on('pointerup', () => { bg.setScale(1); onClick(); });
    bg.on('pointerout', () => bg.setScale(1));
    return btn;
}

// ==========================================
// SCENE 1: BOOT & ГЕНЕРАЦИЯ АССЕТОВ
// ==========================================
class BootScene extends Phaser.Scene {
    constructor() { super('Boot'); }
    create() {
        DataManager.load();
        const g = this.add.graphics();
        
        // Платформа (Обычная)
        g.fillStyle(0x222222); g.fillRect(0,0,100,20);
        g.fillStyle(0x00d2ff); g.fillRect(0,0,100,4);
        g.generateTexture('plat_normal', 100, 20); g.clear();
        
        // Платформа (Движущаяся)
        g.fillStyle(0x222222); g.fillRect(0,0,100,20);
        g.fillStyle(0xff00ff); g.fillRect(0,0,100,4);
        g.generateTexture('plat_moving', 100, 20); g.clear();

        // Платформа (Пружина)
        g.fillStyle(0x222222); g.fillRect(0,0,100,20);
        g.fillStyle(0x00ff00); g.fillRect(0,0,100,4);
        g.generateTexture('plat_spring', 100, 20); g.clear();

        // Платформа (Финиш)
        g.fillStyle(0xFFD700); g.fillRect(0,0,100,20);
        g.generateTexture('plat_finish', 100, 20); g.clear();

        // Белая текстура для частиц и игрока
        g.fillStyle(0xffffff); g.fillRect(0,0,16,16);
        g.generateTexture('white_box', 16, 16); g.clear();

        // Монета
        g.fillStyle(0xFFD700); g.fillCircle(12,12,10);
        g.generateTexture('coin', 24, 24); g.clear();

        // Джетпак
        g.fillStyle(0xff0055); g.fillTriangle(12, 0, 24, 24, 0, 24);
        g.generateTexture('jetpack', 24, 24); g.clear();

        this.scene.start('Menu');
    }
}

// ==========================================
// SCENE 2: MAIN MENU
// ==========================================
class MenuScene extends Phaser.Scene {
    constructor() { super('Menu'); }
    create() {
        const cx = this.scale.width / 2;
        const cy = this.scale.height / 2;

        this.add.text(cx, cy - 150, 'NEON RUN', { font: '900 46px Arial', color: '#fff', stroke: '#00d2ff', strokeThickness: 6 }).setOrigin(0.5);
        this.add.text(cx, cy - 100, 'Нажми на экран для звука', { font: '14px Arial', color: '#aaa' }).setOrigin(0.5);

        createButton(this, cx, cy - 20, 'КАМПАНИЯ', 0x3a7bd5, () => this.scene.start('LevelSelect'));
        createButton(this, cx, cy + 40, 'БЕСКОНЕЧНЫЙ', 0xE94057, () => { gameMode = 'endless'; currentLevel = 1; this.scene.start('Game'); });
        createButton(this, cx, cy + 100, 'МАГАЗИН', 0xf5af19, () => this.scene.start('Shop'));

        this.add.text(cx, cy + 180, `💰 ${DataManager.data.coins}`, { font: 'bold 26px Arial', color: '#FFD700' }).setOrigin(0.5);
        this.add.text(cx, cy + 220, `Рекорд: ${DataManager.data.highScore} м`, { font: '16px Arial', color: '#888' }).setOrigin(0.5);
    }
}

// ==========================================
// SCENE 3: LEVEL SELECT
// ==========================================
class LevelSelectScene extends Phaser.Scene {
    constructor() { super('LevelSelect'); }
    create() {
        const cx = this.scale.width / 2;
        this.add.text(cx, 50, 'КАМПАНИЯ', { font: 'bold 30px Arial', color: '#FFD700' }).setOrigin(0.5);
        
        // Простая пагинация сетки (25 уровней на страницу)
        let page = Math.floor((DataManager.data.maxLevel - 1) / 25);
        this.renderGrid(page);

        createButton(this, cx, this.scale.height - 50, 'НАЗАД', 0x555555, () => this.scene.start('Menu'));
    }

    renderGrid(page) {
        if(this.gridContainer) this.gridContainer.destroy();
        this.gridContainer = this.add.container(0, 120);
        const startX = this.scale.width / 2 - 120;
        let startLvl = page * 25 + 1;

        for (let i = 0; i < 25; i++) {
            let lvl = startLvl + i;
            if (lvl > 100) break;
            
            let x = startX + (i % 5) * 60;
            let y = Math.floor(i / 5) * 60;

            let color = 0x1a1a2e; let textColor = '#555'; let text = '🔒';
            let interactive = false;

            if (lvl < DataManager.data.maxLevel) { color = 0x111111; text = '✔️'; textColor = '#4caf50'; } 
            else if (lvl === DataManager.data.maxLevel) {
                color = (lvl % 5 === 0) ? 0xf12711 : 0x00d2ff;
                text = lvl.toString(); textColor = '#fff'; interactive = true;
            }

            let btn = this.add.rectangle(x, y, 50, 50, color).setStrokeStyle(1, 0xffffff, 0.2);
            let txt = this.add.text(x, y, text, { font: 'bold 18px Arial', color: textColor }).setOrigin(0.5);
            
            if (interactive) {
                btn.setInteractive();
                btn.on('pointerdown', () => {
                    gameMode = 'campaign'; currentLevel = lvl;
                    this.scene.start('Game');
                });
            }
            this.gridContainer.add([btn, txt]);
        }

        if (page > 0) {
            let prev = this.add.text(20, this.scale.height - 120, '< Пред.', { font: '20px Arial', color: '#fff'}).setInteractive();
            prev.on('pointerdown', () => this.renderGrid(page - 1));
            this.gridContainer.add(prev);
        }
        if (page < 3) {
            let next = this.add.text(this.scale.width - 20, this.scale.height - 120, 'След. >', { font: '20px Arial', color: '#fff'}).setOrigin(1, 0).setInteractive();
            next.on('pointerdown', () => this.renderGrid(page + 1));
            this.gridContainer.add(next);
        }
    }
}

// ==========================================
// SCENE 4: SHOP (Магазин)
// ==========================================
class ShopScene extends Phaser.Scene {
    constructor() { super('Shop'); }
    create() {
        const cx = this.scale.width / 2;
        this.add.text(cx, 40, 'АРСЕНАЛ', { font: 'bold 30px Arial', color: '#FFD700' }).setOrigin(0.5);
        this.coinsText = this.add.text(cx, 80, `💰 ${DataManager.data.coins}`, { font: 'bold 22px Arial', color: '#FFD700' }).setOrigin(0.5);
        
        createButton(this, cx, this.scale.height - 50, 'НАЗАД', 0x555555, () => this.scene.start('Menu'));

        this.items =[
            { id: 'upg_jp', name: 'РАКЕТА 🚀', price: () => DataManager.data.jetpackLevel * 100, max: () => DataManager.data.jetpackLevel >= 10, buy: () => DataManager.data.jetpackLevel++ },
            { id: 'mag_coin', name: 'МАГНИТ ЗОЛ.🧲', price: () => DataManager.data.magnetCoinLvl * 100 + 100, max: () => DataManager.data.magnetCoinLvl >= 5, buy: () => DataManager.data.magnetCoinLvl++ },
            { id: 'mag_jp', name: 'МАГНИТ РАК.🧲', price: () => DataManager.data.magnetJpLvl * 150 + 150, max: () => DataManager.data.magnetJpLvl >= 5, buy: () => DataManager.data.magnetJpLvl++ },
            { id: 'life', name: 'СЕРДЦЕ ❤️', price: () => 50, max: () => false, buy: () => DataManager.data.lives++ },
            { id: '#39ff14', name: 'Скин: ТОКСИК', price: () => 300, max: () => DataManager.data.ownedSkins.includes('#39ff14'), buy: () => { DataManager.data.ownedSkins.push('#39ff14'); DataManager.data.skin = '#39ff14'; }, isEquip: true },
            { id: '#FFD700', name: 'Скин: ЗОЛОТО', price: () => 1000, max: () => DataManager.data.ownedSkins.includes('#FFD700'), buy: () => { DataManager.data.ownedSkins.push('#FFD700'); DataManager.data.skin = '#FFD700'; }, isEquip: true }
        ];

        this.renderList();
    }

    renderList() {
        if(this.listContainer) this.listContainer.destroy();
        this.listContainer = this.add.container(0, 130);
        const cx = this.scale.width / 2;

        this.items.forEach((item, i) => {
            let y = i * 85;
            let bg = this.add.rectangle(cx, y, 320, 75, 0x222233).setStrokeStyle(1, 0x444455);
            let name = this.add.text(cx - 150, y - 20, item.name, { font: 'bold 18px Arial', color: item.id.startsWith('#') ? item.id : '#fff' });
            
            let btnBg = this.add.rectangle(cx + 90, y, 120, 40, 0x4caf50).setInteractive();
            
            let btnTextStr = `КУПИТЬ\n(${item.price()})`;
            if (item.max()) {
                btnBg.fillColor = 0x444444; 
                btnTextStr = item.isEquip ? (DataManager.data.skin === item.id ? "НАДЕТО" : "НАДЕТЬ") : "МАКС.";
            } else if (DataManager.data.coins < item.price()) {
                btnBg.fillColor = 0x552222;
            }

            let btnTxt = this.add.text(cx + 90, y, btnTextStr, { font: 'bold 14px Arial', color: '#fff', align: 'center' }).setOrigin(0.5);

            btnBg.on('pointerdown', () => {
                if (item.max() && item.isEquip) { DataManager.data.skin = item.id; sfx.jump(); DataManager.save(); this.renderList(); return; }
                if (!item.max() && DataManager.data.coins >= item.price()) {
                    DataManager.data.coins -= item.price();
                    item.buy(); sfx.purchase(); DataManager.save();
                    this.coinsText.setText(`💰 ${DataManager.data.coins}`);
                    this.renderList();
                }
            });

            this.listContainer.add([bg, name, btnBg, btnTxt]);
        });
    }
}

// ==========================================
// SCENE 5: ИГРОВОЙ ПРОЦЕСС
// ==========================================
class GameScene extends Phaser.Scene {
    constructor() { super('Game'); }

    create() {
        // Константы из оригинальной математики (умноженные на 60 для Arcade Physics)
        this.GRAVITY = 2880; 
        this.JUMP_VEL = -1020;
        this.SPRING_VEL = -1560;
        this.JETPACK_VEL = -1080;
        this.MOVE_SPEED = 480;

        this.isHard = (gameMode === 'campaign' && currentLevel % 5 === 0);
        this.highestY = this.scale.height - 50;
        this.maxReachedY = this.highestY;
        this.tier = 0;
        this.currentScore = 0;
        this.targetY = gameMode === 'campaign' ? -(1500 + (currentLevel * 500)) : -Infinity;
        this.finishSpawned = false;

        this.physics.world.gravity.y = this.GRAVITY;
        this.physics.world.setBounds(0, -Infinity, this.scale.width, Infinity);

        // Фоны
        this.bg = this.add.rectangle(0, 0, this.scale.width*2, this.scale.height*2, 0x0b0b1a).setScrollFactor(0);

        // Группы объектов
        this.platforms = this.physics.add.staticGroup();
        this.movingPlatforms = this.physics.add.group({ allowGravity: false, immovable: true });
        this.items = this.physics.add.group({ allowGravity: false });

        // Игрок
        this.player = this.physics.add.sprite(this.scale.width/2, this.scale.height - 100, 'white_box').setScale(30/16);
        this.player.setTint(parseInt(DataManager.data.skin.replace('#', '0x')));
        this.player.body.setSize(16, 16);
        this.player.body.checkCollision.up = false; 
        this.player.body.checkCollision.left = false; 
        this.player.body.checkCollision.right = false;
        this.player.jetpackTimer = 0;
        this.player.vx = 0;

        // Охотник
        this.hunter = this.add.rectangle(this.scale.width/2, this.scale.height + 300, 38, 38, 0xff0033);
        this.physics.add.existing(this.hunter);
        this.hunter.body.allowGravity = false;
        this.hunter.activeHunt = false;
        this.hunter.waitTimer = 120; // Кадры ожидания

        // Коллизии
        this.physics.add.collider(this.player, this.platforms, this.hitPlatform, null, this);
        this.physics.add.collider(this.player, this.movingPlatforms, this.hitPlatform, null, this);
        this.physics.add.overlap(this.player, this.items, this.collectItem, null, this);
        this.physics.add.overlap(this.player, this.hunter, () => this.handleDeath("ОХОТНИК ПОГЛОТИЛ ТЕБЯ"), null, this);

        // Управление
        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.addPointer();

        // Частицы
        this.particles = this.add.particles(0, 0, 'white_box', {
            lifespan: 500, speed: { min: 50, max: 200 }, scale: { start: 0.5, end: 0 },
            alpha: { start: 1, end: 0 }, blendMode: 'ADD', emitting: false
        });

        // Первая платформа
        let basePlat = this.platforms.create(this.scale.width/2, this.highestY, 'plat_normal').setScale(this.scale.width/100, 1).refreshBody();
        basePlat.type = 'normal';

        // HUD и Меню выносим в отдельную сцену поверх текущей
        this.scene.launch('UI', { gameScene: this });

        // Старт
        this.player.setVelocityY(this.JUMP_VEL);
        window.gamePaused = false;
    }

    generateChunk() {
        const camY = this.cameras.main.scrollY;
        while (this.highestY > camY - this.scale.height * 2) {
            if (gameMode === 'campaign' && this.highestY <= this.targetY) {
                if (!this.finishSpawned) {
                    let finish = this.platforms.create(this.scale.width/2, this.targetY - 100, 'plat_finish').setScale(this.scale.width/100, 1).refreshBody();
                    finish.type = 'finish';
                    this.finishSpawned = true;
                }
                break;
            }
            
            let gap = 90 + (this.tier * 10) + Math.random() * (this.isHard ? 60 : 40 + (this.tier * 5));
            this.highestY -= gap;
            
            let w = Math.max(40, 85 - (this.tier * 10)) + Math.random() * (this.isHard ? 50 : 80 - (this.tier * 5)); 
            let x = Math.random() * (this.scale.width - w) + w/2;
            
            let type = 'normal'; let r = Math.random();
            if (this.isHard) { if (r > 0.95) type = 'spring'; else if (r > 0.4) type = 'moving'; } 
            else { if (r > 0.85) type = 'spring'; else if (r > Math.max(0.2, 0.65 - (this.tier * 0.15))) type = 'moving'; }
            
            let plat;
            if (type === 'moving') {
                plat = this.movingPlatforms.create(x, this.highestY, 'plat_moving').setScale(w/100, 1);
                plat.body.setSize(w, 20);
                plat.setVelocityX((100 + this.tier*20 + Math.random()*50) * (Math.random()>0.5?1:-1));
                plat.body.collideWorldBounds = true;
                plat.body.bounce.set(1, 0);
            } else {
                plat = this.platforms.create(x, this.highestY, type === 'spring' ? 'plat_spring' : 'plat_normal').setScale(w/100, 1).refreshBody();
            }
            plat.type = type;

            let ri = Math.random();
            if (ri > 0.993 && !this.isHard) {
                let item = this.items.create(x, this.highestY - 40, 'jetpack'); item.itemType = 'jetpack'; item.baseY = item.y;
            } else if (ri > 0.6) {
                let item = this.items.create(x, this.highestY - 35, 'coin'); item.itemType = 'coin'; item.baseY = item.y;
            }
        }
    }

    hitPlatform(player, platform) {
        if (player.body.velocity.y > 0) {
            if (platform.type === 'finish') {
                this.handleWin();
                return;
            }
            
            sfx.jump();
            if (platform.type === 'spring') {
                player.setVelocityY(this.SPRING_VEL);
                this.particles.emitParticleAt(player.x, player.y + 15, 15, { tint: 0x00ff00 });
            } else {
                player.setVelocityY(this.JUMP_VEL);
                this.particles.emitParticleAt(player.x, player.y + 15, 10, { tint: 0xffffff });
                
                if (this.isHard) platform.destroy();
            }
        }
    }

    collectItem(player, item) {
        if (item.itemType === 'coin') {
            let reward = this.isHard ? 3 : 1;
            DataManager.data.coins += reward; sfx.coin(); DataManager.save();
            this.particles.emitParticleAt(item.x, item.y, 10, { tint: 0xFFD700 });
            this.scene.get('UI').updateHUD();
        } else if (item.itemType === 'jetpack') {
            player.jetpackTimer = 90 + (DataManager.data.jetpackLevel * 30);
            player.setVelocityY(this.JETPACK_VEL);
            sfx.powerup();
            this.particles.emitParticleAt(item.x, item.y, 25, { tint: 0xff0055 });
        }
        item.destroy();
    }

    handleDeath(reason) {
        if (window.gamePaused) return;
        window.gamePaused = true;
        this.physics.pause();
        sfx.death(); DataManager.save();
        
        if (DataManager.data.lives > 0) {
            this.scene.get('UI').showRevive(reason);
        } else {
            this.scene.get('UI').showEnd("ВЫ ПОГИБЛИ", reason, "#ff0055", "ПОВТОРИТЬ");
        }
    }

    useExtraLife() {
        DataManager.data.lives--; DataManager.save(); sfx.powerup();
        this.scene.get('UI').updateHUD();
        this.player.y -= 150;
        this.player.setVelocityY(this.SPRING_VEL);
        this.hunter.y = this.cameras.main.scrollY + this.scale.height + 400;
        this.hunter.activeHunt = false;
        this.hunter.waitTimer = 120;
        window.gamePaused = false;
        this.physics.resume();
    }

    handleWin() {
        if (window.gamePaused) return;
        window.gamePaused = true;
        this.physics.pause();
        sfx.coin();
        if (currentLevel === DataManager.data.maxLevel && DataManager.data.maxLevel < 100) DataManager.data.maxLevel++;
        DataManager.save();
        
        let desc = this.isHard ? "ХАРДКОР ЗАВЕРШЕН!" : "Отличная работа!";
        this.scene.get('UI').showEnd("УРОВЕНЬ ПРОЙДЕН", desc, "#00ff00", "СЛЕДУЮЩИЙ");
    }

    update(time, delta) {
        if (window.gamePaused) return;

        // Смена цвета фона (Atmosphere)
        if (this.isHard) { this.bg.fillColor = 0x32000a; } 
        else if (gameMode === 'endless' && this.tier > 0) {
            let color = Phaser.Display.Color.Interpolate.ColorWithColor(
                Phaser.Display.Color.ValueToColor(0x0b0b1a), Phaser.Display.Color.ValueToColor(0x3c000f),
                100, Math.min(100, this.tier * 15)
            );
            this.bg.fillColor = Phaser.Display.Color.GetColor(color.r, color.g, color.b);
        }

        // Обновление рекорда и генерация
        if (this.player.y < this.maxReachedY) this.maxReachedY = this.player.y;
        if (gameMode === 'endless') {
            this.currentScore = Math.floor(Math.max(0, ((this.scale.height - 50) - this.maxReachedY) / 10));
            this.tier = Math.floor(this.currentScore / 3000);
            this.scene.get('UI').setCenterText(`${this.currentScore} м`);
            if (this.currentScore > DataManager.data.highScore) DataManager.data.highScore = this.currentScore;
        }

        this.generateChunk();

        // Управление Игроком
        if (this.cursors.left.isDown || (this.input.activePointer.isDown && this.input.activePointer.x < this.scale.width/2)) {
            this.player.vx = -this.MOVE_SPEED;
        } else if (this.cursors.right.isDown || (this.input.activePointer.isDown && this.input.activePointer.x > this.scale.width/2)) {
            this.player.vx = this.MOVE_SPEED;
        } else {
            this.player.vx *= 0.8; 
        }
        this.player.setVelocityX(this.player.vx);
        
        // Вращение
        let dir = this.player.vx > 0 ? 1 : (this.player.vx < 0 ? -1 : 1);
        this.player.angle += (this.player.jetpackTimer > 0 ? 15 : 6) * dir;

        // Обертывание экрана
        this.physics.world.wrap(this.player, 15);

        // Джетпак
        if (this.player.jetpackTimer > 0) {
            this.player.setVelocityY(this.JETPACK_VEL);
            this.player.jetpackTimer--;
            sfx.thrust();
            if(Math.random()>0.5) this.particles.emitParticleAt(this.player.x, this.player.y + 15, 1, { tint: 0xff9900 });
            this.player.setTint(0xffffff);
        } else {
            this.player.setTint(parseInt(DataManager.data.skin.replace('#', '0x')));
        }

        // Анимация предметов (Floating) и Магнит
        let magCoinR = DataManager.data.magnetCoinLvl * 45;
        let magJpR = DataManager.data.magnetJpLvl * 45;
        this.items.getChildren().forEach(item => {
            item.y = item.baseY + Math.sin(time / 200) * 5;
            
            let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, item.x, item.y);
            let radius = item.itemType === 'coin' ? magCoinR : (item.itemType === 'jetpack' ? magJpR : 0);
            if (radius > 0 && dist < radius) {
                this.physics.moveToObject(item, this.player, 300);
            }
        });

        // Камера (Следование только вверх)
        let targetCamY = this.player.y - this.scale.height / 2;
        if (targetCamY < this.cameras.main.scrollY) {
            this.cameras.main.scrollY += (targetCamY - this.cameras.main.scrollY) * 0.15;
        }
        
        // Смерть от падения
        if (this.player.y > this.cameras.main.scrollY + this.scale.height + 100) {
            this.handleDeath("УПАЛ В БЕЗДНУ");
        }

        // Охотник
        if (!this.hunter.activeHunt) {
            if (this.hunter.waitTimer > 0) this.hunter.waitTimer--;
            else this.hunter.activeHunt = true;
        } else {
            let dist = Phaser.Math.Distance.Between(this.hunter.x, this.hunter.y, this.player.x, this.player.y);
            let baseSpeed = this.isHard ? 105 : 75;
            let speed = baseSpeed + (currentLevel * 4.8);
            if (dist > 300) speed += (dist - 300) * 0.18;
            let maxSpeed = this.isHard ? 510 : 390;
            if (speed > maxSpeed) speed = maxSpeed;

            if (dist > 0) this.physics.moveToObject(this.hunter, this.player, speed);
            
            let bottom = this.cameras.main.scrollY + this.scale.height - 48;
            if (this.hunter.y > bottom) this.hunter.y -= (this.hunter.y - bottom) * 0.08;
            
            if (Math.random() > 0.4) this.particles.emitParticleAt(this.hunter.x + (Math.random()-0.5)*38, this.hunter.y, 1, { tint: 0xff0033 });
        }
    }
}

// ==========================================
// SCENE 6: UI (Оверлеи поверх игры)
// ==========================================
class UIScene extends Phaser.Scene {
    constructor() { super('UI'); }

    create(data) {
        this.gameScene = data.gameScene;
        const cx = this.scale.width / 2;

        this.topText = this.add.text(cx, 20, gameMode === 'campaign' ? `УРОВЕНЬ ${currentLevel}` : '0 м', { font: 'bold 22px Arial', color: this.gameScene.isHard ? '#ff0055' : '#fff' }).setOrigin(0.5, 0);
        this.coinText = this.add.text(this.scale.width - 20, 20, `💰 ${DataManager.data.coins}`, { font: 'bold 22px Arial', color: '#FFD700' }).setOrigin(1, 0);
        this.livesText = this.add.text(20, 20, `❤️ ${DataManager.data.lives}`, { font: 'bold 22px Arial', color: '#ff0055' }).setOrigin(0, 0);

        let pauseBtn = this.add.text(this.scale.width - 20, 60, '⏸', { font: '30px Arial' }).setOrigin(1, 0).setInteractive();
        pauseBtn.on('pointerdown', () => this.togglePause());

        // Меню Паузы
        this.pauseMenu = this.createOverlay('ПАУЗА', '#fff',[
            { text: 'ПРОДОЛЖИТЬ', color: 0x3a7bd5, action: () => this.togglePause() },
            { text: 'В МЕНЮ', color: 0x555555, action: () => this.quitToMenu() }
        ]);

        // Меню Окончания
        this.endMenu = this.createOverlay('TITLE', '#fff',[
            { text: 'BTN1', color: 0x3a7bd5, action: () => {} },
            { text: 'В МЕНЮ', color: 0x555555, action: () => this.quitToMenu() }
        ]);
        this.endDesc = this.add.text(cx, this.scale.height/2 - 60, '', { font: '18px Arial', color: '#ccc' }).setOrigin(0.5);
        this.endMenu.add(this.endDesc);

        // Возрождение
        this.reviveMenu = this.createOverlay('КРИТИЧЕСКИЙ УРОН', '#ff0055',[
            { text: 'ДА (❤️-1)', color: 0xff0055, action: () => { this.reviveMenu.setVisible(false); this.gameScene.useExtraLife(); } },
            { text: 'СДАТЬСЯ', color: 0x555555, action: () => { this.reviveMenu.setVisible(false); this.gameScene.handleDeath(this.pendingDeathReason); } }
        ]);
    }

    createOverlay(titleText, titleColor, buttons) {
        const cx = this.scale.width / 2;
        const cy = this.scale.height / 2;
        let container = this.add.container(0, 0).setVisible(false);
        
        let bg = this.add.rectangle(cx, cy, this.scale.width, this.scale.height, 0x000000, 0.85);
        bg.setInteractive(); // Блокировка кликов
        let title = this.add.text(cx, cy - 120, titleText, { font: 'bold 36px Arial', color: titleColor }).setOrigin(0.5);
        
        container.add([bg, title]);
        
        buttons.forEach((btn, i) => {
            let b = createButton(this, cx, cy + i * 70, btn.text, btn.color, btn.action);
            container.add(b);
            if (i===0) container.btn1 = b; // Ссылка для замены текста
        });
        return container;
    }

    updateHUD() {
        this.coinText.setText(`💰 ${DataManager.data.coins}`);
        this.livesText.setText(DataManager.data.lives > 0 ? `❤️ ${DataManager.data.lives}` : '');
    }

    setCenterText(text) { this.topText.setText(text); }

    togglePause() {
        if (!window.gamePaused && !this.endMenu.visible && !this.reviveMenu.visible) {
            window.gamePaused = true; this.gameScene.physics.pause(); this.pauseMenu.setVisible(true);
        } else if (this.pauseMenu.visible) {
            window.gamePaused = false; this.gameScene.physics.resume(); this.pauseMenu.setVisible(false);
        }
    }

    showRevive(reason) {
        this.pendingDeathReason = reason;
        this.reviveMenu.setVisible(true);
    }

    showEnd(title, desc, color, btnText) {
        this.endMenu.list[1].setText(title);
        this.endMenu.list[1].setColor(color);
        this.endDesc.setText(desc);
        
        // Меняем текст и действие первой кнопки
        this.endMenu.btn1.list[1].setText(btnText);
        this.endMenu.btn1.list[0].removeAllListeners('pointerup');
        this.endMenu.btn1.list[0].on('pointerup', () => {
            this.endMenu.btn1.list[0].setScale(1);
            if(btnText === 'СЛЕДУЮЩИЙ') currentLevel++;
            this.scene.start('Game');
        });
        
        this.endMenu.setVisible(true);
    }

    quitToMenu() {
        DataManager.save();
        this.gameScene.scene.stop();
        this.scene.start('Menu');
    }
}

// ==========================================
// ИНИЦИАЛИЗАЦИЯ ИГРЫ

    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.RESIZE,
        parent: document.body,
        width: '100%',
        height: '100%'

    physics: {

        arcade: { debug: false }
    },
    scene: [BootScene, MenuScene, LevelSelectScene, ShopScene, GameScene, UIScene],

};

const game = new Phaser.Game(config);

document.body.addEventListener('pointerdown', () => sfx.init(), { once: true });
</script>
