<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tower: Telegram Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0b1a; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(11,11,26,0.85) 0%, rgba(0,0,0,0.98) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 20; color: white; transition: opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0; visibility: hidden;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; transform: scale(1); }
            50% { text-shadow: 0 0 20px #00d2ff, 0 0 40px #00d2ff; transform: scale(1.05); }
            100% { text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff; transform: scale(1); }
        }

        h1 { font-size: 42px; margin-bottom: 10px; text-align: center; color: #fff; animation: neonPulse 2s infinite; font-weight: 900; letter-spacing: 3px; margin-top:0;}
        h2 { color: #FFD700; text-shadow: 0 0 15px #FFD700; font-size: 30px; margin: 0 0 15px 0; text-align: center; letter-spacing: 2px; }

        .ui-btn {
            padding: 16px 40px; margin: 8px; border-radius: 40px; font-size: 16px; font-weight: bold;
            border: 2px solid rgba(255,255,255,0.1); color: white; cursor: pointer; text-transform: uppercase; width: 280px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
            transition: all 0.2s ease;
        }
        .btn-shop { background: linear-gradient(45deg, #f5af19, #f12711); box-shadow: 0 5px 20px rgba(241, 39, 17, 0.3); }
        .btn-upgrades { background: linear-gradient(45deg, #00b09b, #96c93d); box-shadow: 0 5px 20px rgba(150, 201, 61, 0.3); }
        .btn-endless { background: linear-gradient(45deg, #8A2387, #E94057, #F27121); box-shadow: 0 5px 20px rgba(233, 64, 87, 0.3); }
        .btn-tg-pay { background: linear-gradient(45deg, #1c92d2, #f2fcfe); color: #000; border-color: #1c92d2; width: 90%; max-width: 300px; padding: 10px; font-size: 14px;}
        .btn-back { background: transparent; border: 2px solid #555; box-shadow: none; margin-top: 15px; }
        .btn-reset { border-color: #ff0055; color: #ff0055; margin-top: 30px; }
        
        .ui-btn:active { transform: scale(0.95); }
        .ui-btn:disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }

        .currencies { display: flex; gap: 20px; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .coin-hud { color: #FFD700; text-shadow: 0 0 10px #FFD700; }
        .crystal-hud { color: #e024ff; text-shadow: 0 0 15px #e024ff; }

        #levelGrid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            width: 90%; max-width: 380px; max-height: 50vh; overflow-y: auto;
            padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lvl-btn {
            aspect-ratio: 1; border-radius: 10px; border: none; font-size: 16px; font-weight: bold;
            color: white; background: #222; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .lvl-btn.completed { background: #111; color: #4caf50; border: 1px solid #4caf50; cursor: not-allowed; }
        .lvl-btn.current { background: linear-gradient(45deg, #00d2ff, #3a7bd5); box-shadow: 0 0 10px #00d2ff; animation: neonPulse 1.5s infinite; }
        .lvl-btn.hard { background: linear-gradient(45deg, #f12711, #f5af19); box-shadow: 0 0 15px #f12711; animation: neonPulse 1s infinite;}
        .lvl-btn.locked { background: #1a1a2e; color: #555; cursor: not-allowed; }
        .lvl-btn:active:not(:disabled) { transform: scale(0.9); }

        .item-list { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 12px; width: 95%; max-width: 500px; max-height: 55vh; overflow-y: auto; padding: 5px; 
        }
        .shop-card {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center; position: relative;
        }
        .shop-card h3 { margin: 10px 0 5px 0; font-size: 16px; }
        .shop-card p { font-size: 12px; color: #aaa; margin: 0 0 10px 0; line-height: 1.2; flex-grow: 1; }
        .shop-btn { padding: 8px; width: 100%; border-radius: 8px; font-size: 13px; border: none; cursor: pointer; font-weight: bold; color: white; background: #4caf50; transition: 0.2s; }
        .shop-btn:disabled { background: #444; color: #777; }
        .shop-btn.equip { background: #00d2ff; }
        .shop-btn.crystal-btn { background: #e024ff; }
        .lvl-badge { position: absolute; top: -5px; right: -5px; background: #ff0055; color: white; font-size: 10px; padding: 4px 6px; border-radius: 8px; font-weight: bold; border: 1px solid #fff;}

        .top-hud { position: fixed; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .hud-text { font-size: 22px; font-weight: bold; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .lives-hud { color: #ff0055; text-shadow: 0 0 10px #ff0055; margin-top: 5px; font-size: 18px;}
        
        .pause-btn {
            background: rgba(0, 0, 0, 0.6); border: 2px solid rgba(255,255,255,0.2);
            color: white; font-size: 20px; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; display: flex;
            justify-content: center; align-items: center; transition: 0.2s;
            pointer-events: auto; backdrop-filter: blur(5px);
        }
        .pause-btn:active { transform: scale(0.85); }
    </style>
</head>
<body onclick="sfx.init()">

    <canvas id="gameCanvas"></canvas>

    <div class="top-hud" id="gameHud" style="display:none;">
        <div>
            <div class="hud-text" id="hudLeft">УРОВЕНЬ 1</div>
            <div class="lives-hud" id="hudLives"></div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="hud-text crystal-hud" id="hudCrystals">💎 0</div>
                <div class="hud-text coin-hud" id="hudCoins">💰 0</div>
                <button class="pause-btn" onclick="togglePause()">⏸</button>
            </div>
        </div>
    </div>

    <div id="pauseMenu" class="overlay" style="z-index: 25;">
        <h2 style="color: white; text-shadow: 0 0 15px #fff;">ПАУЗА</h2>
        <button class="ui-btn" onclick="togglePause()">ПРОДОЛЖИТЬ</button>
        <button class="ui-btn btn-back" onclick="quitGame()">В МЕНЮ</button>
    </div>

    <div id="reviveMenu" class="overlay" style="z-index: 30;">
        <h2 style="color: #ff0055; text-shadow: 0 0 15px #ff0055;">КРИТИЧЕСКИЙ УРОН</h2>
        <p style="font-size: 18px; color: #ccc; margin-bottom: 25px;">Использовать сердце? У вас: <span id="reviveLivesCount" style="color: #ff0055; font-weight: bold;">0</span> ❤️</p>
        <button class="ui-btn" style="background: linear-gradient(45deg, #ff0055, #ff5e62);" onclick="confirmRevive()">ДА (❤️-1)</button>
        <button class="ui-btn btn-back" onclick="declineRevive()">СДАТЬСЯ</button>
    </div>

    <div id="mainMenu" class="overlay active">
        <h1>NEON RUN</h1>
        <div class="currencies">
            <span class="coin-hud" id="menuCoins">💰 0</span>
            <span class="crystal-hud" id="menuCrystals">💎 0</span>
        </div>
        <button class="ui-btn" onclick="showState('LEVELS')">КАМПАНИЯ</button>
        <button class="ui-btn btn-endless" onclick="startGame('endless')">БЕСКОНЕЧНЫЙ</button>
        <button class="ui-btn btn-upgrades" onclick="showState('UPGRADES')">УЛУЧШЕНИЯ</button>
        <button class="ui-btn btn-shop" onclick="showState('SHOP')">МАГАЗИН</button>
        <p class="hud-text" style="font-size: 14px; color: #888; margin-top: 15px;" id="menuScore">Рекорд: 0 м</p>
        <button class="ui-btn btn-back btn-reset" onclick="resetProgress()">СБРОСИТЬ ПРОГРЕСС</button>
    </div>

    <div id="levelMenu" class="overlay">
        <h2>КАМПАНИЯ</h2>
        <div id="levelGrid"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="shopMenu" class="overlay">
        <h2 style="margin-bottom: 5px;">МАГАЗИН</h2>
        <div class="currencies">
            <span class="coin-hud" id="shopCoins">💰 0</span>
            <span class="crystal-hud" id="shopCrystals">💎 0</span>
        </div>
        <button class="ui-btn btn-tg-pay" onclick="simulateTGPurchase()">💎 КУПИТЬ КРИСТАЛЛЫ (Telegram)</button>
        <div id="shopList" class="item-list"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="upgradesMenu" class="overlay">
        <h2 style="margin-bottom: 5px; color: #00b09b; text-shadow: 0 0 15px #00b09b;">ЛАБОРАТОРИЯ</h2>
        <div class="currencies">
            <span class="coin-hud" id="upgCoins">💰 0</span>
        </div>
        <div id="upgradesList" class="item-list"></div>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">НАЗАД</button>
    </div>

    <div id="endMenu" class="overlay">
        <h2 id="endTitle">УРОВЕНЬ ПРОЙДЕН</h2>
        <p id="endDesc" style="color: #ccc; font-size: 18px; margin-bottom: 30px;">Молодец!</p>
        <button class="ui-btn" id="endBtn1" onclick="nextAction()">ДАЛЕЕ</button>
        <button class="ui-btn btn-back" onclick="showState('MAIN')">В МЕНЮ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth || document.documentElement.clientWidth || 400;
            canvas.height = window.innerHeight || document.documentElement.clientHeight || 800;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function resetProgress() {
            if (confirm("Вы уверены, что хотите сбросить ВЕСЬ прогресс?")) {
                localStorage.clear();
                location.reload();
            }
        }

        const SAVE = {
            coins: parseInt(localStorage.getItem('neonCoins')) || 0,
            crystals: parseInt(localStorage.getItem('neonCrystals')) || 0,
            maxLevel: parseInt(localStorage.getItem('neonMaxLevel')) || 1,
            highScore: parseInt(localStorage.getItem('neonScore')) || 0,
            jetpackLevel: parseInt(localStorage.getItem('neonJetpackLvl')) || 1,
            magnetCoinLvl: parseInt(localStorage.getItem('neonMagCoin')) || 0,
            magnetJpLvl: parseInt(localStorage.getItem('neonMagJp')) || 0,
            jumpLvl: parseInt(localStorage.getItem('neonJumpLvl')) || 0,
            lives: parseInt(localStorage.getItem('neonLives')) || 0,
            skin: localStorage.getItem('neonSkin') || '#00d2ff',
            ownedSkins: JSON.parse(localStorage.getItem('neonSkins')) || ['#00d2ff'],
            trail: localStorage.getItem('neonTrail') || 'none',
            ownedTrails: JSON.parse(localStorage.getItem('neonTrails')) || ['none']
        };

        function saveGame() {
            localStorage.setItem('neonCoins', SAVE.coins);
            localStorage.setItem('neonCrystals', SAVE.crystals);
            localStorage.setItem('neonMaxLevel', SAVE.maxLevel);
            localStorage.setItem('neonScore', SAVE.highScore);
            localStorage.setItem('neonJetpackLvl', SAVE.jetpackLevel);
            localStorage.setItem('neonMagCoin', SAVE.magnetCoinLvl);
            localStorage.setItem('neonMagJp', SAVE.magnetJpLvl);
            localStorage.setItem('neonJumpLvl', SAVE.jumpLvl);
            localStorage.setItem('neonLives', SAVE.lives);
            localStorage.setItem('neonSkin', SAVE.skin);
            localStorage.setItem('neonSkins', JSON.stringify(SAVE.ownedSkins));
            localStorage.setItem('neonTrail', SAVE.trail);
            localStorage.setItem('neonTrails', JSON.stringify(SAVE.ownedTrails));
            updateUI();
        }

        const overlays = { 
            MAIN: document.getElementById('mainMenu'), 
            LEVELS: document.getElementById('levelMenu'), 
            SHOP: document.getElementById('shopMenu'), 
            UPGRADES: document.getElementById('upgradesMenu'),
            END: document.getElementById('endMenu'), 
            PAUSE: document.getElementById('pauseMenu'), 
            REVIVE: document.getElementById('reviveMenu') 
        };
        const gameHud = document.getElementById('gameHud');
        let gameState = 'START'; 
        let pendingDeathReason = "";

        function simulateTGPurchase() {
            SAVE.crystals += 50; saveGame(); sfx.purchase(); alert("Тест TWA: Успешная оплата! Получено 50 💎");
        }

        function showState(state) {
            sfx.init();
            Object.values(overlays).forEach(el => el.classList.remove('active'));
            gameHud.style.display = 'none';
            if(overlays[state]) overlays[state].classList.add('active');
            updateUI();
        }

        function togglePause() {
            if (gameState === 'PLAYING') {
                gameState = 'PAUSED'; document.getElementById('pauseMenu').classList.add('active');
                if (sfx.ctx && sfx.ctx.state === 'running') sfx.ctx.suspend(); 
            } else if (gameState === 'PAUSED') {
                gameState = 'PLAYING'; document.getElementById('pauseMenu').classList.remove('active');
                if (sfx.ctx && sfx.ctx.state === 'suspended') sfx.ctx.resume(); 
            }
        }

        function quitGame() {
            gameState = 'END'; document.getElementById('pauseMenu').classList.remove('active');
            if (sfx.ctx && sfx.ctx.state === 'suspended') sfx.ctx.resume(); 
            sfx.stopBGM(); saveGame(); showState('MAIN');
        }

        function confirmRevive() { document.getElementById('reviveMenu').classList.remove('active'); gameState = 'PLAYING'; game.useExtraLife(); }
        function declineRevive() { document.getElementById('reviveMenu').classList.remove('active'); triggerGameOver(pendingDeathReason); }

        function updateUI() {
            document.getElementById('menuCoins').innerText = `💰 ${SAVE.coins}`; document.getElementById('menuCrystals').innerText = `💎 ${SAVE.crystals}`;
            document.getElementById('shopCoins').innerText = `💰 ${SAVE.coins}`; document.getElementById('shopCrystals').innerText = `💎 ${SAVE.crystals}`;
            document.getElementById('upgCoins').innerText = `💰 ${SAVE.coins}`; document.getElementById('menuScore').innerText = `Рекорд: ${SAVE.highScore} м`;
            document.getElementById('hudCoins').innerText = `💰 ${SAVE.coins}`; document.getElementById('hudCrystals').innerText = `💎 ${SAVE.crystals}`;
            document.getElementById('hudLives').innerText = SAVE.lives > 0 ? `❤️ ${SAVE.lives}` : '';
            renderShop(); renderUpgrades(); renderLevels();
        }

        function renderLevels() {
            const grid = document.getElementById('levelGrid'); grid.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                let btn = document.createElement('button'); btn.className = 'lvl-btn'; 
                if (i < SAVE.maxLevel) { btn.classList.add('completed'); btn.innerText = '✔️'; btn.disabled = true; } 
                else if (i === SAVE.maxLevel) { btn.innerText = i; if (i % 5 === 0) btn.classList.add('hard'); else btn.classList.add('current'); btn.onclick = () => startGame('campaign', i); } 
                else { btn.classList.add('locked'); btn.innerText = '🔒'; btn.disabled = true; }
                grid.appendChild(btn);
            }
        }

        function renderUpgrades() {
            const list = document.getElementById('upgradesList'); list.innerHTML = '';
            const items = [
                { id: 'upg_jump', name: 'МОЩЬ ПРЫЖКА 🦘', desc: '+Высота', price: 1, type: 'upg_jump', lvl: SAVE.jumpLvl, maxed: SAVE.jumpLvl >= 10 },
                { id: 'upg_jp', name: 'РАКЕТА 🚀', desc: '+Время полета', price: 1, type: 'upg_jp', lvl: SAVE.jetpackLevel, maxed: SAVE.jetpackLevel >= 10 },
                { id: 'mag_coin', name: 'МАГНИТ ЗОЛОТА 🧲', desc: '+Радиус', price: 1, type: 'mag_coin', lvl: SAVE.magnetCoinLvl, maxed: SAVE.magnetCoinLvl >= 10 },
                { id: 'mag_jp', name: 'МАГНИТ РАКЕТ 🧲', desc: '+Радиус', price: 1, type: 'mag_jp', lvl: SAVE.magnetJpLvl, maxed: SAVE.magnetJpLvl >= 10 }
            ];
            items.forEach(item => {
                let actionText = `ПРОКАЧАТЬ (💰 1)`; let btnClass = 'shop-btn'; let disabled = SAVE.coins < item.price;
                if (item.maxed) { actionText = 'МАКСИМУМ'; disabled = true; }
                list.innerHTML += `<div class="shop-card"><div class="lvl-badge">LVL ${item.lvl}</div><h3 style="color:#00d2ff">${item.name}</h3><p>${item.desc}</p><button class="${btnClass}" ${disabled ? 'disabled' : ''} onclick="handleBuy('${item.id}', '${item.type}', ${item.price}, 'coins')">${actionText}</button></div>`;
            });
        }

        function renderShop() {
            const list = document.getElementById('shopList'); list.innerHTML = '';
            const items = [
                { id: 'life', name: 'СЕРДЦЕ ❤️', desc: 'Возрождение', price: 1, currency: 'coins', type: 'consumable', lvl: SAVE.lives },
                { id: 'ghost', name: 'ПРИЗРАК 👻', desc: 'Спектральный', price: 1, currency: 'coins', type: 'skin' },
                { id: 'demon', name: 'ДЕМОН 👹', desc: 'Рогатый', price: 1, currency: 'coins', type: 'skin' },
                { id: 'cat', name: 'НЕОН КИЦЯ 🐱', desc: 'Ультра скин', price: 10, currency: 'crystals', type: 'skin' },
                { id: 'robot', name: 'КИБЕР-БОТ 🤖', desc: 'Ультра скин', price: 20, currency: 'crystals', type: 'skin' },
                { id: 'none', name: 'БЕЗ ШЛЕЙФА ❌', desc: 'Стандарт', price: 0, currency: 'coins', type: 'trail' },
                { id: 'fire', name: 'ИНФЕРНО 🔥', desc: 'Огонь', price: 1, currency: 'coins', type: 'trail' },
                { id: 'electro', name: 'ПЛАЗМА ⚡', desc: 'Молнии', price: 1, currency: 'coins', type: 'trail' }
            ];
            items.forEach(item => {
                let currencySymbol = item.currency === 'crystals' ? '💎' : '💰'; let actionText = `КУПИТЬ (${currencySymbol} ${item.price})`;
                let btnClass = 'shop-btn'; if (item.currency === 'crystals') btnClass += ' crystal-btn';
                let disabled = item.currency === 'crystals' ? SAVE.crystals < item.price : SAVE.coins < item.price;
                let badge = ''; if (item.type === 'consumable') badge = `<div class="lvl-badge">У ВАС: ${item.lvl}</div>`;
                if (item.type === 'skin' && SAVE.ownedSkins.includes(item.id)) { disabled = false; if (SAVE.skin === item.id) { actionText = 'НАДЕТО'; disabled = true; btnClass = 'shop-btn equip'; } else { actionText = 'НАДЕТЬ'; btnClass = 'shop-btn equip'; } }
                if (item.type === 'trail' && SAVE.ownedTrails.includes(item.id)) { disabled = false; if (SAVE.trail === item.id) { actionText = 'НАДЕТО'; disabled = true; btnClass = 'shop-btn equip'; } else { actionText = 'НАДЕТЬ'; btnClass = 'shop-btn equip'; } }
                let titleColor = item.currency === 'crystals' ? '#e024ff' : (item.type === 'skin' && item.id.startsWith('#') ? item.id : '#fff');
                list.innerHTML += `<div class="shop-card">${badge}<h3 style="color:${titleColor}">${item.name}</h3><p>${item.desc}</p><button class="${btnClass}" ${disabled ? 'disabled' : ''} onclick="handleBuy('${item.id}', '${item.type}', ${item.price}, '${item.currency}')">${actionText}</button></div>`;
            });
        }

        function handleBuy(id, type, price, currency) {
            if (type === 'skin' && SAVE.ownedSkins.includes(id)) { SAVE.skin = id; sfx.jump(); saveGame(); return; }
            if (type === 'trail' && SAVE.ownedTrails.includes(id)) { SAVE.trail = id; sfx.jump(); saveGame(); return; }
            let canBuy = (currency === 'crystals' && SAVE.crystals >= price) || (currency === 'coins' && SAVE.coins >= price);
            if (canBuy) {
                if (currency === 'crystals') SAVE.crystals -= price; else SAVE.coins -= price;
                if (type === 'upg_jump') SAVE.jumpLvl++; if (type === 'upg_jp') SAVE.jetpackLevel++;
                if (type === 'mag_coin') SAVE.magnetCoinLvl++; if (type === 'mag_jp') SAVE.magnetJpLvl++;
                if (type === 'consumable') SAVE.lives++; if (type === 'skin') { SAVE.ownedSkins.push(id); SAVE.skin = id; }
                if (type === 'trail') { SAVE.ownedTrails.push(id); SAVE.trail = id; }
                sfx.purchase(); saveGame();
            }
        }

        class SoundEngine {
            constructor() { this.ctx = null; this.bgmStarted = false; this.bgmInterval = null; }
            init() {
                if (!this.ctx) { try { const AudioCtx = window.AudioContext || window.webkitAudioContext; if (AudioCtx) this.ctx = new AudioCtx(); } catch(e) {} }
                if (this.ctx && this.ctx.state === 'suspended' && gameState !== 'PAUSED') this.ctx.resume(); if (!this.bgmStarted) this.startBGM();
            }
            jump() {
                if(!this.ctx || this.ctx.state !== 'running') return; 
                try {
                    const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(250, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.15); 
                    gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.15);
                } catch(e) {}
            }
            coin() {
                if(!this.ctx || this.ctx.state !== 'running') return; 
                try {
                    const now = this.ctx.currentTime; const osc1 = this.ctx.createOscillator(); const gain1 = this.ctx.createGain();
                    osc1.type = 'sine'; osc1.frequency.setValueAtTime(2000, now); gain1.gain.setValueAtTime(0.15, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc1.connect(gain1); gain1.connect(this.ctx.destination); osc1.start(now); osc1.stop(now + 0.5);
                } catch(e) {}
            }
            purchase() {
                if(!this.ctx) return; 
                try {
                    const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'square'; osc.frequency.setValueAtTime(1000, now); osc.frequency.setValueAtTime(1500, now + 0.1); 
                    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.3);
                } catch(e) {}
            }
            powerup() {
                if(!this.ctx || this.ctx.state !== 'running') return; 
                try {
                    const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(800, now + 0.4);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now + 0.4);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 0.4);
                } catch(e) {}
            }
            thrust() {
                if(!this.ctx || this.ctx.state !== 'running') return;
                try {
                    if(Math.random() > 0.7) {
                        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50 + Math.random()*50, this.ctx.currentTime);
                        gain.gain.setValueAtTime(0.05, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                        osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.1);
                    }
                } catch(e) {}
            }
            death() {
                if(!this.ctx) return; 
                try {
                    const now = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 1.0);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 1.0);
                    osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now); osc.stop(now + 1.0);
                } catch(e) {}
            }
            startBGM() {
                if (!this.ctx || this.bgmStarted) return;
                this.bgmStarted = true;
                const playNote = (time, freq, vol, type, duration) => {
                    try {
                        const osc = this.ctx.createOscillator(); const g = this.ctx.createGain();
                        osc.type = type; osc.frequency.value = freq; g.gain.setValueAtTime(vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + duration);
                        osc.connect(g); g.connect(this.ctx.destination); osc.start(time); osc.stop(time + duration);
                    } catch(e) {}
                };
                let step = 0;
                this.bgmInterval = setInterval(() => {
                    if(this.ctx.state !== 'running' || gameState === 'PAUSED' || gameState === 'REVIVE_PROMPT') return; 
                    const now = this.ctx.currentTime;
                    const bassNotes = [130, 0, 130, 0, 196, 0, 146, 0, 130, 0, 130, 0, 196, 146, 0, 0];
                    if (bassNotes[step]) playNote(now, bassNotes[step], 0.05, 'square', 0.15);
                    const leadNotes = [523, 0, 659, 0, 783, 0, 659, 0, 1046, 0, 783, 0, 659, 0, 523, 0];
                    if (leadNotes[step]) playNote(now, leadNotes[step], 0.03, 'sine', 0.2);
                    step = (step + 1) % 16;
                }, 180); 
            }
            stopBGM() { clearInterval(this.bgmInterval); this.bgmStarted = false; }
        }
        const sfx = new SoundEngine();

        class InputHandler {
            constructor() {
                this.keys = [];
                window.addEventListener('keydown', e => { if (!this.keys.includes(e.key)) this.keys.push(e.key); });
                window.addEventListener('keyup', e => { this.keys = this.keys.filter(k => k !== e.key); });
                const handleTouch = (e) => {
                    if (gameState !== 'PLAYING') return; e.preventDefault(); this.keys = []; 
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].clientX < canvas.width / 2) this.keys.push('ArrowLeft'); else this.keys.push('ArrowRight');
                    }
                };
                const handleTouchEnd = (e) => { if (e.touches.length === 0) this.keys = []; else handleTouch(e); };
                canvas.addEventListener('touchstart', handleTouch, {passive: false});
                canvas.addEventListener('touchmove', handleTouch, {passive: false});
                canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
            }
        }

        class Particle {
            constructor(x, y, color, isFire = false, speedMult = 1, text = null) {
                this.x = x; this.y = y; this.color = color; this.text = text;
                this.size = Math.random() * (isFire ? 12 : 6) + 2;
                this.vx = (Math.random() - 0.5) * (isFire ? 8 : 12) * speedMult;
                this.vy = isFire ? (Math.random() * 8 + 2) : (Math.random() - 0.8) * 12 * speedMult;
                this.life = 1.0; this.decay = isFire ? 0.04 : 0.03;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
            draw(ctx) { 
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color; 
                if (this.text) { ctx.font = 'bold 20px monospace'; ctx.fillText(this.text, this.x, this.y); } 
                else { ctx.fillRect(this.x, this.y, this.size, this.size); }
                ctx.shadowBlur = 0; ctx.globalAlpha = 1.0; 
            }
        }

        class FloatingText {
            constructor(x, y, text) { this.x = x; this.y = y; this.text = text; this.life = 1.0; this.vy = -1.5; }
            update() { this.y += this.vy; this.life -= 0.02; }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = '#ff0055'; ctx.font = 'bold 24px Arial';
                ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.fillText(this.text, this.x - 30, this.y);
                ctx.shadowBlur = 0; ctx.globalAlpha = 1.0;
            }
        }

        class Platform {
            constructor(x, y, width, type = 'normal', tier = 0) {
                this.id = Math.random();
                this.x = x; this.y = y; this.width = width; this.height = 20; this.type = type; 
                this.moveSpeed = (0.8 + tier * 0.4) + Math.random() * 1.2; 
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.flashTimer = 0; this.broken = false;
            }
            update() {
                if (this.flashTimer > 0) this.flashTimer--;
                if (this.type === 'moving') {
                    this.x += this.moveSpeed * this.direction;
                    if (this.x <= 0 || this.x + this.width >= canvas.width) this.direction *= -1;
                }
            }
            draw(ctx) {
                if(this.broken) return;
                if (this.type === 'finish') { ctx.fillStyle = '#FFD700'; ctx.shadowBlur = 20; ctx.shadowColor = '#FFD700'; }
                else if (this.flashTimer > 0) { ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 15; ctx.shadowColor = '#fff'; } 
                else if (this.type === 'moving') { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#ff00ff'; }
                else if (this.type === 'spring') { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#00ff00'; }
                else { ctx.fillStyle = '#222'; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.fillStyle = '#00d2ff'; }
                
                if(this.type !== 'finish' && this.flashTimer === 0) ctx.fillRect(this.x, this.y, this.width, 4); 
                else ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        class Item {
            constructor(x, y, type) { this.x = x; this.y = y; this.type = type; this.width = 24; this.height = 24; this.baseY = y; this.angle = Math.random() * Math.PI * 2; this.markedForDeletion = false; }
            update() { this.angle += 0.05; this.y = this.baseY + Math.sin(this.angle) * 5; }
            draw(ctx) {
                if(this.markedForDeletion) return;
                ctx.beginPath();
                if (this.type === 'coin') { ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 20; ctx.arc(this.x + 12, this.y + 12, 10, 0, Math.PI * 2); }
                else if (this.type === 'jetpack') { ctx.fillStyle = '#ff0055'; ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 25; ctx.moveTo(this.x+12, this.y-4); ctx.lineTo(this.x+26, this.y+24); ctx.lineTo(this.x-2, this.y+24); }
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        // --- ОБНОВЛЕННАЯ ФИЗИКА ОХОТНИКА ---
        class Hunter {
            constructor(game) { this.game = game; this.width = 38; this.height = 38; this.color = '#ff0033'; this.reset(); }
            reset() { 
                this.x = canvas.width/2 - 19; 
                this.y = canvas.height + 200; 
                this.active = false; 
                this.waitTimer = 120; 
                this.baseOffsetY = canvas.height - 40; // Базовая позиция (низ экрана)
            }
            startTimer() { this.waitTimer = 120; } 
            update() {
                if (gameState !== 'PLAYING') return;
                if (!this.active) { 
                    if (this.waitTimer > 0) this.waitTimer--;
                    else { this.active = true; this.y = this.game.cameraY + canvas.height; }
                    return; 
                }
                
                let dx = (this.game.player.x + 15) - (this.x + 19);
                
                // Плавный возврат к базовой позиции внизу экрана
                let normalOffsetY = canvas.height - 40;
                this.baseOffsetY += (normalOffsetY - this.baseOffsetY) * 0.01;

                let targetY = this.game.cameraY + this.baseOffsetY;
                
                // Упругое движение по Y (догоняет камеру/свою цель)
                if (this.y < targetY) this.y += (targetY - this.y) * 0.08;
                else if (this.y > targetY) this.y -= (this.y - targetY) * 0.15; // Возвращается вниз быстрее
                
                // Движение по X к игроку
                this.x += dx * 0.05; 
                
                // Эффекты если злой (разогнался)
                if (this.baseOffsetY < normalOffsetY - 20 && Math.random() > 0.5) {
                    this.game.particles.push(new Particle(this.x + Math.random()*38, this.y + 19, this.color));
                }
            }
            draw(ctx) {
                ctx.fillStyle = this.color; ctx.shadowBlur = 25; ctx.shadowColor = this.color; ctx.fillRect(this.x, this.y, 38, 38);
                let lx = (this.game.player.x - this.x) > 0 ? 3 : -3; let ly = (this.game.player.y - this.y) > 0 ? 3 : -3;
                
                let normalOffsetY = canvas.height - 40;
                if (this.baseOffsetY < normalOffsetY - 50) {
                    // Злой взгляд
                    ctx.fillStyle = '#fff'; ctx.fillRect(this.x+6+lx, this.y+10+ly, 8, 8); ctx.fillRect(this.x+24+lx, this.y+10+ly, 8, 8);
                    ctx.fillStyle = '#ffeb3b'; ctx.shadowBlur = 10; ctx.fillRect(this.x+8+lx, this.y+12+ly, 4, 4); ctx.fillRect(this.x+26+lx, this.y+12+ly, 4, 4);
                } else {
                    // Обычный взгляд
                    ctx.fillStyle = '#550000'; ctx.fillRect(this.x+6+lx, this.y+10+ly, 8, 8); ctx.fillRect(this.x+24+lx, this.y+10+ly, 8, 8);
                }
                ctx.shadowBlur = 0;
            }
        }

        class Player {
            constructor(game) { this.game = game; this.width = 30; this.height = 30; this.color = SAVE.skin; this.reset(); }
            reset() { 
                this.x = canvas.width/2 - 15; this.y = canvas.height-80; this.vx = 0; this.vy = 0; 
                this.jetpackTimer = 0; this.angle = 0; this.frameCount = 0;
                this.lastPlatformId = null; this.samePlatformJumps = 0; this.comboCount = 0;
                this.color = SAVE.skin;
                if (this.color === '#39ff14' || this.color === '#FFD700') this.color = '#00d2ff'; 
            }
            
            update(input) {
                if (gameState !== 'PLAYING') return;
                this.frameCount++;

                let maxSpeed = 8;
                if (input.keys.includes('ArrowRight')) this.vx = maxSpeed; 
                else if (input.keys.includes('ArrowLeft')) this.vx = -maxSpeed; 
                else this.vx *= 0.8;
                
                let dir = this.vx > 0 ? 1 : (this.vx < 0 ? -1 : 1);
                this.angle += (this.jetpackTimer > 0 ? 0.3 : 0.12) * dir;

                if (SAVE.trail !== 'none') {
                    if (SAVE.trail === 'fire') {
                        for(let i=0; i<2; i++) { this.game.particles.push(new Particle(this.x + 5 + Math.random()*20, this.y + 15 + Math.random()*15, Math.random() > 0.5 ? '#ff3300' : '#ffaa00', true, 0.6)); }
                    } else if (SAVE.trail === 'electro' && this.frameCount % 2 === 0) {
                        this.game.particles.push(new Particle(this.x - 10 + Math.random()*50, this.y + 10 + Math.random()*20, '#00ffff', false, 0.1, '⚡'));
                        this.game.particles.push(new Particle(this.x + Math.random()*30, this.y + 20, '#0055ff', true, 0.3));
                    }
                }

                if (this.jetpackTimer > 0) { 
                    this.vy = -18; this.jetpackTimer--; sfx.thrust(); 
                    this.game.particles.push(new Particle(this.x+15, this.y+30, '#ff9900', true)); 
                    this.game.particles.push(new Particle(this.x+15, this.y+30, '#ff0055', true)); 
                } else { this.vy += 0.8; }
                
                this.y += this.vy;
                if (this.vy > 0) {
                    this.game.platforms.forEach(p => {
                        if (p.type === 'finish' || p.broken) return;
                        if (this.x < p.x + p.width && this.x + 30 > p.x && this.y < p.y + 20 && this.y + 30 > p.y) {
                            if (this.y + 30 - this.vy <= p.y + 15) { 
                                this.y = p.y - 30; p.flashTimer = 5; sfx.jump(); 
                                
                                // --- ЛОГИКА РЕАКЦИИ ОХОТНИКА НА ПРЫЖКИ ---
                                if (this.lastPlatformId === p.id) {
                                    this.samePlatformJumps++;
                                    this.comboCount = 0; // Сброс комбо
                                    if (this.samePlatformJumps >= 2 && this.game.hunter.active) {
                                        // Охотник разгоняется (целится выше)
                                        this.game.hunter.baseOffsetY -= 100; 
                                        if (this.game.hunter.baseOffsetY < 150) this.game.hunter.baseOffsetY = 150; // Ограничение
                                    }
                                } else {
                                    this.lastPlatformId = p.id;
                                    this.samePlatformJumps = 1;
                                    this.comboCount++;
                                    
                                    if (this.comboCount >= 3 && this.game.hunter.active) {
                                        // Охотник отстает (проваливается вниз)
                                        this.game.hunter.baseOffsetY += 80;
                                        if (this.game.hunter.baseOffsetY > canvas.height + 300) this.game.hunter.baseOffsetY = canvas.height + 300; // Ограничение
                                    }
                                }

                                let jumpBoost = SAVE.jumpLvl * 1.5;
                                if (p.type === 'spring') { this.vy = -(28 + jumpBoost * 1.5); this.createJumpDust('#00ff00', 1.5); } 
                                else { this.vy = -(19 + jumpBoost); this.createJumpDust('#ffffff', 1); } 
                                
                                if (this.game.isHard && p.type !== 'finish') {
                                    p.broken = true;
                                    for(let i=0; i<15; i++) this.game.particles.push(new Particle(p.x + Math.random()*p.width, p.y + 10, '#555'));
                                }
                            }
                        }
                    });
                }
                this.x += this.vx; if (this.x > canvas.width) this.x = -30; if (this.x < -30) this.x = canvas.width;
            }
            createJumpDust(color, speedMult) { for(let i=0; i<12; i++) this.game.particles.push(new Particle(this.x+15, this.y+30, color, false, speedMult)); }
            
            draw(ctx) { 
                ctx.save();
                ctx.translate(this.x + 15, this.y + 15);
                ctx.rotate(this.angle);

                let isSuperSkin = (this.color === 'cat' || this.color === 'robot' || this.color === 'demon' || this.color === 'ghost');
                
                if (this.color === 'ghost') {
                    ctx.globalAlpha = 0.7; ctx.fillStyle = '#fff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ffff';
                    ctx.beginPath(); ctx.arc(0, -5, 15, Math.PI, 0); ctx.lineTo(15, 15); ctx.lineTo(8, 10); ctx.lineTo(0, 15); ctx.lineTo(-8, 10); ctx.lineTo(-15, 15); ctx.fill();
                    ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
                    ctx.beginPath(); ctx.arc(-5, -5, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -5, 3, 0, Math.PI*2); ctx.fill();
                    ctx.globalAlpha = 1.0;
                } else if (this.color === 'demon') {
                    ctx.fillStyle = '#aa0000'; ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000'; ctx.fillRect(-15, -15, 30, 30);
                    ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
                    ctx.beginPath(); ctx.moveTo(-15, -15); ctx.lineTo(-5, -25); ctx.lineTo(-5, -15); ctx.fill(); 
                    ctx.beginPath(); ctx.moveTo(15, -15); ctx.lineTo(5, -25); ctx.lineTo(5, -15); ctx.fill(); 
                    ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 10; ctx.fillRect(-8, -5, 4, 4); ctx.fillRect(4, -5, 4, 4); 
                } else {
                    ctx.fillStyle = this.jetpackTimer > 0 ? '#fff' : (isSuperSkin ? '#222' : this.color); 
                    ctx.shadowBlur = 20; ctx.shadowColor = this.jetpackTimer > 0 ? '#ff0055' : (this.color === 'cat' ? '#e024ff' : (this.color === 'robot' ? '#00d2ff' : this.color)); 
                    ctx.fillRect(-15, -15, 30, 30); 

                    if (this.color === 'cat') {
                        ctx.fillStyle = '#e024ff';
                        ctx.beginPath(); ctx.moveTo(-15, -15); ctx.lineTo(-5, -5); ctx.lineTo(-15, 5); ctx.fill();
                        ctx.beginPath(); ctx.moveTo(15, -15); ctx.lineTo(5, -5); ctx.lineTo(15, 5); ctx.fill();
                        ctx.fillStyle = '#fff'; ctx.fillRect(-8, -2, 4, 4); ctx.fillRect(4, -2, 4, 4);
                    } else if (this.color === 'robot') {
                        ctx.fillStyle = '#00d2ff'; ctx.fillRect(-12, -8, 24, 6); 
                        ctx.fillStyle = '#fff'; ctx.fillRect(-5, -8, 10, 6);
                        ctx.fillStyle = '#444'; ctx.fillRect(-10, 5, 20, 8);
                    }
                }
                ctx.shadowBlur = 0; ctx.restore();
            }
        }

        class Game {
            constructor(mode, level) {
                this.mode = mode; this.level = level || 1; this.isHard = (this.mode === 'campaign' && this.level % 5 === 0);
                this.input = new InputHandler(); this.platforms = []; this.items = []; this.particles = []; this.floatingTexts = [];
                this.cameraY = 0; this.highestY = canvas.height - 50; this.maxReachedY = this.highestY; 
                this.tier = 0; this.currentScore = 0;
                this.targetY = this.mode === 'campaign' ? -(1500 + (this.level * 500)) : -Infinity;
                this.finishSpawned = false;
                this.platforms.push(new Platform(0, this.highestY, canvas.width, 'normal', this.tier));
                this.player = new Player(this); this.hunter = new Hunter(this);
            }

            generateChunk() {
                while (this.highestY > this.cameraY - canvas.height * 2) {
                    if (this.mode === 'campaign' && this.highestY <= this.targetY) {
                        if (!this.finishSpawned) { this.platforms.push(new Platform(0, this.targetY - 100, canvas.width, 'finish', 0)); this.finishSpawned = true; }
                        break;
                    }
                    let gap = 90 + (this.tier * 10) + Math.random() * (this.isHard ? 60 : 40 + (this.tier * 5));
                    this.highestY -= gap;
                    let w = Math.max(40, 85 - (this.tier * 10)) + Math.random() * (this.isHard ? 50 : 80 - (this.tier * 5)); 
                    let x = Math.random() * (canvas.width - w);
                    
                    let type = 'normal'; let r = Math.random();
                    if (this.isHard) { if (r > 0.95) type = 'spring'; else if (r > 0.4) type = 'moving'; } 
                    else { if (r > 0.85) type = 'spring'; else if (r > Math.max(0.2, 0.65 - (this.tier * 0.15))) type = 'moving'; }
                    
                    this.platforms.push(new Platform(x, this.highestY, w, type, this.tier));
                    
                    let ri = Math.random();
                    if (ri > 0.993 && !this.isHard) this.items.push(new Item(x + w/2 - 12, this.highestY - 40, 'jetpack'));
                    else if (ri > 0.6) this.items.push(new Item(x + w/2 - 12, this.highestY - 35, 'coin'));
                }
            }

            handleDeath(reason) {
                if (SAVE.lives > 0 && gameState === 'PLAYING') {
                    gameState = 'REVIVE_PROMPT'; pendingDeathReason = reason; document.getElementById('reviveLivesCount').innerText = SAVE.lives; document.getElementById('reviveMenu').classList.add('active');
                } else if (gameState === 'PLAYING') { triggerGameOver(reason); }
            }

            useExtraLife() {
                SAVE.lives--; saveGame(); sfx.powerup();
                for(let i=0; i<50; i++) this.particles.push(new Particle(this.player.x+15, this.player.y+15, '#ffffff', false, 2));
                this.player.vy = -30; this.player.y -= 100;
                this.hunter.y = this.cameraY + canvas.height + 300; this.hunter.active = false; this.hunter.startTimer(); 
                this.floatingTexts.push(new FloatingText(this.player.x, this.player.y, "❤️ СПАСЕН!"));
            }

            update() {
                if (gameState !== 'PLAYING') return;

                if (this.player.y < this.maxReachedY) this.maxReachedY = this.player.y;
                if (this.mode === 'endless') {
                    this.currentScore = Math.floor(Math.max(0, ((canvas.height - 50) - this.maxReachedY) / 10));
                    this.tier = Math.floor(this.currentScore / 3000); 
                    document.getElementById('hudLeft').innerText = `${this.currentScore} м`;
                    if (this.currentScore > SAVE.highScore) SAVE.highScore = this.currentScore; 
                }

                this.generateChunk(); 
                let cleanupY = this.cameraY + canvas.height + 300;
                this.platforms = this.platforms.filter(p => p.y < cleanupY && !p.broken); 
                this.items = this.items.filter(i => i.y < cleanupY && !i.markedForDeletion); 

                this.platforms.forEach(p => p.update()); this.player.update(this.input); this.hunter.update(); 
                this.items.forEach(i => i.update()); this.particles.forEach(p => p.update()); this.particles = this.particles.filter(p => p.life > 0);
                this.floatingTexts.forEach(ft => ft.update()); this.floatingTexts = this.floatingTexts.filter(ft => ft.life > 0);
                
                let targetCamera = this.player.y - canvas.height / 2;
                if (targetCamera < this.cameraY) this.cameraY += (targetCamera - this.cameraY) * 0.15; 
                
                if (this.hunter.active && this.player.x < this.hunter.x+33 && this.player.x+25 > this.hunter.x && this.player.y < this.hunter.y+33 && this.player.y+25 > this.hunter.y) this.handleDeath("ОХОТНИК ПОГЛОТИЛ ТЕБЯ");
                if (this.player.y > this.cameraY + canvas.height + 100) this.handleDeath("УПАЛ В БЕЗДНУ");

                if (this.mode === 'campaign') {
                    this.platforms.forEach(p => { if (p.type === 'finish' && this.player.x < p.x + p.width && this.player.x + 30 > p.x && this.player.y < p.y + 20 && this.player.y + 30 > p.y) triggerWin(); });
                }

                let magCoinRadius = SAVE.magnetCoinLvl > 0 ? (SAVE.magnetCoinLvl * 80 + 50) : 0; 
                let magJpRadius = SAVE.magnetJpLvl > 0 ? (SAVE.magnetJpLvl * 80 + 50) : 0;

                this.items.forEach(item => {
                    if (item.markedForDeletion) return;
                    let dx = (this.player.x + 15) - (item.x + 12); let dy = (this.player.y + 15) - (item.y + 12);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let radius = item.type === 'coin' ? magCoinRadius : (item.type === 'jetpack' ? magJpRadius : 0);
                    
                    if (radius > 0 && dist < radius) { 
                        let pullSpeed = Math.min(25, dist); 
                        item.x += (dx / dist) * pullSpeed; 
                        item.y += (dy / dist) * pullSpeed; 
                    }

                    if (this.player.x < item.x + 24 && this.player.x + 30 > item.x && this.player.y < item.y + 24 && this.player.y + 30 > item.y) {
                        item.markedForDeletion = true;
                        if (item.type === 'coin') { 
                            let reward = this.isHard ? 3 : 1; SAVE.coins += reward; sfx.coin(); saveGame(); 
                            for(let i=0; i<15; i++) this.particles.push(new Particle(item.x+12, item.y+12, '#FFD700')); 
                            document.getElementById('hudCoins').innerText = `💰 ${SAVE.coins}`;
                        } else if (item.type === 'jetpack') { 
                            this.player.jetpackTimer = 90 + (SAVE.jetpackLevel * 30); sfx.powerup(); 
                            for(let i=0; i<25; i++) this.particles.push(new Particle(item.x+12, item.y+12, '#ff0055', false, 1.5)); 
                        }
                    }
                });
            }
            draw(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (this.isHard) { ctx.fillStyle = 'rgba(50, 0, 10, 0.3)'; ctx.fillRect(0,0,canvas.width, canvas.height); } 
                else if (this.mode === 'endless' && this.tier > 0) {
                    let bgAlpha = Math.min(0.8, this.tier * 0.15); 
                    ctx.fillStyle = `rgba(60, 0, 15, ${bgAlpha})`; ctx.fillRect(0,0,canvas.width, canvas.height);
                }

                ctx.save();
                ctx.strokeStyle = 'rgba(0, 210, 255, 0.05)';
                ctx.lineWidth = 1;
                let offsetY = this.cameraY % 50;
                for(let i=0; i<canvas.height + 50; i+=50) { ctx.beginPath(); ctx.moveTo(0, i - offsetY); ctx.lineTo(canvas.width, i - offsetY); ctx.stroke(); }
                for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
                ctx.restore();

                ctx.save(); ctx.translate(0, -this.cameraY);
                this.platforms.forEach(p => p.draw(ctx)); this.items.forEach(i => i.draw(ctx)); 
                this.hunter.draw(ctx); if (gameState === 'PLAYING' || gameState === 'END' || gameState === 'REVIVE_PROMPT') this.player.draw(ctx);
                this.particles.forEach(p => p.draw(ctx)); this.floatingTexts.forEach(ft => ft.draw(ctx));
                ctx.restore();
                
                if ((gameState === 'PLAYING' || gameState === 'REVIVE_PROMPT') && this.player.jetpackTimer > 0) {
                    let maxTimer = 90 + (SAVE.jetpackLevel * 30); let prog = this.player.jetpackTimer / maxTimer;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(canvas.width/2 - 50, 50, 100, 6);
                    ctx.fillStyle = '#ff0055'; ctx.fillRect(canvas.width/2 - 50, 50, 100 * prog, 6);
                }
            }
        }

        let game = null; let lastPlayedMode = 'campaign'; let lastPlayedLevel = 1;
        function animate() { if (game) { game.update(); game.draw(ctx); } requestAnimationFrame(animate); }
        
        function startGame(mode, level = 1) {
            lastPlayedMode = mode; lastPlayedLevel = level; game = new Game(mode, level); gameState = 'PLAYING'; 
            document.getElementById('hudLeft').innerText = mode === 'campaign' ? `УРОВЕНЬ ${level}` : `0 м`;
            document.getElementById('hudLeft').style.color = game.isHard ? '#ff0055' : 'white';
            updateUI(); showState('NONE'); gameHud.style.display = 'flex';
            
            if (game.player.vy === 0) game.player.vy = -(19 + SAVE.jumpLvl * 1.5); 
            game.hunter.startTimer();
        }

        function triggerGameOver(reason) { 
            gameState = 'END'; sfx.death(); saveGame(); 
            setTimeout(() => { 
                document.getElementById('endTitle').innerText = "ВЫ ПОГИБЛИ"; document.getElementById('endTitle').style.color = "#ff0055";
                document.getElementById('endDesc').innerText = reason; document.getElementById('endBtn1').innerText = "ПОВТОРИТЬ";
                document.getElementById('endBtn1').onclick = () => startGame(lastPlayedMode, lastPlayedLevel); showState('END');
            }, 800); 
        }

        function triggerWin() { 
            gameState = 'END'; sfx.coin(); 
            if (lastPlayedLevel === SAVE.maxLevel && SAVE.maxLevel < 100) SAVE.maxLevel++;
            saveGame();
            setTimeout(() => { 
                document.getElementById('endTitle').innerText = "УРОВЕНЬ ПРОЙДЕН"; document.getElementById('endTitle').style.color = "#00ff00";
                document.getElementById('endDesc').innerText = game.isHard ? "ХАРДКОР ЗАВЕРШЕН!" : "Отличная работа!"; 
                document.getElementById('endBtn1').innerText = "СЛЕДУЮЩИЙ";
                document.getElementById('endBtn1').onclick = () => startGame('campaign', lastPlayedLevel + 1); showState('END');
            }, 500); 
        }
        
        showState('MAIN'); animate();
    </script>
</body>
</html>
