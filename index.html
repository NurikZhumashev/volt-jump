<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Engine TMA</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; background: #000; }
        
        /* Стили для мобильных кнопок */
        .controls {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            box-sizing: border-box;
            pointer-events: none; /* Чтобы не мешали кликам по экрану, если нужно */
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: auto; /* Включаем клики обратно для кнопок */
            touch-action: manipulation;
        }
        .btn:active { background: rgba(0, 210, 255, 0.4); border-color: #00d2ff; }
        #jumpBtn { width: 100px; background: rgba(0, 210, 255, 0.2); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">UP</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- ДВИЖОК: ОБРАБОТКА ВВОДА ---
        class InputHandler {
            constructor() {
                this.keys = [];
                // Клавиатура
                window.addEventListener('keydown', e => {
                    if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') && !this.keys.includes(e.key)) {
                        this.keys.push(e.key);
                    }
                });
                window.addEventListener('keyup', e => {
                    this.keys = this.keys.filter(k => k !== e.key);
                });

                // Сенсорные кнопки
                this.bindTouch('leftBtn', 'ArrowLeft');
                this.bindTouch('rightBtn', 'ArrowRight');
                this.bindTouch('jumpBtn', ' ');
            }

            bindTouch(id, key) {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!this.keys.includes(key)) this.keys.push(key); });
                btn.addEventListener('touchend', (e) => { this.keys = this.keys.filter(k => k !== key); });
            }
        }

        // --- ДВИЖОК: ИГРОК ---
        class Player {
            constructor(gameWidth, gameHeight) {
                this.gameWidth = gameWidth;
                this.gameHeight = gameHeight;
                this.width = 40;
                this.height = 40;
                this.x = 50;
                this.y = this.gameHeight - this.height - 60;
                this.color = '#00d2ff';
                
                // Физика
                this.vx = 0;       // Горизонтальная скорость
                this.vy = 0;       // Вертикальная скорость
                this.weight = 0.8; // Гравитация
                this.speed = 5;    // Макс. скорость
                this.friction = 0.9; // Трение (плавное торможение)
            }

            draw(context) {
                context.fillStyle = this.color;
                context.shadowBlur = 15;
                context.shadowColor = this.color;
                context.fillRect(this.x, this.y, this.width, this.height);
                context.shadowBlur = 0;
            }

            update(input) {
                // Прыжок
                if (input.keys.includes(' ') && this.onGround()) {
                    this.vy = -18;
                }

                // Горизонтальное движение
                if (input.keys.includes('ArrowRight')) {
                    this.vx = this.speed;
                } else if (input.keys.includes('ArrowLeft')) {
                    this.vx = -this.speed;
                } else {
                    this.vx *= this.friction; // Замедление при отпускании кнопок
                }

                this.x += this.vx;
                this.y += this.vy;

                // Гравитация
                if (!this.onGround()) {
                    this.vy += this.weight;
                } else {
                    this.vy = 0;
                }

                // Границы экрана
                if (this.x < 0) this.x = 0;
                if (this.x > this.gameWidth - this.width) this.x = this.gameWidth - this.width;
                if (this.y > this.gameHeight - this.height - 60) this.y = this.gameHeight - this.height - 60;
            }

            onGround() {
                return this.y >= this.gameHeight - this.height - 60;
            }
        }

        // --- ГЛАВНЫЙ КЛАСС ИГРЫ ---
        class Game {
            constructor(width, height) {
                this.width = width;
                this.height = height;
                this.player = new Player(this.width, this.height);
                this.input = new InputHandler();
            }

            update() {
                this.player.update(this.input);
            }

            draw(context) {
                context.clearRect(0, 0, this.width, this.height);
                
                // Рисуем пол (неоновую линию)
                context.strokeStyle = '#333';
                context.lineWidth = 4;
                context.beginPath();
                context.moveTo(0, this.height - 60);
                context.lineTo(this.width, this.height - 60);
                context.stroke();

                this.player.draw(context);
            }
        }

        const game = new Game(canvas.width, canvas.height);

        function animate() {
            game.update();
            game.draw(ctx);
            requestAnimationFrame(animate);
        }

        animate();

        // Ресайз окна
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Здесь можно добавить обновление размеров в объекте game
        });
    </script>
</body>
</html>
